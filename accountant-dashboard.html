<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biller/Accountant Dashboard – Pharmacy Invoicing</title>
  <link rel="stylesheet" href="css/styles.css?v=217">
  <link rel="stylesheet" href="css/logout-button.css">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: #f5f5dc; }
    .container { max-width: 1100px; margin: 0 auto; }
    .back-link { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: #4169E1; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; }
    .back-link:hover { background: #3556c4; color: white; }
    .page-header { background: linear-gradient(135deg, #008753, #006b42); color: white; padding: 24px 32px; border-radius: 12px; margin-bottom: 24px; }
    .page-header h1 { margin: 0 0 8px 0; font-size: 24px; }
    .page-header p { margin: 0; opacity: 0.9; font-size: 14px; }
    .prescription-card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 16px; border-left: 4px solid #008753; }
    .prescription-card .meta { color: #555; font-size: 14px; margin-bottom: 12px; }
    .prescription-card .meds { margin: 12px 0; padding: 12px; background: #f8f9fa; border-radius: 8px; font-size: 14px; }
    .prescription-card .actions { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .btn { padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 14px; text-decoration: none; display: inline-block; }
    .btn-primary { background: #008753; color: white; }
    .btn-primary:hover { background: #006b42; color: white; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #4169E1; color: white; }
    .btn-secondary:hover { color: white; background: #3556c4; }
    .badge { padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; }
    .badge-paid { background: #d4edda; color: #155724; }
    .badge-pending { background: #fff3cd; color: #856404; }
    .empty-state { text-align: center; padding: 48px 24px; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); color: #555; }
    .loading { text-align: center; padding: 24px; color: #666; }
    #access-denied { display: none; text-align: center; padding: 48px 20px; }
  </style>
  <script src="js/utils.js"></script>
  <script src="js/vendor/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/universal-data-loader.js"></script>
  <script src="js/billing.js"></script>
  <script src="js/pharmacy-manager.js"></script>
  <script src="js/ui-title-case.js?v=20260616120000" defer></script>
</head>
<body>
  <div class="container">
    <a href="dashboard" class="back-link">← Back to Dashboard</a>
    <div class="page-header">
      <h1>💰 Biller/Accountant Dashboard</h1>
      <p>Approved prescriptions from Pharmacy – generate invoice, collect payment, then pharmacy can start fill.</p>
    </div>
    <div id="access-denied">
      <h2>Access denied</h2>
      <p>This page is for Biller/Accountant and Administrators.</p>
      <a href="dashboard" class="back-link">Go to Dashboard</a>
    </div>
    <div id="content">
      <div id="list-container">
        <div class="loading">Loading approved prescriptions…</div>
      </div>
    </div>
  </div>
  <script>
    (function() {
      function isAccountantOrAdmin() {
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const r = (user.role || '').toLowerCase();
        return r === 'biller/accountant' || r === 'administrator' || r === 'admin';
      }
      if (!isAccountantOrAdmin()) {
        document.getElementById('access-denied').style.display = 'block';
        document.getElementById('content').style.display = 'none';
        return;
      }
      const listEl = document.getElementById('list-container');
      async function load() {
        try {
          const prescriptions = await window.getApprovedPrescriptions();
          if (!prescriptions || prescriptions.length === 0) {
            listEl.innerHTML = '<div class="empty-state"><h3>No approved prescriptions</h3><p>Prescriptions approved by the Pharmacist will appear here for invoicing and payment.</p></div>';
            return;
          }
          listEl.innerHTML = prescriptions.map(function(p) {
            const meds = typeof p.medications === 'string' ? JSON.parse(p.medications || '[]') : (p.medications || []);
            const idShort = p.prescription_number || (p.id || '').toString().substring(0, 8);
            const hasInvoice = !!p.invoice_id;
            const isPaid = !!p.paid_at;
            let actionHtml;
            if (isPaid) {
              actionHtml = '<span class="badge badge-paid">Paid</span>';
            } else if (hasInvoice) {
              actionHtml = '<a href="collect-payment.html?invoiceId=' + encodeURIComponent(p.invoice_id) + '&returnUrl=accountant-dashboard" class="btn btn-secondary">Collect payment</a>';
            } else {
              actionHtml = '<button class="btn btn-primary" data-prescription-id="' + p.id + '" onclick="window.generateInvoiceForPrescriptionCard(this)">Generate invoice</button>';
            }
            const patientDisplay = p.patient_name ? (p.patient_id ? p.patient_name + ' (' + p.patient_id + ')' : p.patient_name) : (p.patient_id || ':');
            return '<div class="prescription-card" data-id="' + p.id + '">' +
              '<div class="meta">Prescription #' + idShort + ' · Patient: ' + patientDisplay + '</div>' +
              '<div class="meds">' + meds.map(function(m) {
                return (m.name || '') + ' ' + (m.strength || '') + ' ' + (m.form || '') + ' × ' + (m.quantity || 1);
              }).join(' · ') + '</div>' +
              '<div class="actions">' + actionHtml + '</div></div>';
          }).join('');
        } catch (e) {
          listEl.innerHTML = '<div class="empty-state"><h3>Error</h3><p>' + (e.message || e) + '</p></div>';
        }
      }
      window.generateInvoiceForPrescriptionCard = async function(btn) {
        const id = btn.getAttribute('data-prescription-id');
        if (!id) return;
        btn.disabled = true;
        btn.textContent = 'Generating…';
        try {
          const prescriptions = await window.getApprovedPrescriptions();
          const p = prescriptions.find(function(r) { return r.id === id; });
          if (!p) throw new Error('Prescription not found');
          await window.createInvoiceForPrescription(p);
          btn.textContent = 'Invoice created';
          load();
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Generate invoice';
          alert('Error: ' + (err.message || err));
        }
      };
      load();
      setInterval(load, 30000);
    })();
  </script>
  <script src="js/logout-button.js"></script>
</body>
</html>
