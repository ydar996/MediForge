<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in &amp; Copay - MediForge</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { font-family: system-ui, sans-serif; background: #f4f6f8; padding: 20px; }
    .card { background: #fff; max-width: 640px; margin: 0 auto; padding: 24px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { color: #008753; margin-top: 0; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input, select { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 16px; background: #008753; color: #fff; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; }
    .result { margin-top: 20px; padding: 16px; background: #e8f4fd; border-radius: 8px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <p><a href="billing-dashboard">← Billing</a></p>
    <h1>Patient check-in &amp; copay</h1>
    <p>Verify provincial coverage, calculate patient portion, and collect copay at point of service.</p>

    <label for="patientId">Patient ID</label>
    <input type="text" id="patientId" placeholder="From patient chart URL">

    <label for="serviceAmount">Service amount (CAD)</label>
    <input type="number" id="serviceAmount" step="0.01" value="150">

    <label for="copayOverride">Copay override (optional)</label>
    <input type="number" id="copayOverride" step="0.01" placeholder="Leave blank for payer rules">

    <button type="button" id="btn-calc">Calculate patient due</button>
    <button type="button" id="btn-collect" style="background:#1565c0;margin-left:8px;display:none;">Collect payment →</button>

    <div class="result" id="result"></div>
  </div>

  <script src="js/vendor/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/billing-payer-engine.js"></script>
  <script src="js/billing.js"></script>
  <script src="js/billing-payer-hooks.js"></script>
  <script>
    let lastInvoiceId = null;

    document.getElementById('btn-calc').addEventListener('click', async () => {
      const patientId = document.getElementById('patientId').value.trim();
      const amount = parseFloat(document.getElementById('serviceAmount').value) || 0;
      const el = document.getElementById('result');
      if (!patientId) { alert('Enter patient ID'); return; }

      let patients = [];
      if (typeof loadPatientsWithSupabasePriority === 'function') {
        patients = await loadPatientsWithSupabasePriority();
      }
      const patient = patients.find(p => p.id === patientId || p.patient_id === patientId);
      if (!patient) { alert('Patient not found'); return; }

      const invoiceData = {
        patientId: patient.id || patient.patient_id,
        patientName: `${patient.firstName || ''} ${patient.lastName || ''}`.trim(),
        services: [{ name: 'Office visit', amount: amount }],
        total: amount,
        currency: 'CAD'
      };

      const enriched = await MediForgePayerEngine.enrichInvoice(invoiceData, patient);
      const inv = await createInvoice(enriched);
      lastInvoiceId = inv?.id;

      el.style.display = 'block';
      el.innerHTML = `
        <p><strong>Primary payer:</strong> ${enriched.primaryPayer?.payerId || '—'} (${enriched.primaryPayer?.type})</p>
        <p><strong>Total:</strong> CAD ${amount.toFixed(2)}</p>
        <p><strong>Insurer portion:</strong> CAD ${(enriched.payerSplit?.payerCovered || 0).toFixed(2)} (claim draft queued)</p>
        <p><strong>Patient due now:</strong> CAD ${(enriched.payerSplit?.patientDue || amount).toFixed(2)}</p>
        <p style="font-size:13px;color:#666;">Preferred method: ${patient.preferredPaymentMethod || 'cash'}</p>
      `;
      document.getElementById('btn-collect').style.display = 'inline-block';
    });

    document.getElementById('btn-collect').addEventListener('click', () => {
      if (lastInvoiceId) {
        window.location.href = `collect-payment?invoiceId=${lastInvoiceId}`;
      }
    });
  </script>
</body>
</html>
