<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <title>Check Supabase Data</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
    .info { background-color: #d1ecf1; }
    .warning { background-color: #fff3cd; }
    .success { background-color: #d4edda; }
    table { width: 100%; border-collapse: collapse; margin: 10px 0; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>
  <h1><i class="fa-solid fa-circle-info" aria-hidden="true"></i> Check Supabase Data</h1>
  
  <!-- Load Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.1">

  <!-- Supabase Client Initialization -->
  <script src="js/supabase-client.js?v=202510220113080113081308"></script>
  <script src="js/universal-data-loader.js?v=202510220113080113081308"></script>  <!-- Universal data loader with Supabase priority -->
  </script>
  
  <div class="section info">
    <h2><i class="fa-solid fa-circle-info" aria-hidden="true"></i> Current Supabase Data</h2>
    <button onclick="checkAllData()"><i class="fa-solid fa-circle-info" aria-hidden="true"></i> Check All Data</button>
    <div id="data-results"></div>
  </div>
  
  <div class="section warning">
    <h2><i class="fa-solid fa-circle-info" aria-hidden="true"></i> Data Recovery</h2>
    <p>If valid appointments were accidentally deleted, we may need to restore them from localStorage or recreate them.</p>
    <button onclick="checkLocalStorageData()"><i class="fa-solid fa-circle-info" aria-hidden="true"></i> Check localStorage for Backup</button>
    <div id="backup-results"></div>
  </div>

  <script>
    let currentOrgId = null;

    async function initialize() {
      const user = JSON.parse(localStorage.getItem("user") || "{}");
      currentOrgId = user.organizationId || (user.org ? JSON.parse(localStorage.getItem("organizations") || "{}")[user.org]?.id : null);
      
      if (!currentOrgId) {
        alert('No organization ID found. Please login first.');
        return;
      }
      
      console.log('Organization ID:', currentOrgId);
    }

    async function checkAllData() {
      if (typeof window.supabaseClient === 'undefined' || !window.supabaseClient) {
        alert('Online data client not available');
        return;
      }
      
      try {
        // Check patients
        const { data: patients, error: patientsError } = await window.supabaseClient
          .from('patients')
          .select('*')
          .eq('organization_id', currentOrgId);
        
        // Check appointments
        const { data: appointments, error: appointmentsError } = await window.supabaseClient
          .from('appointments')
          .select('*')
          .eq('organization_id', currentOrgId);
        
        // Check organizations
        const { data: organizations, error: orgError } = await window.supabaseClient
          .from('organizations')
          .select('*');
        
        let html = '<h3>${I.info} Supabase Data Summary</h3>';
        html += '<table><tr><th>Table</th><th>Count</th><th>Status</th></tr>';
        
        if (patientsError) {
          html += `<tr><td>Patients</td><td>Error</td><td style="color: red;"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> ${patientsError.message}</td></tr>`;
        } else {
          html += `<tr><td>Patients</td><td>${(patients || []).length}</td><td style="color: green;"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> OK</td></tr>`;
        }
        
        if (appointmentsError) {
          html += `<tr><td>Appointments</td><td>Error</td><td style="color: red;"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> ${appointmentsError.message}</td></tr>`;
        } else {
          html += `<tr><td>Appointments</td><td>${(appointments || []).length}</td><td style="color: green;"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> OK</td></tr>`;
        }
        
        if (orgError) {
          html += `<tr><td>Organizations</td><td>Error</td><td style="color: red;"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> ${orgError.message}</td></tr>`;
        } else {
          html += `<tr><td>Organizations</td><td>${(organizations || []).length}</td><td style="color: green;"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> OK</td></tr>`;
        }
        
        html += '</table>';
        
        // Show detailed patient info
        if (patients && patients.length > 0) {
          html += '<h3>${I.info} Patients in Supabase</h3>';
          html += '<table><tr><th>Name</th><th>ID</th><th>Phone</th></tr>';
          patients.forEach(patient => {
            html += `<tr><td>${patient.first_name} ${patient.last_name}</td><td>${patient.id}</td><td>${patient.phone || 'N/A'}</td></tr>`;
          });
          html += '</table>';
        } else {
          html += '<p style="color: orange;"><i class="fa-solid fa-circle-info" aria-hidden="true"></i> No patients found in Supabase</p>';
        }
        
        // Show detailed appointment info
        if (appointments && appointments.length > 0) {
          html += '<h3>${I.info} Appointments in Supabase</h3>';
          html += '<table><tr><th>Patient</th><th>Date</th><th>Time</th><th>Doctor</th></tr>';
          appointments.forEach(apt => {
            html += `<tr><td>${apt.patient_name || 'Unknown'}</td><td>${apt.appointment_date}</td><td>${apt.appointment_time}</td><td>${apt.doctor || 'Unknown'}</td></tr>`;
          });
          html += '</table>';
        } else {
          html += '<p style="color: orange;"><i class="fa-solid fa-circle-info" aria-hidden="true"></i> No appointments found in Supabase</p>';
        }
        
        document.getElementById('data-results').innerHTML = html;
        
        console.log('Supabase data check complete');
        console.log('Patients:', patients?.length || 0);
        console.log('Appointments:', appointments?.length || 0);
        console.log('Organizations:', organizations?.length || 0);
        
      } catch (err) {
        console.error('Exception checking data:', err);
        document.getElementById('data-results').innerHTML = `<p style="color: red;"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> Exception: ${err.message}</p>`;
      }
    }

    function checkLocalStorageData() {
      const user = JSON.parse(localStorage.getItem("user") || "{}");
      const org = user.org || "Default";
      
      // Check localStorage for any backup data
      const orgPatientsKey = `${org}_patients`;
      const orgAppointmentsKey = `${org}_appointments`;
      
      const patients = JSON.parse(localStorage.getItem(orgPatientsKey) || "[]");
      const appointments = JSON.parse(localStorage.getItem(orgAppointmentsKey) || "[]");
      const organizations = JSON.parse(localStorage.getItem("organizations") || "{}");
      
      let html = '<h3>${I.info} localStorage Backup Data</h3>';
      html += '<table><tr><th>Data Type</th><th>Count</th><th>Key</th></tr>';
      html += `<tr><td>Patients</td><td>${patients.length}</td><td>${orgPatientsKey}</td></tr>`;
      html += `<tr><td>Appointments</td><td>${appointments.length}</td><td>${orgAppointmentsKey}</td></tr>`;
      html += `<tr><td>Organizations</td><td>${Object.keys(organizations).length}</td><td>organizations</td></tr>`;
      html += '</table>';
      
      if (patients.length > 0) {
        html += '<h3>${I.info} Patients in localStorage</h3>';
        html += '<table><tr><th>Name</th><th>ID</th><th>Phone</th></tr>';
        patients.forEach(patient => {
          html += `<tr><td>${patient.firstName} ${patient.lastName}</td><td>${patient.id}</td><td>${patient.phone || 'N/A'}</td></tr>`;
        });
        html += '</table>';
      }
      
      if (appointments.length > 0) {
        html += '<h3>${I.info} Appointments in localStorage</h3>';
        html += '<table><tr><th>Patient</th><th>Date</th><th>Time</th><th>Doctor</th></tr>';
        appointments.forEach(apt => {
          html += `<tr><td>${apt.patientName || 'Unknown'}</td><td>${apt.date}</td><td>${apt.time}</td><td>${apt.doctor || 'Unknown'}</td></tr>`;
        });
        html += '</table>';
      }
      
      document.getElementById('backup-results').innerHTML = html;
    }

    // Initialize when page loads
    window.addEventListener('load', initialize);
  </script>  <script src="js/universal-sync-status.js?v=202510220113080113081308"></script>


  <!-- General helpers -->
  <script src="js/main.js?v=20251101160000"></script>
</html>
