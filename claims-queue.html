<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>OHIP Claims Queue | MediForge</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f5; margin: 0; padding: 24px; }
    .wrap { max-width: 1000px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 4px 18px rgba(0,0,0,.08); }
    h1 { color: #008753; margin-top: 0; }
    .claims-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: .92rem; }
    .claims-table th, .claims-table td { padding: 10px 12px; border-bottom: 1px solid #eee; text-align: left; }
    .claims-table th { background: #008753; color: #fff; }
    .btn { display: inline-block; margin-top: 16px; margin-right: 8px; padding: 10px 18px; background: #008753; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 700; border: none; cursor: pointer; }
    .btn-secondary { background: #1565C0; }
    .btn-sm { font-size: .8rem; padding: 4px 10px; background: #FF9800; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .note { background: #f4f9f6; border: 1px solid #cce8d8; padding: 12px; border-radius: 8px; margin: 16px 0; font-size: .92rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>OHIP Claims Queue</h1>
    <p>Review provincial claim drafts and submissions. Live MOH upload requires MCEDT credentials in <a href="mcedt-settings">MCEDT Settings</a>.</p>
    <div class="note" id="summary">Loading summary...</div>
    <p>
      <label>Filter: </label>
      <select id="status-filter">
        <option value="all">All</option>
        <option value="draft">Draft</option>
        <option value="submitted">Submitted</option>
        <option value="rejected">Rejected</option>
        <option value="paid">Paid</option>
      </select>
      <button type="button" class="btn btn-secondary" id="export-xml-btn" style="margin-top:0;margin-left:8px;">Export draft XML</button>
    </p>
    <div id="claims-table-wrap">Loading...</div>
    <button type="button" class="btn btn-secondary" id="batch-submit-btn">Submit draft batch (when configured)</button>
    <a href="billing-dashboard" class="btn">← Billing Dashboard</a>
    <a href="mcedt-settings" class="btn btn-secondary">MCEDT Settings</a>
  </div>
  <script src="/js/vendor/supabase.min.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/interop-client.js"></script>
  <script src="/js/claims-queue.js"></script>
  <script>
    (async function () {
      const wrap = document.getElementById('claims-table-wrap');
      const summary = document.getElementById('summary');
      let rows = await MediForgeClaimsQueue.loadOrgClaims();
      const counts = { draft: 0, submitted: 0, rejected: 0, paid: 0 };
      rows.forEach((r) => { if (counts[r.status] !== undefined) counts[r.status] += 1; });
      summary.textContent =
        `Draft: ${counts.draft} · Submitted: ${counts.submitted} · Rejected: ${counts.rejected} · Paid: ${counts.paid}`;
      MediForgeClaimsQueue.renderTable(wrap, rows);

      function refreshTable() {
        const filter = document.getElementById('status-filter').value;
        MediForgeClaimsQueue.renderTable(wrap, rows, { statusFilter: filter });
      }
      document.getElementById('status-filter').addEventListener('change', refreshTable);

      document.getElementById('export-xml-btn').addEventListener('click', async () => {
        const drafts = rows.filter((r) => r.status === 'draft');
        if (!drafts.length) return alert('No draft claims to export.');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const batch = { claims: drafts.map((d) => d.claim_payload || d), submitter: { billingNumber: user.billingNumber || user.ohipBillingNumber || '' } };
        try {
          const res = await MediForgeInteropClient.call('exportMcedtXml', { batch });
          const xml = res.result?.xml || res.xml;
          if (!xml) return alert('No XML returned.');
          const blob = new Blob([xml], { type: 'application/xml' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `ohip-claims-${new Date().toISOString().slice(0, 10)}.xml`;
          a.click();
        } catch (e) {
          alert(e.message);
        }
      });

      wrap.addEventListener('click', async (e) => {
        const id = e.target.getAttribute('data-resubmit');
        if (!id) return;
        await MediForgeClaimsQueue.updateClaimStatus(id, 'draft', { error: null });
        rows = await MediForgeClaimsQueue.loadOrgClaims();
        MediForgeClaimsQueue.renderTable(wrap, rows, { statusFilter: document.getElementById('status-filter').value });
      });

      document.getElementById('batch-submit-btn').addEventListener('click', async () => {
        const drafts = rows.filter((r) => r.status === 'draft');
        if (!drafts.length) {
          alert('No draft claims to submit.');
          return;
        }
        if (!window.MediForgeInteropClient) {
          alert('Interop client not loaded.');
          return;
        }
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const result = await MediForgeInteropClient.call('batchSubmitClaims', {
          claimRecords: drafts,
          submitter: { billingNumber: user.billingNumber || user.ohipBillingNumber || '' },
          organizationId: user.organizationId || user.organization_id,
          userId: user.id
        });
        alert(result.queued ? 'Batch queued (MCEDT not configured).' : (result.submitted ? 'Batch submitted.' : result.error || 'See console.'));
      });
    })();
  </script>
</body>
</html>
