<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Consent Management | MediForge</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f5; margin: 0; padding: 24px; }
    .wrap { max-width: 960px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 4px 18px rgba(0,0,0,.08); }
    h1 { color: #008753; margin-top: 0; }
    .consent-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .consent-table th, .consent-table td { padding: 10px 12px; border-bottom: 1px solid #eee; text-align: left; font-size: .92rem; }
    .consent-table th { background: #008753; color: #fff; }
    .badge { font-size: .75rem; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
    .badge.granted { background: #e8f5e9; color: #006b42; }
    .badge.revoked { background: #fdecea; color: #922b21; }
    .btn { display: inline-block; margin-top: 16px; padding: 10px 18px; background: #008753; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 700; }
  </style>
  <script src="/js/ui-title-case.js" defer></script>
</head>
<body>
  <div class="wrap">
    <h1>Consent Management</h1>
    <p>Organization-wide view of structured patient consents (portal, data sharing, research, future OLIS). Capture or update consents from the patient chart.</p>
    <div id="consent-table-wrap">Loading...</div>
    <a href="dashboard" class="btn">← Dashboard</a>
  </div>
  <script src="/js/vendor/supabase.min.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/consent-management.js"></script>
  <script>
    (async function () {
      const wrap = document.getElementById('consent-table-wrap');
      const rows = await MediForgeConsentManagement.loadOrgConsents();
      MediForgeConsentManagement.renderTable(wrap, rows);
    })();
  </script>
</body>
</html>
