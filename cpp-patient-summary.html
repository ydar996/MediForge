<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>CPP Patient Summary | MediForge</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f5; margin: 0; padding: 20px; color: #333; }
    .wrap { max-width: 960px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    h1 { color: #008753; margin: 0 0 6px; }
    .sub { color: #666; margin-bottom: 24px; }
    .section { margin-bottom: 28px; border-left: 4px solid #008753; padding-left: 16px; }
    .section h2 { font-size: 1.1rem; color: #006b42; margin: 0 0 10px; }
    table { width: 100%; border-collapse: collapse; font-size: .92rem; }
    th, td { padding: 8px 10px; border-bottom: 1px solid #eee; text-align: left; vertical-align: top; }
    th { background: #008753; color: #fff; }
    .actions { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
    .btn-primary { background: #008753; color: #fff; }
    .btn-secondary { background: #eee; color: #333; }
    @media print { .no-print { display: none; } }
  </style>
  <script src="/js/ui-title-case.js" defer></script>
</head>
<body>
  <div class="wrap">
    <div class="actions no-print">
      <button class="btn btn-primary" onclick="window.print()">Print CPP Summary</button>
      <button class="btn btn-secondary" onclick="history.back()">Back</button>
    </div>
    <h1>Client Patient Profile (CPP)</h1>
    <p class="sub">Ontario-aligned chart summary for care coordination and handoff. Generated <span id="gen-date"></span>.</p>
    <div id="cpp-content"><p>Loading...</p></div>
  </div>
  <script src="/js/vendor/supabase.min.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/i4c-indicator-map.js"></script>
  <script src="/js/patient-access-audit.js"></script>
  <script src="/js/cpp-patient-summary.js"></script>
</body>
</html>
