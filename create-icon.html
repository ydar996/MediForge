<!DOCTYPE html>
<html>
<head>
  <script src="/js/supabase-env.js"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Create Icon</title>

  <!-- Supabase CDN Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.1">

  <!-- Supabase Client Initialization -->
  <script src="js/supabase-client.js?v=202510220113080113081308">

  <!-- Universal Data Loader for Supabase-first architecture -->
  <script src="js/universal-data-loader.js?v=202510220113080113081308"></script>
</head>
<body>
    <canvas id="canvas" width="144" height="144" style="border: 1px solid #ccc;"></canvas>
    <br>
    <button onclick="downloadIcon()">Download Icon</button>
    
    <script>
        function downloadIcon() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            // Clear canvas
            ctx.clearRect(0, 0, 144, 144);
            
            // Set background
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(0, 0, 144, 144);
            
            // Add medical cross
            ctx.fillStyle = 'white';
            ctx.fillRect(60, 20, 24, 104); // Vertical line
            ctx.fillRect(20, 60, 104, 24); // Horizontal line
            
            // Add text
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('MF', 72, 140);
            
            // Convert to PNG and download
            const link = document.createElement('a');
            link.download = 'icon-144x144.png';
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // Auto-generate on load
        window.onload = function() {
            downloadIcon();
        };
    </script>

  <!-- General helpers -->
  <script src="js/main.js?v=20251101160000"></script>

  <!-- Universal Sync Status Indicator -->
  <script src="js/universal-sync-status.js?v=202510220113080113081308"></script>
</body>
</html>
