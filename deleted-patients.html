<!-- Purpose: Lists deleted patients with options to restore or permanently delete. Purges entries older than 60 days on load. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deleted Patients</title>
  <link rel="stylesheet" href="css/styles.css?v=230">
  
  <!-- Supabase CDN Library -->
  <script src="js/vendor/supabase.min.js"></script>
  
  <!-- Supabase Client Initialization -->
  <script src="js/supabase-client.js?v=202510220113090113091309"></script>
  
  <!-- Universal Data Loader -->
  <script src="js/universal-data-loader.js?v=202510220113090113091309"></script>
  
  <!-- General helpers -->
  <script src="js/main.js?v=202510220113090113091309"></script>
  
  <!-- Universal Sync Status Indicator -->
  <script src="js/universal-sync-status.js?v=202510220113090113091309"></script>
</head>
<body>
  <h1 id="page-title">Deleted Patients</h1>
  
  <!-- Back to Dashboard Button -->
  <div style="margin-bottom: 20px;">
    <a href="dashboard" style="background-color: #667eea; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">
      &larr; Back to Dashboard
    </a>
  </div>
  
  <p>Patients deleted in the last 60 days. Older ones are auto-purged.</p>
  <table class="deleted-patients-table">
    <thead>
      <tr>
        <th>Full Name</th>
        <th>Deleted On</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="deleted-list"></tbody>
  </table>
  <a href="dashboard">Back to Dashboard</a>
  <script>
    console.log('?? TRACE: Fixed deleted-patients.html - Added complete Supabase integration');
    console.log('?? TRACE: Added connection status notifier for real-time sync');
    console.log('?? TRACE: Added required data loader and main scripts');
    console.log('?? TRACE: Deployment timestamp: ' + new Date().toISOString());
    console.log('?? TRACE: CSS version updated to v230 for cache busting');
    
    // Dynamic page title with org
    const user = JSON.parse(localStorage.getItem("user"));
    if (user) {
      document.getElementById("page-title").innerHTML = `Deleted Patients for ${user.org}`;
    }
  </script>
  <div id="logged-in-info" style="position: fixed; bottom: 10px; right: 10px; font-size: 12px; color: #666;"></div>
  <script>
    // Display logged-in user info with org
    const userFooter = JSON.parse(localStorage.getItem("user"));
    if (userFooter) {
      document.getElementById("logged-in-info").innerHTML = `${userFooter.username} (${userFooter.role}) from ${userFooter.org} is logged in`;
    }
  </script>
  <script src="js/table-alignment-fix.js?v=4"></script>  <!-- Table alignment fix -->  

</html>
