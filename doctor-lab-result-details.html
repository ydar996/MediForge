<body>
  <div class="header">
    <a class='back-button' id="back-to-results" href='/doctor-lab-results'>← Back to Lab Results</a>
    <h1>🔬 Lab Test Result Details</h1>
  </div>
  
  <div id="results-content">
    <div class="loading">Loading test result details...</div>
  </div>
  
  <!-- Supabase Client -->
  <script src="js/vendor/supabase.min.js"></script>
  <script src="js/supabase-client.js?v=202510220113080113081308"></script>
  <script src="js/lab-results-manager.js"></script>
  <script src="js/patient-id-normalizer.js?v=1"></script>
  <script src="js/patients.js?v=20260429200000-mrn-sweep"></script>
  <script src="js/patient-identity.js?v=20260427160000"></script>
  <script>
    // Wait for Supabase client to be ready
    async function waitForSupabaseClient(maxAttempts = 50) {
      for (let i = 0; i < maxAttempts; i++) {
        if (typeof window.getLabSupabaseClient === 'function') {
          return true;
        }
        await new Promise(resolve => setTimeout(resolve, 100));
      }
      return false;
    }
    
    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId');
    const testName = urlParams.get('testName');
    
    // Initialize page after Supabase client is ready
    (async function() {
      const returnUrl = urlParams.get('returnUrl');
      if (returnUrl) {
        const backLink = document.getElementById('back-to-results');
        if (backLink) backLink.href = returnUrl;
      }
      if (!orderId || !testName) {
        document.getElementById('results-content').innerHTML = `
          <div class="empty-state">
            <h3>Invalid Request</h3>
            <p>Missing required parameters. Please go back and try again.</p>
          </div>
        `;
        return;
      }
      
      // Wait for Supabase client to be ready
      const isReady = await waitForSupabaseClient();
      if (!isReady) {
        document.getElementById('results-content').innerHTML = `
          <div class="empty-state">
            <h3>Error Loading</h3>
            <p>Unable to initialize database connection. Please refresh the page.</p>
          </div>
        `;
        console.error('❌ [LAB-RESULT-DETAILS] Supabase client not available after waiting');
        return;
      }
      
      // Now load the test details
      loadTestDetails(orderId, testName);
    })();
    
    // Format audit trail array for human-readable display (security/compliance visibility)
    function formatAuditTrail(entries, userMap) {
      if (!Array.isArray(entries) || entries.length === 0) return '';
      const sorted = [...entries].sort((a, b) => new Date(b.at || b.timestamp || 0) - new Date(a.at || a.timestamp || 0));
      return sorted.map(e => {
        const action = (e.action || 'updated').replace(/_/g, ' ');
        let by = e.by || e.user || 'Unknown';
        if (userMap && typeof by === 'string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(by)) {
          by = userMap[by] || by;
        }
        const at = e.at || e.timestamp;
        const dateStr = at ? new Date(at).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' }) : 'N/A';
        return `${action} by ${by} on ${dateStr}`;
      }).join('; ');
    }

    // Helper function to extract display value from result field
    function getResultDisplayValue(value, userMap) {
      if (value === null || value === undefined || value === '') {
        return '';
      }
      
      // If value is an object (has value, unit, normalRange structure)
      if (typeof value === 'object' && !Array.isArray(value)) {
        // Check if it's a result object with value property
        if (value.value !== undefined && value.value !== null && value.value !== '') {
          let display = String(value.value);
          if (value.unit && value.unit !== '') {
            display += ` ${value.unit}`;
          }
          if (value.normalRange && value.normalRange !== '') {
            display += ` (Range: ${value.normalRange})`;
          }
          // Check for reactionStrength (for Blood Group tests)
          if (value.reactionStrength && value.reactionStrength !== '') {
            display += ` [${value.reactionStrength}]`;
          }
          return display;
        }
        // If it's an object but doesn't have a value property, try to extract meaningful data
        if (value.comments !== undefined) {
          return String(value.comments);
        }
        // Other complex objects: skip
        return '';
      }
      
      // Arrays: if audit trail format [{action, by, at}], format for display
      if (Array.isArray(value) && value.length > 0) {
        const first = value[0];
        if (first && typeof first === 'object' && (first.action !== undefined || first.by !== undefined || first.at !== undefined)) {
          return formatAuditTrail(value, userMap);
        }
        return ''; // Other arrays: skip (would show [object Object])
      }
      
      // If it's a string or number, return as is
      return String(value);
    }
    
    async function loadTestDetails(orderId, testName) {
      const contentDiv = document.getElementById('results-content');
      
      try {
        const supabase = await window.getLabSupabaseClient();
        if (!supabase) {
          throw new Error('Supabase client not available');
        }
        
        // Get the lab order - use 'orders' table with type='lab' (same as dashboard)
        const { data: order, error: orderError } = await supabase
          .from('orders')
          .select('*')
          .eq('id', orderId)
          .eq('type', 'lab')
          .single();
        
        if (orderError || !order) {
          throw new Error('Order not found');
        }
        
        // Parse results
        let results = {};
        try {
          if (typeof order.results === 'string' && order.results.trim()) {
            results = JSON.parse(order.results);
          } else if (order.results && typeof order.results === 'object') {
            results = order.results;
          }
        } catch (e) {
          console.warn('Failed to parse results:', e);
        }
        
        const testResults = results[testName];
        
        if (!testResults || typeof testResults !== 'object') {
          contentDiv.innerHTML = `
            <div class="empty-state">
              <h3>Test Results Not Found</h3>
              <p>The requested test results could not be found.</p>
            </div>
          `;
          return;
        }
        
        // Get patient information
        const orgId = await getLabOrgId();
        let patient = null;
        if (orgId) {
          const { data: patientData } = await supabase
            .from('patients')
            .select('id, patient_id, first_name, last_name, date_of_birth, gender')
            .eq('patient_id', order.patient_id)
            .eq('organization_id', orgId)
            .maybeSingle();
          
          if (patientData) {
            patient = {
              id: patientData.id || patientData.patient_id,
              patient_id: patientData.patient_id,
              firstName: patientData.first_name,
              lastName: patientData.last_name,
              dateOfBirth: patientData.date_of_birth,
              gender: patientData.gender
            };
          }
        }
        
        // Fallback to localStorage
        if (!patient) {
          const patients = JSON.parse(localStorage.getItem('patients') || '[]');
          patient = patients.find(p => p.patient_id === order.patient_id || p.id === order.patient_id);
        }
        
        const patientName = patient ? `${patient.first_name || patient.firstName || ''} ${patient.last_name || patient.lastName || ''}`.trim() : order.patient_id;
        
        // Canonical MRN for UI (maps legacy MIN → MFA-MC/MFA-SC)
        const orderPatientToken = order.patient_id || '';
        let displayPatientId = 'N/A';
        if (typeof window.patientMrnDisplay === 'function') {
          displayPatientId = patient
            ? window.patientMrnDisplay(patient, orderPatientToken)
            : window.patientMrnDisplay(orderPatientToken, orderPatientToken);
        } else if (patient && typeof window.getPatientIdentifier === 'function') {
          displayPatientId = window.getPatientIdentifier(patient) || 'N/A';
        } else if (patient) {
          displayPatientId = patient.patient_id || patient.patientNumber || 'N/A';
        }
        
        const patientId = displayPatientId;
        const patientDob = patient ? (patient.date_of_birth || patient.dateOfBirth || 'N/A') : 'N/A';
        const patientGender = patient ? (patient.gender || 'N/A') : 'N/A';
        
        // Get user name and role
        let orderedByName = 'Unknown User';
        if (order.created_by) {
          try {
            const username = order.created_by;
            let userData = null;
            
            // Try username match first (most common case)
            const { data: usernameMatch } = await supabase
              .from('users')
              .select('first_name, last_name, username, role')
              .eq('username', username)
              .maybeSingle();
            
            if (usernameMatch) {
              userData = usernameMatch;
            } else {
              // Try other fields if username doesn't match
              const { data: otherMatch } = await supabase
                .from('users')
                .select('first_name, last_name, username, role')
                .or(`id.eq.${username},auth_user_id.eq.${username}`)
                .limit(1)
                .maybeSingle();
              
              if (otherMatch) {
                userData = otherMatch;
              }
            }
            
            if (userData) {
              const firstName = userData.first_name || '';
              const lastName = userData.last_name || '';
              const fullName = (firstName && lastName) ? `${firstName} ${lastName}` : (firstName || lastName || userData.username || 'Unknown');
              const role = (userData.role || '').toLowerCase();
              
              // Determine appropriate title based on role
              let title = '';
              if (role.includes('lab') || role.includes('scientist') || role === 'medical lab scientist') {
                title = 'Medical Lab Scientist';
              } else if (role.includes('doctor') || role.includes('physician') || role === 'dr') {
                title = 'Dr.';
              } else if (role.includes('nurse')) {
                title = 'Nurse';
              } else if (role.includes('admin')) {
                title = 'Admin';
              } else if (role.includes('staff')) {
                title = 'Staff';
              } else {
                // Default to Dr. for backward compatibility
                title = 'Dr.';
              }
              
              orderedByName = `${title} ${fullName}`.trim();
            } else if (order.created_by && !order.created_by.includes('-')) {
              // Fallback: use the username with appropriate title
              const username = order.created_by;
              if (username.startsWith('Dr.') || username.startsWith('Medical Lab Scientist')) {
                orderedByName = username;
              } else {
                // Default to Dr. for backward compatibility
                orderedByName = `Dr. ${username}`;
              }
            }
          } catch (error) {
            console.warn('Could not fetch user name:', error);
            // Fallback to username
            if (order.created_by && !order.created_by.includes('-')) {
              orderedByName = `Dr. ${order.created_by}`;
            }
          }
        }
        
        // Get organization details
        let orgName = 'Medical Clinic';
        let orgAddress = '';
        let orgPhone = '';
        
        if (order.organization_id) {
          try {
            const { data: orgData } = await supabase
              .from('organizations')
              .select('name, address_line1, address_line2, city, state, country, phone')
              .eq('id', order.organization_id)
              .single();
            
            if (orgData) {
              orgName = orgData.name || orgName;
              const addrParts = [
                orgData.address_line1,
                orgData.address_line2,
                orgData.city,
                orgData.state,
                orgData.country
              ].filter(Boolean);
              orgAddress = addrParts.join(', ');
              orgPhone = orgData.phone || '';
            }
          } catch (error) {
            console.warn('Could not fetch organization details:', error);
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.org) orgName = user.org;
          }
        }
        
        // Format dates
        const orderDate = order.created_at ? new Date(order.created_at).toLocaleDateString('en-US', { 
          year: 'numeric', 
          month: 'long', 
          day: 'numeric' 
        }) : 'N/A';
        
        const completedDate = testResults.completed_at ? new Date(testResults.completed_at).toLocaleDateString('en-US', { 
          year: 'numeric', 
          month: 'long', 
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        }) : 'N/A';
        
        // Check review status
        const isReviewed = testResults.reviewed_at && testResults.reviewed_by;
        const reviewedDate = testResults.reviewed_at ? new Date(testResults.reviewed_at).toLocaleDateString('en-US', { 
          year: 'numeric', 
          month: 'long', 
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        }) : null;
        
        // Get reviewer name if available
        let reviewerName = 'Unknown';
        if (testResults.reviewed_by) {
          try {
            const { data: reviewerData } = await supabase
              .from('users')
              .select('first_name, last_name, username')
              .or(`id.eq.${testResults.reviewed_by},username.eq.${testResults.reviewed_by},auth_user_id.eq.${testResults.reviewed_by}`)
              .limit(1)
              .maybeSingle();
            
            if (reviewerData) {
              const firstName = reviewerData.first_name || '';
              const lastName = reviewerData.last_name || '';
              reviewerName = (firstName && lastName) ? `${firstName} ${lastName}` : (firstName || lastName || reviewerData.username || 'Unknown');
            } else {
              reviewerName = testResults.reviewed_by;
            }
          } catch (error) {
            console.warn('Could not fetch reviewer name:', error);
            reviewerName = testResults.reviewed_by;
          }
        }
        
        // Build HTML
        let html = `
          <div class="patient-info">
            <h2>${patientName}</h2>
            <p>Patient ID: ${typeof window.patientMrnDisplay === 'function' ? window.patientMrnDisplay(patientId) : patientId} | DOB: ${patientDob} | Gender: ${patientGender}</p>
          </div>
          
          <div class="order-info">
            <h3>Order Information</h3>
            <div class="order-info-grid">
              <div class="order-info-item">
                <div class="order-info-label">Order Number</div>
                <div class="order-info-value">${typeof window.formatLabOrderSerial === 'function' ? window.formatLabOrderSerial(order.serial_number || order.id.substring(0, 8), order.id, order) : (order.serial_number || order.id.substring(0, 8))}</div>
              </div>
              <div class="order-info-item">
                <div class="order-info-label">Ordered By</div>
                <div class="order-info-value">${orderedByName}</div>
              </div>
              <div class="order-info-item">
                <div class="order-info-label">Order Date</div>
                <div class="order-info-value">${orderDate}</div>
              </div>
              <div class="order-info-item">
                <div class="order-info-label">Completed Date</div>
                <div class="order-info-value">${completedDate}</div>
              </div>
            </div>
          </div>
          
          <div class="results-container">
            <div class="test-header">
              <h3>${testName}${(typeof window.getLabTestCategory === 'function' && window.getLabTestCategory(testName)) ? ' <span style="font-size: 14px; opacity: 0.9;">(' + window.getLabTestCategory(testName) + ')</span>' : ''} 
                <span class="status-badge status-completed">✓ Completed</span>
                ${isReviewed ? '<span class="status-badge status-reviewed">✓ Reviewed</span>' : '<span class="status-badge status-unreviewed">⚠ Not Reviewed</span>'}
              </h3>
            </div>
            <div class="test-content">
        `;
        
        // Display each result field
        const metadataFields = ['status', 'entered_at', 'entered_by', 'completed_at', 'completed_by', 'started_at', 'started_by', 'file_name', 'file_data', 'file_type', 'file_size', 'notes', 'doctor_note', 'doctor_note_by', 'doctor_note_updated_at'];
        
        // Resolve UUIDs in audit trails to display names
        const auditTrailByIds = new Set();
        for (const [k, v] of Object.entries(testResults)) {
          if ((k === 'auditTrail' || k === 'AuditTrail') && Array.isArray(v)) {
            v.forEach(e => { if (e && e.by && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(e.by)) auditTrailByIds.add(e.by); });
          }
        }
        let userMap = {};
        if (auditTrailByIds.size > 0) {
          const ids = Array.from(auditTrailByIds);
          const orClause = ids.flatMap(id => [`id.eq.${id}`, `auth_user_id.eq.${id}`]).join(',');
          const { data: users } = await supabase.from('users').select('id, auth_user_id, first_name, last_name, username').or(orClause);
          if (users) users.forEach(u => {
            const name = (u.first_name && u.last_name) ? `${u.first_name} ${u.last_name}`.trim() : (u.username || '');
            const display = name || u.username || 'Unknown';
            if (u.id) userMap[u.id] = display;
            if (u.auth_user_id) userMap[u.auth_user_id] = display;
          });
        }
        
        const resultFields = Object.entries(testResults).filter(([key, value]) => {
          if (metadataFields.includes(key)) return false;
          const displayValue = getResultDisplayValue(value, userMap);
          if (!displayValue || displayValue === 'Not Tested') return false;
          return true;
        });
        
        if (resultFields.length > 0) {
          resultFields.forEach(([key, value]) => {
            const displayValue = getResultDisplayValue(value, userMap);
            if (!displayValue || displayValue === 'Not Tested') return;
            const displayLabel = (value && typeof value === 'object' && value.label) ? value.label : key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            const isAbnormal = false;
            
            html += `
              <div class="result-item ${isAbnormal ? 'abnormal' : ''}">
                <div class="result-label">${displayLabel.replace(/</g, '&lt;')}</div>
                <div class="result-value ${isAbnormal ? 'abnormal' : ''}">${displayValue.replace(/</g, '&lt;')}</div>
              </div>
            `;
          });
        } else {
          html += `<p style="color: #666; font-style: italic;">No result data available.</p>`;
        }
        
        // Show notes if available
        if (testResults.notes) {
          html += `
            <div class="notes-section">
              <h4>Additional Notes</h4>
              <p>${testResults.notes}</p>
            </div>
          `;
        }
        
        // Show file if available
        if (testResults.file_name) {
          html += `
            <div class="file-section">
              <h4>Result File</h4>
              <p>${testResults.file_name}</p>
              <a href="#" onclick="viewResultFile('${orderId}', '${testName.replace(/'/g, "\\'")}')" class="file-link">
                📄 View File
              </a>
            </div>
          `;
        }
        
        // Review section
        html += `
            <div class="review-section ${isReviewed ? '' : 'unreviewed'}">
              <div class="review-info">
                <h4>${isReviewed ? '✓ Reviewed' : '⚠ Not Yet Reviewed'}</h4>
                ${isReviewed ? `
                  <p><strong>Reviewed by:</strong> ${reviewerName}</p>
                  <p><strong>Reviewed on:</strong> ${reviewedDate}</p>
                ` : `
                  <p>This result has not been reviewed by a doctor yet.</p>
                  <p style="color: #856404; font-weight: 600;">Please review the results and mark as reviewed when done.</p>
                `}
              </div>
              <button 
                class="review-button ${isReviewed ? 'reviewed' : ''}" 
                onclick="markAsReviewed('${orderId}', '${testName.replace(/'/g, "\\'")}')"
                ${isReviewed ? 'disabled' : ''}
                id="review-btn-${orderId}-${testName.replace(/[^a-zA-Z0-9]/g, '_')}">
                ${isReviewed ? '✓ Already Reviewed' : '✓ Mark as Reviewed'}
              </button>
            </div>
            <div class="doctor-note-section">
              <h4>Doctor's Note</h4>
              <textarea
                class="doctor-note-textarea"
                id="doctor-note-${orderId}-${testName.replace(/[^a-zA-Z0-9]/g, '_')}"
                placeholder="Add clinical interpretation, recommendations, or follow-up notes...">${(testResults.doctor_note || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
              <div class="doctor-note-actions">
                <button
                  class="review-button"
                  onclick="saveDoctorNote('${orderId}', '${testName.replace(/'/g, "\\'")}')"
                  id="doctor-note-save-${orderId}-${testName.replace(/[^a-zA-Z0-9]/g, '_')}">
                  💾 Save Note
                </button>
                <span class="doctor-note-status" id="doctor-note-status-${orderId}-${testName.replace(/[^a-zA-Z0-9]/g, '_')}">
                  ${testResults.doctor_note_updated_at ? `Last saved ${new Date(testResults.doctor_note_updated_at).toLocaleString('en-US')}` : 'Not saved yet'}
                </span>
              </div>
            </div>
          </div>
        `;
        
        // Organization footer
        html += `
          <div class="results-container" style="background: #f8f9fa; padding: 20px;">
            <div style="text-align: center; color: #666;">
              <p style="margin: 5px 0; font-weight: 600;">${orgName}</p>
              ${orgAddress ? `<p style="margin: 5px 0;">${orgAddress}</p>` : ''}
              ${orgPhone ? `<p style="margin: 5px 0;">Phone: ${orgPhone}</p>` : ''}
            </div>
          </div>
        `;
        
        contentDiv.innerHTML = html;
        
      } catch (error) {
        console.error('Error loading test details:', error);
        contentDiv.innerHTML = `
          <div class="empty-state">
            <h3>Error Loading Results</h3>
            <p>${error.message || 'An error occurred while loading the test results.'}</p>
          </div>
        `;
      }
    }
    
    function viewResultFile(orderId, testName) {
      // Open file viewer modal or download
      alert('File viewer will be implemented');
    }
    
    // Mark test result as reviewed
    async function markAsReviewed(orderId, testName) {
      const buttonId = `review-btn-${orderId}-${testName.replace(/[^a-zA-Z0-9]/g, '_')}`;
      const button = document.getElementById(buttonId);
      
      if (!button) {
        console.error('Review button not found');
        return;
      }
      
      // Disable button immediately to prevent double-clicks
      button.disabled = true;
      button.textContent = 'Marking as reviewed...';
      
      try {
        const supabase = await window.getLabSupabaseClient();
        if (!supabase) {
          throw new Error('Supabase client not available');
        }
        
        // Get current user
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const userId = user.id || user.user_id || user.username || 'unknown';
        
        // Get current order and results
        const { data: order, error: fetchError } = await supabase
          .from('orders')
          .select('results')
          .eq('id', orderId)
          .eq('type', 'lab')
          .single();
        
        if (fetchError || !order) {
          throw new Error('Order not found');
        }
        
        // Parse results
        let results = {};
        if (order.results) {
          if (typeof order.results === 'string') {
            results = JSON.parse(order.results);
          } else if (typeof order.results === 'object') {
            results = JSON.parse(JSON.stringify(order.results));
          }
        }
        
        // Update the specific test's review status
        if (!results[testName]) {
          results[testName] = {};
        }
        
        results[testName].reviewed_at = new Date().toISOString();
        results[testName].reviewed_by = userId;
        
        // Update order in Supabase
        const { error: updateError } = await supabase
          .from('orders')
          .update({
            results: results,
            provider_reviewed_at: new Date().toISOString(),
            portal_results_status: 'reviewed',
            updated_at: new Date().toISOString()
          })
          .eq('id', orderId)
          .eq('type', 'lab');
        
        if (updateError) {
          throw updateError;
        }
        
        // Success - reload the page to show updated status
        alert('✅ Result marked as reviewed successfully!');
        window.location.reload();
        
      } catch (error) {
        console.error('Error marking as reviewed:', error);
        alert(`❌ Error: ${error.message || 'Failed to mark as reviewed. Please try again.'}`);
        
        // Re-enable button on error
        button.disabled = false;
        button.textContent = '✓ Mark as Reviewed';
      }
    }

    async function saveDoctorNote(orderId, testName) {
      const safeKey = `${orderId}-${testName.replace(/[^a-zA-Z0-9]/g, '_')}`;
      const textarea = document.getElementById(`doctor-note-${safeKey}`);
      const button = document.getElementById(`doctor-note-save-${safeKey}`);
      const status = document.getElementById(`doctor-note-status-${safeKey}`);

      if (!textarea || !button) {
        console.error('Doctor note elements not found');
        return;
      }

      const noteText = textarea.value.trim();
      button.disabled = true;
      button.textContent = 'Saving...';

      try {
        const supabase = await window.getLabSupabaseClient();
        if (!supabase) {
          throw new Error('Supabase client not available');
        }

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const userId = user.id || user.user_id || user.username || 'unknown';

        const { data: order, error: fetchError } = await supabase
          .from('orders')
          .select('results')
          .eq('id', orderId)
          .eq('type', 'lab')
          .single();

        if (fetchError || !order) {
          throw new Error('Order not found');
        }

        let results = {};
        if (order.results) {
          if (typeof order.results === 'string') {
            results = JSON.parse(order.results);
          } else if (typeof order.results === 'object') {
            results = JSON.parse(JSON.stringify(order.results));
          }
        }

        if (!results[testName]) {
          results[testName] = {};
        }

        results[testName].doctor_note = noteText;
        results[testName].doctor_note_updated_at = new Date().toISOString();
        results[testName].doctor_note_by = userId;

        const { error: updateError } = await supabase
          .from('orders')
          .update({
            results: results,
            updated_at: new Date().toISOString()
          })
          .eq('id', orderId)
          .eq('type', 'lab');

        if (updateError) {
          throw updateError;
        }

        if (status) {
          status.textContent = `Last saved ${new Date().toLocaleString('en-US')}`;
        }

        button.textContent = '💾 Save Note';
        button.disabled = false;
        alert('✅ Doctor note saved.');
      } catch (error) {
        console.error('Error saving doctor note:', error);
        alert(`❌ Error: ${error.message || 'Failed to save note. Please try again.'}`);
        button.textContent = '💾 Save Note';
        button.disabled = false;
      }
    }
    
    // Get organization ID helper
    async function getLabOrgId() {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      if (user.organizationId) return user.organizationId;
      if (user.organization_id) return user.organization_id;
      
      // Try to get from Supabase
      try {
        const supabase = await window.getLabSupabaseClient();
        const { data } = await supabase
          .from('organizations')
          .select('id')
          .eq('name', user.org)
          .single();
        
        return data?.id;
      } catch (error) {
        return null;
      }
    }
  </script>
