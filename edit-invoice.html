<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Invoice - MediForge</title>
  <link rel="stylesheet" href="css/styles.css?v=225">
  <style>
    .edit-container {
      max-width: 900px;
      margin: 20px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .service-item {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    .total-section {
      background: #f0f8ff;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      font-size: 16px;
    }
    .total-row.grand-total {
      font-size: 24px;
      font-weight: bold;
      color: #4CAF50;
      border-top: 2px solid #4CAF50;
      padding-top: 15px;
      margin-top: 15px;
    }
  </style>

  <!-- Supabase CDN Library -->
  <script src="js/vendor/supabase.min.js"></script>
  
  <!-- Supabase Client Initialization -->
  <script src="js/supabase-client.js?v=202510220113080113081308"></script>
  
  <!-- Universal Data Loader for Supabase-first architecture -->
  <script src="js/universal-data-loader.js?v=202510220113080113081308"></script>
  <script src="js/ui-title-case.js?v=20260612170000" defer></script>
</head>
<body>
  <div class="edit-container">
    <h1>&#128424; Edit Invoice</h1>
    
    <div style="background: #fff3cd; padding: 15px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #ffc107;">
      <strong>&#9888;&#65039; Warning:</strong> Editing invoices that have payments may affect financial records. Use with caution.
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
      <div>
        <label><strong>Invoice Number:</strong></label>
        <input type="text" id="invoice-number" readonly style="background: #f5f5f5;">
      </div>
      <div>
        <label><strong>Invoice Date:</strong></label>
        <input type="date" id="invoice-date" required>
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
      <div>
        <label><strong>Patient:</strong></label>
        <input type="text" id="patient-name" readonly style="background: #f5f5f5;">
      </div>
      <div>
        <label><strong>Due Date:</strong></label>
        <input type="date" id="due-date">
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px;">
      <div>
        <label><strong>Status:</strong></label>
        <select id="invoice-status">
          <option value="pending">Pending</option>
          <option value="paid">Paid</option>
          <option value="partial">Partial Payment</option>
          <option value="overdue">Overdue</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div>
        <label><strong>Currency:</strong></label>
        <select id="invoice-currency">
          <!-- Will be populated -->
        </select>
      </div>
    </div>

    <h2>Services</h2>
    <div id="services-list">
      <!-- Services will be loaded here -->
    </div>
    
    <button onclick="showAddServiceModal()" style="background: #4CAF50; color: white; margin-top: 10px;">
      + Add Service
    </button>

    <h2 style="margin-top: 30px;">Pricing Adjustments</h2>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
      <div>
        <label><strong>Tax Rate (%):</strong></label>
        <input type="number" id="tax-rate" step="0.1" min="0" max="100" value="0" onchange="recalculateTotal()">
      </div>
      <div>
        <label><strong>Discount Amount:</strong></label>
        <input type="number" id="discount-amount" step="0.01" min="0" value="0" onchange="recalculateTotal()">
      </div>
    </div>

    <label style="margin-top: 15px;"><strong>Discount Reason:</strong></label>
    <input type="text" id="discount-reason" placeholder="e.g., Senior citizen, Insurance co-payment">

    <label><strong>Notes:</strong></label>
    <textarea id="invoice-notes" rows="3"></textarea>

    <div class="total-section">
      <div class="total-row"><span>Subtotal:</span><span id="subtotal-display">$0.00</span></div>
      <div class="total-row"><span>Tax (<span id="tax-rate-display">0</span>%):</span><span id="tax-display">$0.00</span></div>
      <div class="total-row"><span>Discount:</span><span id="discount-display">$0.00</span></div>
      <div class="total-row grand-total"><span>TOTAL:</span><span id="total-display">$0.00</span></div>
      <div class="total-row" style="color: #4CAF50;"><span>Amount Paid:</span><span id="amount-paid-display">$0.00</span></div>
      <div class="total-row" style="color: #f44336; font-weight: bold;"><span>Balance Due:</span><span id="balance-due-display">$0.00</span></div>
    </div>

    <div style="display: flex; gap: 15px; margin-top: 30px;">
      <button onclick="saveInvoice()" style="flex: 1; background: #4CAF50; color: white; font-size: 18px; padding: 18px; border: none; border-radius: 6px; cursor: pointer; min-height: 56px;">
        &#10004; Save Changes
      </button>
      <button onclick="cancelEdit()" style="flex: 1; background: #666; color: white; font-size: 18px; padding: 18px; border: none; border-radius: 6px; cursor: pointer; min-height: 56px;">
        Cancel
      </button>
    </div>
  </div>

  <!-- Add Service Modal -->
  <div id="add-service-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center;">
    <div style="background: white; padding: 30px; border-radius: 8px; max-width: 500px; width: 90%;">
      <h2>Add Service</h2>
      <label>Search Service:</label>
      <input type="text" id="service-search" placeholder="Type to search..." oninput="searchServices()">
      <div id="service-results" style="max-height: 300px; overflow-y: auto; margin: 15px 0; border: 1px solid #ddd; border-radius: 4px;"></div>
      <button onclick="closeAddServiceModal()" style="background: #666; color: white; width: 100%;">Close</button>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/pricing.js"></script>
  <script src="js/billing.js?v=1"></script>
  <script>
    let currentInvoice = null;
    let editedServices = [];

    window.addEventListener('load', function() {
      // Check permissions
      if (!canEditInvoices()) {
        alert('You do not have permission to edit invoices.');
        window.location.href = 'billing-dashboard';
        return;
      }

      const urlParams = new URLSearchParams(window.location.search);
      const invoiceId = urlParams.get('id');
      
      if (!invoiceId) {
        alert('Invoice ID not provided');
        window.location.href = 'invoices';
        return;
      }
      
      // getInvoiceById is async, so use await
      window.getInvoiceById(invoiceId).then(invoice => {
        if (!invoice) {
          alert('Invoice not found');
          window.location.href = 'invoices';
          return;
        }
        
        currentInvoice = invoice;
        populateCurrencySelector();
        loadInvoiceData();
      }).catch(error => {
        console.error('Error loading invoice:', error);
        alert('Error loading invoice: ' + (error.message || 'Unknown error'));
        window.location.href = 'invoices';
      });
    });

    function canEditInvoices() {
      const user = JSON.parse(localStorage.getItem("user") || "{}");
      const permissions = JSON.parse(localStorage.getItem(getDataKey('billing_permissions')) || '{}');
      
      // Check if role-based restrictions are configured
      if (permissions.editInvoice && permissions.editInvoice.length > 0) {
        return permissions.editInvoice.includes(user.role);
      }
      
      // Default: ALL USERS can edit
      return true;
    }

    function getDataKey(key) {
      const user = JSON.parse(localStorage.getItem("user") || "{}");
      const org = user.org || "Default";
      return `${org}_${key}`;
    }

    function populateCurrencySelector() {
      const select = document.getElementById('invoice-currency');
      const currencies = [
        { value: 'KES', text: 'KSh KES - Kenyan Shilling' },
        { value: 'NGN', text: '₦ NGN - Nigerian Naira' },
        { value: 'ZAR', text: 'R ZAR - South African Rand' },
        { value: 'GHS', text: 'GH₵ GHS - Ghanaian Cedi' },
        { value: 'TZS', text: 'TSh TZS - Tanzanian Shilling' },
        { value: 'UGX', text: 'USh UGX - Ugandan Shilling' },
        { value: 'RWF', text: 'RF RWF - Rwandan Franc' },
        { value: 'EGP', text: 'E£ EGP - Egyptian Pound' },
        { value: 'USD', text: '$ USD - US Dollar' }
      ];
      
      currencies.forEach(curr => {
        const option = document.createElement('option');
        option.value = curr.value;
        option.textContent = curr.text;
        select.appendChild(option);
      });
    }

    function loadInvoiceData() {
      document.getElementById('invoice-number').value = currentInvoice.invoiceNumber;
      document.getElementById('invoice-date').value = currentInvoice.date;
      document.getElementById('patient-name').value = currentInvoice.patientName;
      document.getElementById('due-date').value = currentInvoice.dueDate || '';
      document.getElementById('invoice-status').value = currentInvoice.status;
      document.getElementById('invoice-currency').value = currentInvoice.currency;
      document.getElementById('tax-rate').value = currentInvoice.taxRate || 0;
      document.getElementById('discount-amount').value = currentInvoice.discountAmount || 0;
      document.getElementById('discount-reason').value = currentInvoice.discountReason || '';
      document.getElementById('invoice-notes').value = currentInvoice.notes || '';
      
      editedServices = JSON.parse(JSON.stringify(currentInvoice.services));
      displayServices();
      recalculateTotal();
    }

    function displayServices() {
      const container = document.getElementById('services-list');
      container.innerHTML = '';
      
      editedServices.forEach((service, index) => {
        const div = document.createElement('div');
        div.className = 'service-item';
        div.innerHTML = `
          <span>${service.name}</span>
          <input type="number" value="${service.quantity}" min="1" onchange="updateServiceQuantity(${index}, this.value)" style="text-align: center;">
          <input type="number" value="${service.price}" step="0.01" min="0" onchange="updateServicePrice(${index}, this.value)" style="text-align: right;">
          <button onclick="removeService(${index})" style="background: #f44336; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer;">Remove</button>
        `;
        container.appendChild(div);
      });
    }

    function updateServiceQuantity(index, quantity) {
      editedServices[index].quantity = parseInt(quantity) || 1;
      recalculateTotal();
    }

    function updateServicePrice(index, price) {
      editedServices[index].price = parseFloat(price) || 0;
      recalculateTotal();
    }

    function removeService(index) {
      if (confirm('Remove this service from the invoice?')) {
        editedServices.splice(index, 1);
        displayServices();
        recalculateTotal();
      }
    }

    function showAddServiceModal() {
      document.getElementById('add-service-modal').style.display = 'flex';
      showAllServices();
    }

    function closeAddServiceModal() {
      document.getElementById('add-service-modal').style.display = 'none';
      document.getElementById('service-search').value = '';
    }

    function searchServices() {
      const query = document.getElementById('service-search').value.trim();
      let services;
      
      if (query.length < 1) {
        services = window.getActiveServices ? window.getActiveServices() : [];
      } else {
        services = window.searchServices ? window.searchServices(query) : [];
      }
      
      displayServiceResults(services);
    }

    function showAllServices() {
      const services = window.getActiveServices ? window.getActiveServices() : [];
      displayServiceResults(services);
    }

    function displayServiceResults(services) {
      const container = document.getElementById('service-results');
      container.innerHTML = '';
      
      if (services.length === 0) {
        container.innerHTML = '<p style="padding: 15px; text-align: center; color: #999;">No services found</p>';
        return;
      }
      
      services.forEach(service => {
        const div = document.createElement('div');
        div.style.cssText = 'padding: 12px; cursor: pointer; border-bottom: 1px solid #eee;';
        div.textContent = `${service.name} - ${window.formatCurrency ? window.formatCurrency(service.price, service.currency) : service.price}`;
        div.onmouseover = () => div.style.background = '#f5f5f5';
        div.onmouseout = () => div.style.background = 'white';
        div.onclick = () => addService(service);
        container.appendChild(div);
      });
    }

    function addService(service) {
      editedServices.push({
        id: service.id,
        code: service.code,
        name: service.name,
        quantity: 1,
        price: service.price
      });
      
      displayServices();
      recalculateTotal();
      closeAddServiceModal();
    }

    function recalculateTotal() {
      const subtotal = editedServices.reduce((sum, s) => sum + (s.quantity * s.price), 0);
      const taxRate = parseFloat(document.getElementById('tax-rate').value) || 0;
      const tax = subtotal * (taxRate / 100);
      const discount = parseFloat(document.getElementById('discount-amount').value) || 0;
      const total = subtotal + tax - discount;
      const amountPaid = currentInvoice.amountPaid || 0;
      const balanceDue = total - amountPaid;
      
      const currency = document.getElementById('invoice-currency').value;
      
      const formatCurrencyFn = window.formatCurrency || function(amount, curr) { return `${curr} ${amount.toFixed(2)}`; };
      
      document.getElementById('subtotal-display').textContent = formatCurrencyFn(subtotal, currency);
      document.getElementById('tax-rate-display').textContent = taxRate;
      document.getElementById('tax-display').textContent = formatCurrencyFn(tax, currency);
      document.getElementById('discount-display').textContent = formatCurrencyFn(discount, currency);
      document.getElementById('total-display').textContent = formatCurrencyFn(total, currency);
      document.getElementById('amount-paid-display').textContent = formatCurrencyFn(amountPaid, currency);
      document.getElementById('balance-due-display').textContent = formatCurrencyFn(balanceDue, currency);
    }

    function saveInvoice() {
      if (editedServices.length === 0) {
        alert('Invoice must have at least one service');
        return;
      }
      
      const subtotal = editedServices.reduce((sum, s) => sum + (s.quantity * s.price), 0);
      const taxRate = parseFloat(document.getElementById('tax-rate').value) || 0;
      const tax = subtotal * (taxRate / 100);
      const discount = parseFloat(document.getElementById('discount-amount').value) || 0;
      const total = subtotal + tax - discount;
      
      const updates = {
        date: document.getElementById('invoice-date').value,
        dueDate: document.getElementById('due-date').value || null,
        status: document.getElementById('invoice-status').value,
        currency: document.getElementById('invoice-currency').value,
        services: editedServices,
        taxRate: taxRate,
        discountAmount: discount,
        discountReason: document.getElementById('discount-reason').value,
        notes: document.getElementById('invoice-notes').value,
        subtotal: subtotal,
        taxAmount: tax,
        total: total,
        amountDue: total - (currentInvoice.amountPaid || 0)
      };
      
      if (confirm('Save changes to this invoice?\n\nThis will update the invoice and may affect financial records.')) {
        // updateInvoice is async
        window.updateInvoice(currentInvoice.id, updates).then(() => {
          // Log audit event
          if (typeof logAuditEvent === 'function') {
            logAuditEvent('invoice_edited', `Invoice ${currentInvoice.invoiceNumber} edited`, {
              invoiceId: currentInvoice.id,
              oldTotal: currentInvoice.total,
              newTotal: total
            });
          }
          
          alert('Invoice updated successfully!');
          window.location.href = `/invoice-details?id=${currentInvoice.id}`;
        }).catch(error => {
          console.error('Error updating invoice:', error);
          alert('Error updating invoice: ' + (error.message || 'Unknown error'));
        });
      }
    }

    function cancelEdit() {
      if (confirm('Discard changes and return to invoice details?')) {
        window.location.href = `/invoice-details?id=${currentInvoice.id}`;
      }
    }
  </script>

  <!-- Universal Sync Status Indicator -->
  <script src="js/universal-sync-status.js?v=202510220113080113081308"></script>

  <script src="js/logout-button.js"></script>
  <script src="js/session-timeout.js"></script>  <!-- Auto-logout after 30 minutes of inactivity -->
</body>
</html>
