<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Pre-EMR Medical Record - MediForge</title>
  <link rel="stylesheet" href="css/styles.css?v=219">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #FFFFF0 0%, #F5F5DC 50%, #FAFAFA 100%);
      padding: 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 135, 83, 0.15);
      padding: 30px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #e0e0e0;
    }
    
    h1 {
      color: #8B4513;
      margin: 0;
      font-size: 2em;
    }
    
    .nav-buttons {
      display: flex;
      gap: 10px;
    }
    
    .nav-buttons button, .nav-buttons a {
      background: linear-gradient(135deg, #8B4513 0%, #CD853F 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }
    
    .nav-buttons button:hover, .nav-buttons a:hover {
      background: linear-gradient(135deg, #CD853F 0%, #8B4513 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(139, 69, 19, 0.3);
    }
    
    .record-meta {
      background: linear-gradient(135deg, rgba(139, 69, 19, 0.1), rgba(205, 133, 63, 0.1));
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      border-left: 4px solid #8B4513;
    }
    
    .record-meta p {
      margin: 8px 0;
      color: #333;
    }
    
    .record-meta strong {
      color: #8B4513;
      font-weight: 600;
    }
    
    .form-group {
      margin-bottom: 25px;
    }
    
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #333;
      font-size: 16px;
    }
    
    textarea {
      width: 100%;
      min-height: 500px;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      line-height: 1.6;
      resize: vertical;
      box-sizing: border-box;
    }
    
    textarea:focus {
      outline: none;
      border-color: #8B4513;
      box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.1);
    }
    
    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 30px;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    
    .btn-cancel {
      background: #6c757d;
      color: white;
    }
    
    .btn-cancel:hover {
      background: #5a6268;
      transform: translateY(-2px);
    }
    
    .btn-save {
      background: linear-gradient(135deg, #8B4513 0%, #CD853F 100%);
      color: white;
    }
    
    .btn-save:hover {
      background: linear-gradient(135deg, #CD853F 0%, #8B4513 100%);
      transform: translateY(-2px);
    }
    
    .btn-save:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 1.1em;
    }
    
    .error {
      text-align: center;
      padding: 40px;
      color: #dc3545;
    }
    
    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #28a745;
      display: none;
    }
    
    .error-message {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #dc3545;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>✏️ Edit Pre-EMR Medical Record</h1>
      <div class="nav-buttons">
        <a href="#" id="back-link">← Back to Records</a>
      </div>
    </div>
    
    <div id="success-message" class="success-message">
      ✅ Record updated successfully!
    </div>
    
    <div id="error-message" class="error-message">
      ❌ Error updating record. Please try again.
    </div>
    
    <div id="record-container">
      <div class="loading">Loading record...</div>
    </div>
  </div>

  <!-- Supabase CDN Library -->
  <script src="js/vendor/supabase.min.js"></script>
  
  <!-- Supabase Client Initialization -->
  <script src="js/supabase-client.js"></script>
  
  <!-- Universal Data Loader -->
  <script src="js/universal-data-loader.js"></script>
  
  <!-- Patients.js - Contains savePatientToSupabase function -->
  <script src="js/patients.js"></script>
  <script src="js/patient-identity.js?v=20260427160000"></script>
  
  <script>
    function getDataKey(key) {
      const user = JSON.parse(localStorage.getItem("user") || "{}");
      if (user.org) {
        return `${user.org}_${key}`;
      }
      return key;
    }

    let currentPatient = null;
    let currentRecord = null;
    let currentPatientId = null;
    let currentRecordId = null;

    async function loadRecord() {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        currentPatientId = urlParams.get("patientId");
        currentRecordId = urlParams.get("recordId");
        
        if (!currentPatientId || !currentRecordId) {
          document.getElementById('record-container').innerHTML = '<div class="error">Missing patient ID or record ID</div>';
          return;
        }

        // Update back link
        document.getElementById('back-link').href = `pre-emr-records.html?patientId=${currentPatientId}`;

        // Load patients
        let patients = [];
        if (typeof window.loadPatientsWithSupabasePriority === 'function') {
          patients = await window.loadPatientsWithSupabasePriority();
        } else {
          patients = JSON.parse(localStorage.getItem(getDataKey("patients")) || "[]");
        }

        // Find patient
        if (typeof window.resolvePatientByIdentifier === 'function') {
          currentPatient = await window.resolvePatientByIdentifier(currentPatientId);
        } else {
          currentPatient = patients.find(p => 
            p.id === currentPatientId || 
            p.patient_id === currentPatientId || 
            p.patientNumber === currentPatientId
          );
        }

        if (!currentPatient) {
          document.getElementById('record-container').innerHTML = '<div class="error">Patient not found</div>';
          return;
        }

        // Find record
        currentRecord = currentPatient.unstructuredRecords?.find(r => r.id === currentRecordId);
        if (!currentRecord) {
          document.getElementById('record-container').innerHTML = '<div class="error">Record not found</div>';
          return;
        }

        if (currentRecord.kind === 'file' || currentRecord.storagePath) {
          document.getElementById('record-container').innerHTML = `
            <div class="record-meta">
              <p><strong>Scanned file or image</strong></p>
              <p>This record is stored as a file. To replace it, delete it from Pre-EMR Medical Records and upload again from <a href="add-unstructured-records.html?patientId=${encodeURIComponent(currentPatientId)}">Add Unstructured Medical Records</a>.</p>
              <p style="margin-top:16px;"><a href="view-pre-emr-record.html?patientId=${encodeURIComponent(currentPatientId)}&recordId=${encodeURIComponent(currentRecordId)}" style="background:#008753;color:white;padding:10px 20px;border-radius:6px;text-decoration:none;font-weight:600;display:inline-block;">View document</a></p>
            </div>
          `;
          return;
        }

        // Display form
        const recordDate = currentRecord.createdAt ? new Date(currentRecord.createdAt).toLocaleDateString('en-US', { 
          year: 'numeric', 
          month: 'long', 
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        }) : 'Unknown Date';

        const updatedDate = currentRecord.updatedAt ? new Date(currentRecord.updatedAt).toLocaleDateString('en-US', { 
          year: 'numeric', 
          month: 'long', 
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        }) : null;

        document.getElementById('record-container').innerHTML = `
          <div class="record-meta">
            <p><strong>Created:</strong> ${recordDate}</p>
            <p><strong>Created By:</strong> ${currentRecord.createdBy || 'Unknown'}</p>
            ${updatedDate ? `<p><strong>Last Updated:</strong> ${updatedDate}</p>` : ''}
            ${currentRecord.updatedBy ? `<p><strong>Last Updated By:</strong> ${currentRecord.updatedBy}</p>` : ''}
          </div>
          <form id="edit-form">
            <div class="form-group">
              <label for="record-text">Medical Record Text:</label>
              <textarea id="record-text" required>${escapeHtml(currentRecord.text || '')}</textarea>
            </div>
            <div class="form-actions">
              <a href="pre-emr-records.html?patientId=${currentPatientId}" class="btn btn-cancel">Cancel</a>
              <button type="submit" class="btn btn-save" id="save-btn">💾 Save Changes</button>
            </div>
          </form>
        `;

        // Add form submit handler
        document.getElementById('edit-form').addEventListener('submit', handleSave);

      } catch (error) {
        console.error('Error loading record:', error);
        document.getElementById('record-container').innerHTML = `<div class="error">Error loading record: ${error.message}</div>`;
      }
    }

    async function handleSave(e) {
      e.preventDefault();
      
      const saveBtn = document.getElementById('save-btn');
      const textarea = document.getElementById('record-text');
      const newText = textarea.value.trim();

      if (!newText) {
        alert('Record text cannot be empty.');
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = '💾 Saving...';

      try {
        // Load fresh patients data
        let patients = [];
        if (typeof window.loadPatientsWithSupabasePriority === 'function') {
          patients = await window.loadPatientsWithSupabasePriority();
        } else {
          patients = JSON.parse(localStorage.getItem(getDataKey("patients")) || "[]");
        }

        const patientIndex = patients.findIndex(p => 
          p.id === currentPatientId || 
          p.patient_id === currentPatientId || 
          p.patientNumber === currentPatientId
        );

        if (patientIndex === -1) {
          throw new Error('Patient not found');
        }

        const patient = patients[patientIndex];

        if (!patient.unstructuredRecords) {
          patient.unstructuredRecords = [];
        }

        const recordIndex = patient.unstructuredRecords.findIndex(r => r.id === currentRecordId);
        if (recordIndex === -1) {
          throw new Error('Record not found');
        }

        // Update record
        const user = JSON.parse(localStorage.getItem("user") || "{}");
        patient.unstructuredRecords[recordIndex].text = newText;
        patient.unstructuredRecords[recordIndex].updatedAt = new Date().toISOString();
        patient.unstructuredRecords[recordIndex].updatedBy = user.username || 'Unknown';

        // Save to localStorage
        localStorage.setItem(getDataKey("patients"), JSON.stringify(patients));

        // Save to Supabase
        if (typeof window.savePatientToSupabase === 'function') {
          try {
            await window.savePatientToSupabase(patient);
            console.log('✅ Edited record saved to Supabase');
          } catch (error) {
            console.warn('⚠️ Error saving edited record to Supabase:', error);
            throw error;
          }
        }

        // Show success and redirect
        document.getElementById('success-message').style.display = 'block';
        setTimeout(() => {
          window.location.href = `pre-emr-records.html?patientId=${currentPatientId}`;
        }, 1000);

      } catch (error) {
        console.error('❌ Error saving edited record:', error);
        document.getElementById('error-message').style.display = 'block';
        document.getElementById('error-message').textContent = `❌ Error: ${error.message}`;
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 Save Changes';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    window.addEventListener('load', loadRecord);
  </script>
</body>
</html>
