<body>
  <h1>Edit Profile</h1>
  
  <!-- Back to Dashboard Button -->
  <div style="margin-bottom: 20px;">
    <a href="dashboard" style="background-color: #667eea; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">

  <div class="profile-form">
    <form id="edit-profile-form">
      <label for="firstName">First Name:</label>
      <input type="text" id="firstName" name="firstName" required>
      
      <label for="lastName">Last Name:</label>
      <input type="text" id="lastName" name="lastName" required>
      
      <label for="username">Username:</label>

        <option value="Female">Female</option>
      </select>
      
      <label for="old-password">Old Password (required only if changing password):</label>

      <input type="password" id="new-password" oninput="handlePasswordChange()">

      <label for="confirm-password">Confirm New Password:</label>

      <label for="role">Role:</label>
      <select id="role" name="role" onchange="toggleOtherRoleField('other-role')">
        <option value="Admin">Administrator</option>
        <option value="Doctor">Doctor</option>
        <option value="Nurse">Nurse</option>
        <option value="Physician Assistant">Physician Assistant</option>
        <option value="Pharmacist">Pharmacist</option>
        <option value="Optometrist">Optometrist</option>
        <option value="Medical Lab Scientist">Medical Lab Scientist</option>
        <option value="Biller/Accountant">Biller/Accountant</option>
        <option value="Office Manager">Office Manager</option>
        <option value="Medical Receptionist">Medical Receptionist</option>
        <option value="Referrals Coordinator">Referrals Coordinator</option>
        <option value="Medical Assistant">Medical Assistant</option>
        <option value="Other">Other (Please specify)</option>

      <input type="text" id="other-role" placeholder="e.g., Physical Therapist, Pharmacist, Lab Technician..." style="display: none;">
      
      <label for="medicalLicenseNumber" id="medicalLicenseLabel" style="display: none;">Medical License Number*:</label>

      <label for="personalPhoneCode">Personal Phone Country Code:</label>
      <select id="personalPhoneCode" style="width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 6px; font-size: 14px;">
        <option value="">-- Select Country Code --</option>
        <!-- Populated by JavaScript -->
      </select>
      
      <label for="personalPhone">Personal Phone Number:</label>
      <input type="tel" id="personalPhone" placeholder="Enter your phone number" style="width: 100%;">
      
      <label for="org">Organization:</label>
      <input type="text" id="org">
      
      <h2>Organization Address</h2>
      <label for="orgAddressLine1">Address Line 1*:</label>
      <input type="text" id="orgAddressLine1" name="orgAddressLine1" required>
      
      <label for="orgAddressLine2">Address Line 2:</label>
      <input type="text" id="orgAddressLine2" name="orgAddressLine2">
      
      <label for="orgCity">City*:</label>

  <script>
    
    
    // African countries data with phone codes - BACKWARD COMPATIBILITY ONLY
    // Use centralized COUNTRIES_DATA instead - loaded via countries-data.js
    // This ensures all 36 states + FCT are available for Nigeria and complete data for all countries
    const africanCountries = {};
    
    // Populate from COUNTRIES_DATA for backward compatibility
    if (typeof COUNTRIES_DATA !== 'undefined') {
      Object.keys(COUNTRIES_DATA).forEach(country => {
        const data = COUNTRIES_DATA[country];
        africanCountries[country] = {
          states: data.states || [],
          code: data.phoneCode || ''
        };
      });
    }
    
    // Function to populate country code dropdowns from COUNTRIES_DATA
    function populateCountryCodeDropdowns() {
      const orgPhoneCodeSelect = document.getElementById('orgPhoneCode');
      const afterHoursPhoneCodeSelect = document.getElementById('afterHoursPhoneCode');
      const personalPhoneCodeSelect = document.getElementById('personalPhoneCode');
      
      if (!orgPhoneCodeSelect || !afterHoursPhoneCodeSelect) return;
      
      // Clear existing options
      orgPhoneCodeSelect.innerHTML = '<option value="">Code</option>';
      afterHoursPhoneCodeSelect.innerHTML = '<option value="">Code</option>';
      if (personalPhoneCodeSelect) {
        personalPhoneCodeSelect.innerHTML = '<option value="">-- Select Country Code --</option>';
      }
      
      // Use COUNTRIES_DATA if available, otherwise fallback to africanCountries
      const countriesData = typeof COUNTRIES_DATA !== 'undefined' ? COUNTRIES_DATA : africanCountries;
      
      // Add country codes sorted by country name
      const sortedCountries = Object.entries(countriesData).sort((a, b) => a[0].localeCompare(b[0]));
      
      sortedCountries.forEach(([country, data]) => {
        const phoneCode = data.phoneCode || data.code || '';
        if (phoneCode) {
          const displayText = `${phoneCode} (${country})`;
          const option1 = new Option(displayText, phoneCode);
          const option2 = new Option(displayText, phoneCode);
          orgPhoneCodeSelect.add(option1);
          afterHoursPhoneCodeSelect.add(option2);
          if (personalPhoneCodeSelect) {
            const option3 = new Option(displayText, phoneCode);
            personalPhoneCodeSelect.add(option3);
          }
        }
      });
    }
    
    // Function to auto-select country code based on organization country
    function autoSelectCountryCode() {
      const countrySelect = document.getElementById('country');
      if (!countrySelect) return;
      
      const selectedCountry = countrySelect.value || countrySelect.options[countrySelect.selectedIndex]?.text || '';
      const countryName = countrySelect.options[countrySelect.selectedIndex]?.text || selectedCountry;
      
      if (!countryName) return;
      
      // Try to find country code from COUNTRIES_DATA or africanCountries
      const countriesData = typeof COUNTRIES_DATA !== 'undefined' ? COUNTRIES_DATA : africanCountries;
      const countryData = countriesData[countryName];
      
      if (countryData) {
        const phoneCode = countryData.phoneCode || countryData.code || '';
        if (phoneCode) {
          const orgPhoneCodeSelect = document.getElementById('orgPhoneCode');
          const afterHoursPhoneCodeSelect = document.getElementById('afterHoursPhoneCode');
          if (orgPhoneCodeSelect) orgPhoneCodeSelect.value = phoneCode;
          if (afterHoursPhoneCodeSelect) afterHoursPhoneCodeSelect.value = phoneCode;
        }
      }
    }
    
    // Display logged-in user info with org
    const userFooter = JSON.parse(localStorage.getItem("user"));
    if (userFooter) {
      document.getElementById("logged-in-info").innerHTML = `${userFooter.username} (${userFooter.role}) from ${userFooter.org} is logged in`;
    }
    
    // Toggle Medical License Number field based on role and pre-populate
    const roleSelect = document.getElementById("role");
    const medicalLicenseInput = document.getElementById("medicalLicenseNumber");
    const medicalLicenseLabel = document.getElementById("medicalLicenseLabel");
    
    // Function to handle password field changes and update requirements
    function handlePasswordChange() {
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const oldPasswordField = document.getElementById('old-password');
      const oldPasswordLabel = document.querySelector('label[for="old-password"]');
      
      // Check if user is trying to change password
      const isChangingPassword = newPassword.trim() !== '' || confirmPassword.trim() !== '';
      
      if (isChangingPassword) {
        // User is changing password - require old password
        oldPasswordField.required = true;
        oldPasswordLabel.innerHTML = 'Old Password*:';
        oldPasswordLabel.style.color = '#333';
        
        // Show password strength indicator
        if (newPassword.trim() !== '') {
          showPasswordStrength(newPassword, 'password-strength');
        }
      } else {
        // User is not changing password - make old password optional
        oldPasswordField.required = false;
        oldPasswordLabel.innerHTML = 'Old Password (required only if changing password):';
        oldPasswordLabel.style.color = '#666';
        
        // Clear password strength indicator
        document.getElementById('password-strength').innerHTML = '';
      }
    }
    
    // Function to toggle "Other" role specification field
    function toggleOtherRoleField(otherRoleFieldId) {
      const roleSelect = event.target;
      const otherRoleLabel = document.getElementById(otherRoleFieldId + '-label');
      const otherRoleInput = document.getElementById(otherRoleFieldId);
      
      if (roleSelect.value === 'Other') {
        otherRoleLabel.style.display = 'block';
        otherRoleInput.style.display = 'block';
        otherRoleInput.required = true;
      } else {
        otherRoleLabel.style.display = 'none';
        otherRoleInput.style.display = 'none';
        otherRoleInput.required = false;
        otherRoleInput.value = ''; // Clear the field when hidden
      }
    }
    
    function toggleMedicalLicense(role) {
      const signatureSection = document.getElementById("signature-section");
      
      // Roles that require medical license number
      const rolesRequiringLicense = ["Doctor", "Nurse", "Physician Assistant", "Pharmacist", "Optometrist", "Medical Lab Scientist"];
      
      if (role === "Doctor") {
        medicalLicenseLabel.style.display = "block";
        medicalLicenseInput.style.display = "block";
        medicalLicenseInput.required = true;
        signatureSection.style.display = "block";
      } else if (rolesRequiringLicense.includes(role)) {
        medicalLicenseLabel.style.display = "block";
        medicalLicenseInput.style.display = "block";
        medicalLicenseInput.required = false;
        signatureSection.style.display = "none";
      } else {
        medicalLicenseLabel.style.display = "none";
        medicalLicenseInput.style.display = "none";
        medicalLicenseInput.required = false;
        signatureSection.style.display = "none";
      }
    }
    
    // Handle country change for organization profile (same as register.html)
    function handleOrgCountryChange() {
      const countrySelect = document.getElementById('country');
      if (!countrySelect) {
        console.warn('⚠️ Country select element not found');
        return;
      }
      
      const selectedValue = countrySelect.value; // could be ISO2 or country name depending on data source
      const selectedText = countrySelect.options[countrySelect.selectedIndex]?.text || '';
      
      console.log('Country changed:', { value: selectedValue, text: selectedText });
      
      if (selectedValue) {
        // Extract country name from text (remove ISO code prefix like "KE Kenya" -> "Kenya")
        let countryName = selectedText;
        
        // If text contains ISO code prefix (e.g., "KE Kenya", "NG Nigeria"), extract just the country name
        if (selectedText && selectedText.length > 3) {
          // Pattern: "XX CountryName" or "XXX CountryName"
          const match = selectedText.match(/^[A-Z]{2,3}\s+(.+)$/);
          if (match && match[1]) {
            countryName = match[1].trim();
          } else {
            // If no ISO prefix pattern, use the text as-is
            countryName = selectedText.trim();
          }
        }
        
        // If still not a valid country name, try to resolve from value
        if (!countryName || countryName.length <= 3 || !COUNTRIES_DATA[countryName]) {
          // Try to find country name from COUNTRIES_DATA using code property
          if (typeof COUNTRIES_DATA !== 'undefined') {
            // First try direct lookup by value
            if (COUNTRIES_DATA[selectedValue]) {
              countryName = selectedValue;
            } else {
              // Try to find by code property
              for (const [name, data] of Object.entries(COUNTRIES_DATA)) {
                if (data.code === selectedValue) {
                  countryName = name;
                  break;
                }
              }
            }
          }
        }
        
        // Update state/province list based on country name
        if (typeof window.populateStateDropdown === 'function') {
          console.log('Calling populateStateDropdown with:', countryName);
          window.populateStateDropdown('state', countryName);
        } else {
          console.warn('⚠️ populateStateDropdown function not available, using fallback');
          // Fallback to legacy function
          handleProfileCountryChange();
        }
        
        // Auto-select phone country code based on selected country
        const phoneCountryCode = document.getElementById('orgPhoneCode');
        const afterHoursPhoneCode = document.getElementById('afterHoursPhoneCode');
        
        let code = '';
        // Use the countryName already resolved above
        
        // Try COUNTRIES_DATA first (more comprehensive)
        if (typeof COUNTRIES_DATA !== 'undefined' && COUNTRIES_DATA[countryName]) {
          code = COUNTRIES_DATA[countryName].phoneCode || '';
        }
        // Fallback to africanCountries if COUNTRIES_DATA doesn't have it
        else if (typeof africanCountries !== 'undefined' && africanCountries[countryName]) {
          code = africanCountries[countryName].code || '';
        }
        
        if (code && phoneCountryCode && afterHoursPhoneCode) {
          // Check if the code exists in the dropdown before setting
          const codeExists = Array.from(phoneCountryCode.options).some(opt => opt.value === code);
          if (codeExists) {
            phoneCountryCode.value = code;
            afterHoursPhoneCode.value = code;
          } else {
            // Code might not be populated yet, try auto-selection after a short delay
            setTimeout(() => {
              autoSelectCountryCode();
            }, 100);
          }
        }
      }
    }

          'Jigawa', 'Kaduna', 'Kano', 'Katsina', 'Kebbi', 'Kogi', 'Kwara', 'Lagos',
          'Nasarawa', 'Niger', 'Ogun', 'Ondo', 'Osun', 'Oyo', 'Plateau', 'Rivers',

          'North Dakota', 'Ohio', 'Oklahoma', 'Oregon', 'Pennsylvania', 'Rhode Island',

    // Copy org code to clipboard
    function copyOrgCodeFromProfile(code) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(code).then(() => {
          alert('Organization code copied to clipboard: ' + code);
        }).catch(() => {
          prompt('Copy this organization code:', code);
        });
      } else {
        prompt('Copy this organization code:', code);
      }
    }
    
    // Load and populate user profile data
    let isLoadingProfile = false; // Prevent infinite loops
    
    async function loadUserProfile() {
      // Prevent infinite loops
      if (isLoadingProfile) {
        console.log('⚠️ Profile load already in progress, skipping...');
        return;
      }
      
      isLoadingProfile = true;
      
      try {
        let user = JSON.parse(localStorage.getItem("user") || '{}');
        if (!user || !user.username) {
          console.log('No user found, redirecting to login');
          window.location.href = '/login';
          return;
        }
        
        // Also check for user in organization-prefixed users array
        let users = JSON.parse(localStorage.getItem(getDataKey("users")) || "[]");
        const userFromArray = users.find(u => u.username === user.username);
        if (userFromArray) {
          // Merge data from users array with current user data
          user = { ...user, ...userFromArray };
          localStorage.setItem("user", JSON.stringify(user));
          console.log('✅ Merged user data from users array');
        }

        // Refresh phone and license from Supabase (source of truth)
        try {
          let supabase = window.supabaseClient;
          let attempts = 0;
          while (!supabase && attempts < 50) {
            await new Promise(resolve => setTimeout(resolve, 100));
            supabase = window.supabaseClient;
            attempts++;
          }
          if (supabase && user.username) {
            const { data: dbUser, error: dbUserError } = await supabase
              .from('users')
              .select('phone, license_number, first_name, last_name, gender, role')
              .eq('username', user.username)
              .maybeSingle();
            if (!dbUserError && dbUser) {

    // Load organization code
    async function loadOrganizationCode() {
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if (!user) return;
      
      const orgName = user.organization || user.org;
      if (!orgName) return;
      
      const organizations = JSON.parse(localStorage.getItem('organizations') || '{}');
      let orgData = organizations[orgName];
      
      if (!orgData) {
        orgData = {};
        organizations[orgName] = orgData;
      }
      
      let orgCode = orgData.orgCode;
      
      // First, try to get org_code from Supabase (source of truth)
      try {
        const supabase = window.supabaseClient;
        if (supabase) {
          const { data: supabaseOrg, error: orgError } = await supabase
            .from('organizations')
            .select('org_code')
            .eq('name', orgName)
            .single();
          
          if (!orgError && supabaseOrg && supabaseOrg.org_code) {
            orgCode = supabaseOrg.org_code;
            // Update localStorage to match Supabase
            orgData.orgCode = orgCode;
            organizations[orgName] = orgData;
            localStorage.setItem('organizations', JSON.stringify(organizations));
            console.log('✅ Loaded organization code from Supabase:', orgCode);
          }
        }
      } catch (error) {
        console.warn('Could not load organization code from Supabase:', error);
      }
      
      // If still no code, generate one using the same method as platform-admin
      if (!orgCode) {
        const prefix = orgName.substring(0, 3).toUpperCase().replace(/[^A-Z]/g, 'X');
        const year = new Date().getFullYear();
        // Use a more deterministic approach - use org name hash instead of random
        // This ensures the same org always gets the same code if regenerated
        const hash = orgName.split('').reduce((acc, char) => {
          return ((acc << 5) - acc) + char.charCodeAt(0);
        }, 0);
        const random = Math.abs(hash).toString(36).substring(0, 4).toUpperCase().padEnd(4, '0');
        orgCode = `${prefix}-${year}-${random}`;
        
        // Supabase-first: Write to Supabase first, then cache in localStorage
        orgData.orgCode = orgCode;
        
        // Try to sync to Supabase first
        try {
          const supabase = window.supabaseClient;
          if (supabase && orgData.id) {
            const { error } = await supabase
              .from('organizations')
              .update({ org_code: orgCode })
              .eq('id', orgData.id);
            
            if (error) {
              console.warn('⚠️ Could not update org code in Supabase:', error);
            } else {
              console.log('✅ Updated org code in Supabase');
            }
          }
        } catch (error) {
          console.warn('⚠️ Exception updating org code in Supabase:', error);
        }
        
        // Cache to localStorage (after Supabase write, or as fallback)
        // Supabase write: supabaseClient.update() completed above
        organizations[orgName] = orgData;
        localStorage.setItem('organizations', JSON.stringify(organizations)); // Cached after supabaseClient.update()
        
        // Legacy: Try to sync to Supabase if possible (backward compatibility)
        try {
          const supabase = window.supabaseClient;
          if (supabase) {
            const { error: updateError } = await supabase
              .from('organizations')
              .update({ org_code: orgCode })
              .eq('name', orgName);
            
            if (!updateError) {
              console.log('✅ Synced organization code to Supabase:', orgCode);
            } else {
              console.warn('Could not sync organization code to Supabase:', updateError);
            }
          }
        } catch (error) {
          console.warn('Could not sync organization code to Supabase:', error);
        }
      }
      
      const container = document.getElementById('org-code-container');
      container.innerHTML = `
        <div class="org-code-container">
          <h3 style="margin: 0 0 15px 0; color: #155724;">🏢 Organization Code</h3>
          <p style="margin: 0 0 10px 0; color: #666;">Share this code with new staff members who need to join <strong>${orgName}</strong>:</p>
          <div style="background: white; padding: 15px; border-radius: 6px; text-align: center; margin: 15px 0;">
            <span style="font-size: 28px; font-weight: bold; font-family: monospace; letter-spacing: 3px; color: #155724;">
              ${orgCode}
            </span>
          </div>
          <button onclick="copyOrgCodeFromProfile('${orgCode}')" style="margin-top: 10px; background: #4CAF50; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px;">
            📋 Copy Organization Code
          </button>
        </div>
      `;
    }

        // Update localStorage first
        const user = JSON.parse(localStorage.getItem("user") || '{}');
        const updatedUser = { ...user, ...profileData, updatedAt: new Date().toISOString() };
        localStorage.setItem("user", JSON.stringify(updatedUser));
        
        // Also update in the users array (for doctor dropdown compatibility)
        let users = JSON.parse(localStorage.getItem(getDataKey("users")) || "[]");
        const userIndex = users.findIndex(u => u.username === user.username);
        if (userIndex !== -1) {
          users[userIndex] = { ...users[userIndex], ...profileData, updatedAt: new Date().toISOString() };
          localStorage.setItem(getDataKey("users"), JSON.stringify(users));
          console.log('✅ Updated user in users array');
        } else {
          // Add user to array if not found
          users.push(updatedUser);
          localStorage.setItem(getDataKey("users"), JSON.stringify(users));
          console.log('✅ Added user to users array');
        }
        
        // Update organization data if organization fields are being updated
        const orgName = user.org || user.organization;
        if (orgName && (profileData.orgAddressLine1 || profileData.orgCity || profileData.country || 
                       profileData.state || profileData.orgPhone || profileData.afterHoursPhone)) {
          const organizations = JSON.parse(localStorage.getItem('organizations') || '{}');
          if (organizations[orgName]) {
            const orgData = organizations[orgName];
            
            // Supabase-first: Update Supabase first, then cache in localStorage
            if (typeof window.supabaseClient !== 'undefined' && window.supabaseClient && orgData.id) {
              try {
                const { error } = await window.supabaseClient
                  .from('organizations')
                  .update({
                    address: profileData.orgAddressLine1 || orgData.addressLine1 || orgData.address,
                    address_line1: profileData.orgAddressLine1 || orgData.addressLine1,
                    address_line2: profileData.orgAddressLine2 || orgData.addressLine2,
                    city: profileData.orgCity || orgData.city,
                    state: profileData.state || orgData.state,
                    country: profileData.country || orgData.country,
                    phone: profileData.orgPhone || orgData.phone,
                    after_hours_phone: profileData.afterHoursPhone || orgData.afterHoursPhone,
                    updated_at: new Date().toISOString()
                  })
                  .eq('id', orgData.id);
                
                if (error) {
                  console.warn('⚠️ Could not update organization in Supabase:', error);
                } else {
                  console.log('✅ Updated organization address/phone in Supabase');
                }
              } catch (error) {
                console.warn('⚠️ Exception updating organization in Supabase:', error);
              }
            }
            
            // Cache to localStorage (after Supabase update, or as fallback)
            // Supabase write: supabaseClient.update() completed above
            organizations[orgName] = {
              ...orgData,
              addressLine1: profileData.orgAddressLine1 || orgData.addressLine1,
              addressLine2: profileData.orgAddressLine2 || orgData.addressLine2,
              city: profileData.orgCity || orgData.city,
              country: profileData.country || orgData.country,
              state: profileData.state || orgData.state,
              phone: profileData.orgPhone || orgData.phone,
              afterHoursPhone: profileData.afterHoursPhone || orgData.afterHoursPhone,
              updatedAt: new Date().toISOString()
            };
            localStorage.setItem('organizations', JSON.stringify(organizations)); // Cached after supabaseClient.update()
          }
        }
        
        // Use working Supabase client approach (same as registration)
        try {
          console.log('🔄 MOBILE SYNC: Starting profile sync...');
          
          // Initialize Supabase client if not available (mobile fallback)
          let supabaseClient = window.supabaseClient;
          if (!supabaseClient && window.supabase) {
            console.log('🔄 MOBILE SYNC: Initializing Supabase client...');
            const SUPABASE_URL = ((window.__SUPABASE_CONFIG__||{}).url||'');
            const SUPABASE_ANON_KEY = ((window.__SUPABASE_CONFIG__||{}).anonKey||'');
            
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
              auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true
              },
              global: {
                headers: {
                  'apikey': SUPABASE_ANON_KEY,
                  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                  'Content-Type': 'application/json'
                }
              }
            });
            window.supabaseClient = supabaseClient;
            console.log('✅ MOBILE SYNC: Supabase client initialized');
          }
          
          if (supabaseClient) {
            // Filter profileData to only include fields that exist in the database schema
            const allowedFields = {
              'first_name': profileData.firstName,
              'last_name': profileData.lastName,
              'gender': profileData.gender,
              'role': profileData.role,
              'phone': profileData.phone,
              'license_number': profileData.medicalLicenseNumber
            };
            
            // Remove undefined/null values
            const cleanProfileData = Object.fromEntries(
              Object.entries(allowedFields).filter(([key, value]) => value !== undefined && value !== null && value !== '')
            );
            
            console.log('🔄 MOBILE SYNC: Sending to Supabase:', cleanProfileData);
            
            const { data, error } = await supabaseClient
              .from('users')
              .update(cleanProfileData)
              .eq('username', user.username);
            
            if (error) {
              console.error('❌ MOBILE SYNC: Supabase update failed:', error);
              // Check if it's a constraint violation for role
              if (error.message && error.message.includes('role') && error.message.includes('check constraint')) {
                throw new Error(`Role "${cleanProfileData.role}" is not allowed in the database. Please contact your administrator to add this role to the system.`);
              }
              throw new Error(`Supabase update failed: ${error.message}`);
            } else {
              console.log('✅ MOBILE SYNC: Profile updated in Supabase successfully');
              
              // Also sync organization contact details to organizations table
              try {
                const orgId = user.organization_id || user.organizationId;
                let resolvedOrgId = orgId;
                if (!resolvedOrgId && user.org) {
                  const { data: orgRow } = await supabaseClient
                    .from('organizations')
                    .select('id')
                    .eq('name', user.org)
                    .single();
                  if (orgRow && orgRow.id) {
                    resolvedOrgId = orgRow.id;
                    // persist for future
                    const updUser = JSON.parse(localStorage.getItem('user') || '{}');
                    updUser.organization_id = orgRow.id;
                    localStorage.setItem('user', JSON.stringify(updUser));
                  }
                }
                if (resolvedOrgId) {
                  const orgUpdate = {
                    address_line1: profileData.orgAddressLine1 || null,
                    address_line2: profileData.orgAddressLine2 || null,
                    city: profileData.orgCity || null,
                    state: profileData.state || null,
                    country: profileData.country || null,
                    phone: profileData.orgPhone || null,
                    after_hours_phone: profileData.afterHoursPhone || null
                  };
                  // Don't filter out nulls - allow updating to null to clear fields
                  const { error: orgErr } = await supabaseClient
                    .from('organizations')
                    .update(orgUpdate)
                    .eq('id', resolvedOrgId);
                  if (orgErr) {
                    console.warn('⚠️ MOBILE SYNC: Organization update failed:', orgErr.message);
                  } else {
                    console.log('✅ MOBILE SYNC: Organization address and contact updated in Supabase');
                    
                    // Update localStorage cache
                    // Supabase write: supabaseClient.update() completed above
                    const orgName = user.org || user.organization;
                    if (orgName) {
                      const organizations = JSON.parse(localStorage.getItem('organizations') || '{}');
                      if (organizations[orgName]) {
                        organizations[orgName] = {
                          ...organizations[orgName],
                          addressLine1: profileData.orgAddressLine1 || organizations[orgName].addressLine1,
                          addressLine2: profileData.orgAddressLine2 || organizations[orgName].addressLine2,
                          city: profileData.orgCity || organizations[orgName].city,
                          state: profileData.state || organizations[orgName].state,
                          country: profileData.country || organizations[orgName].country,
                          phone: profileData.orgPhone || organizations[orgName].phone,
                          afterHoursPhone: profileData.afterHoursPhone || organizations[orgName].afterHoursPhone
                        };
                        localStorage.setItem('organizations', JSON.stringify(organizations)); // Cached after supabaseClient.update()
                      }
                    }
                  }
                }
              } catch (orgSyncErr) {
                console.warn('⚠️ MOBILE SYNC: Error syncing organization contact:', orgSyncErr.message);
              }
              
              alert('✅ Profile updated successfully and synced to cloud!');
            }
          } else {
            throw new Error('Supabase client not available');
          }
        } catch (supabaseError) {
          console.log('❌ MOBILE SYNC: Error:', supabaseError);
          
          // Show detailed error on mobile screen
          const errorDetails = `❌ SYNC FAILED
Error: ${supabaseError.message}
Please try again or contact support.`;
          alert(errorDetails);
        }
        
        return true;
      } catch (error) {
        console.error('Error updating user profile:', error);
        return false;
      }
    }
    
    // Handle form submission
    document.getElementById('edit-profile-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const formData = new FormData(this);
      const profileData = Object.fromEntries(formData.entries());
      
      // Validate required fields
      const missingFields = [];
      if (!profileData.firstName) missingFields.push('First Name');
      if (!profileData.lastName) missingFields.push('Last Name');
      if (!profileData.gender) missingFields.push('Gender');
      if (!profileData.role) missingFields.push('Role');
      if (!profileData.orgAddressLine1) missingFields.push('Address Line 1');
      if (!profileData.orgCity) missingFields.push('City');
      if (!profileData.country) missingFields.push('Country');
      if (!profileData.state) missingFields.push('State');
      
      if (missingFields.length > 0) {
        alert(`Please fill in the following required fields: ${missingFields.join(', ')}`);
        return;
      }
      
      // Validate password if changing
      if (profileData['new-password'] && profileData['new-password'] !== profileData['confirm-password']) {
        alert('New passwords do not match.');
        return;
      }
      
      // Remove password fields from profile data (handle separately)
      const { 'old-password': oldPassword, 'new-password': newPassword, 'confirm-password': confirmPassword, ...cleanProfileData } = profileData;
      
      // Combine country codes with phone numbers
      const orgPhoneCode = document.getElementById('orgPhoneCode').value;
      const orgPhone = document.getElementById('orgPhone').value;
      const afterHoursPhoneCode = document.getElementById('afterHoursPhoneCode').value;
      const afterHoursPhone = document.getElementById('afterHoursPhone').value;
      const personalPhoneCode = document.getElementById('personalPhoneCode').value;
      const personalPhone = document.getElementById('personalPhone').value.trim();
      
      if (orgPhoneCode && orgPhone) {
        cleanProfileData.orgPhone = `${orgPhoneCode} ${orgPhone}`;
      }
      if (afterHoursPhoneCode && afterHoursPhone) {
        cleanProfileData.afterHoursPhone = `${afterHoursPhoneCode} ${afterHoursPhone}`;
      }
      // Save personal phone
      if (personalPhoneCode && personalPhone) {
        cleanProfileData.phone = `${personalPhoneCode} ${personalPhone}`;
      } else if (personalPhone) {
        cleanProfileData.phone = personalPhone;
      } else {
        cleanProfileData.phone = '';
      }
      
      // Update profile
      const success = await updateUserProfile(cleanProfileData);
      
      if (success) {
        alert('Profile updated successfully!');
        // Reload the page to show updated data
        window.location.reload();
      } else {
        alert('Error updating profile. Please try again.');
      }
    });
    
    // Signature upload functionality
    document.addEventListener('DOMContentLoaded', function() {
      const signatureUpload = document.getElementById('signature-upload');
      const signaturePreview = document.getElementById('signature-preview');
      const signatureDisplay = document.getElementById('signature-display');
      const removeSignatureBtn = document.getElementById('remove-signature');
      const signatureStatus = document.getElementById('signature-status');
      
      // Load existing signature if available
      loadExistingSignature();
      
      // Handle signature upload
      signatureUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          if (file.type === 'application/pdf' || file.type === 'image/png') {
            uploadSignature(file);
          } else {
            signatureStatus.innerHTML = '<span style="color: red;">Please upload only PDF or PNG files.</span>';
          }
        }
      });
      
      // Handle signature removal
      removeSignatureBtn.addEventListener('click', function() {
        removeSignature();
      });
      
      function uploadSignature(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const signatureData = {
            data: e.target.result,
            type: file.type,
            name: file.name,
            uploadedAt: new Date().toISOString()
          };
          
          // Save signature to user profile
          const user = JSON.parse(localStorage.getItem("user"));
          if (user) {
            user.signature = signatureData;
            localStorage.setItem("user", JSON.stringify(user));
            
            // Display signature preview
            displaySignaturePreview(signatureData);
            signatureStatus.innerHTML = '<span style="color: green;">Signature uploaded successfully!</span>';
          }
        };
        reader.readAsDataURL(file);
      }
      
      function displaySignaturePreview(signatureData) {
        if (signatureData.type === 'image/png') {
          signatureDisplay.innerHTML = `
            <img src="${signatureData.data}" style="max-width: 200px; max-height: 100px; border: 1px solid #ccc; background: white;" alt="Signature Preview">
            <p style="margin: 5px 0; font-size: 12px; color: #666;">Uploaded: ${new Date(signatureData.uploadedAt).toLocaleString()}</p>
          `;
        } else if (signatureData.type === 'application/pdf') {
          signatureDisplay.innerHTML = `
            <div style="border: 1px solid #ccc; padding: 10px; background: white; max-width: 200px; text-align: center;">
              <p style="margin: 0; font-weight: bold;">PDF Signature</p>
              <p style="margin: 5px 0; font-size: 12px; color: #666;">${signatureData.name}</p>
              <p style="margin: 5px 0; font-size: 12px; color: #666;">Uploaded: ${new Date(signatureData.uploadedAt).toLocaleString()}</p>
            </div>
          `;
        }
        signaturePreview.style.display = 'block';
      }
      
      function loadExistingSignature() {
        const user = JSON.parse(localStorage.getItem("user"));
        if (user && user.signature) {
          displaySignaturePreview(user.signature);
        }
      }
      
      function removeSignature() {
        if (confirm('Are you sure you want to remove your signature?')) {
          const user = JSON.parse(localStorage.getItem("user"));
          if (user) {
            delete user.signature;
            localStorage.setItem("user", JSON.stringify(user));
            
            signaturePreview.style.display = 'none';
            signatureUpload.value = '';
            signatureStatus.innerHTML = '<span style="color: orange;">Signature removed.</span>';
          }
        }
      }
    });
    
    // Initialize page when DOM is loaded
    // Listen for organization address sync completion (only once)
    let hasReloadedAfterSync = false;
    window.addEventListener('organizationAddressSynced', function(event) {
      if (hasReloadedAfterSync) {
        console.log('⚠️ Already reloaded after sync, skipping...');
        return;
      }
      hasReloadedAfterSync = true;
      console.log('🔄 Organization address sync completed, reloading profile data...');
      // Reload profile data after sync completes (only once)
      setTimeout(() => {
        isLoadingProfile = false; // Reset flag before reload
        loadUserProfile();
      }, 500);
    });
    
    document.addEventListener('DOMContentLoaded', function() {
      
      // Wait for countries data to be available (mobile compatibility)
      let retryCount = 0;
      const maxRetries = 50; // 5 seconds total
      
      const initializeDropdowns = () => {
        if (typeof window.populateCountryDropdown === 'function' && typeof COUNTRIES_DATA !== 'undefined') {
          
          // Initialize country and state dropdowns (same as register.html)
          window.populateCountryDropdown('country');
          
          // Initialize country code dropdowns
          populateCountryCodeDropdowns();
          
          // Load user profile data
          loadUserProfile();
          
          // Auto-select country codes after profile is loaded
          // Also trigger when country dropdown changes
          setTimeout(() => {
            autoSelectCountryCode();
            // Add listener for country changes to auto-update phone codes
            const countrySelect = document.getElementById('country');
            if (countrySelect) {
              countrySelect.addEventListener('change', function() {
                setTimeout(() => autoSelectCountryCode(), 100);
              });
            }
            
            // Add listener to state dropdown to auto-populate when clicked if empty
            const stateSelect = document.getElementById('state');
            if (stateSelect) {
              stateSelect.addEventListener('focus', function() {
                const countryValue = countrySelect ? countrySelect.value : '';
                // If state dropdown is empty (only has default option) and country is selected, populate it
                if (countryValue && stateSelect.options.length <= 1) {
                  console.log('State dropdown empty, populating for country:', countryValue);
                  if (typeof window.populateStateDropdown === 'function') {
                    window.populateStateDropdown('state', countryValue);
                  } else {
                    handleProfileCountryChange();
                  }
                }
              });
              
              // Also handle click event for better compatibility
              stateSelect.addEventListener('click', function() {
                const countryValue = countrySelect ? countrySelect.value : '';
                // If state dropdown is empty (only has default option) and country is selected, populate it
                if (countryValue && stateSelect.options.length <= 1) {
                  console.log('State dropdown empty, populating for country:', countryValue);
                  if (typeof window.populateStateDropdown === 'function') {
                    window.populateStateDropdown('state', countryValue);
                  } else {
                    handleProfileCountryChange();
                  }
                }
              });
            }
          }, 500);
        } else if (retryCount < maxRetries) {
          retryCount++;
          setTimeout(initializeDropdowns, 100);
        } else {
          console.error('ERROR: Countries data failed to load after maximum retries');
          // Fallback: try to initialize anyway
          try {
            if (typeof window.populateCountryDropdown === 'function') {
              window.populateCountryDropdown('country');
            }
            populateCountryCodeDropdowns();
            loadUserProfile();
            
            // Add state dropdown listeners even in fallback
            setTimeout(() => {
              const countrySelect = document.getElementById('country');
              const stateSelect = document.getElementById('state');
              if (stateSelect && countrySelect) {
                stateSelect.addEventListener('focus', function() {
                  const countryValue = countrySelect.value;
                  if (countryValue && stateSelect.options.length <= 1) {
                    if (typeof window.populateStateDropdown === 'function') {
                      window.populateStateDropdown('state', countryValue);
                    } else {
                      handleProfileCountryChange();
                    }
                  }
                });
                stateSelect.addEventListener('click', function() {
                  const countryValue = countrySelect.value;
                  if (countryValue && stateSelect.options.length <= 1) {
                    if (typeof window.populateStateDropdown === 'function') {
                      window.populateStateDropdown('state', countryValue);
                    } else {
                      handleProfileCountryChange();
                    }
                  }
                });
              }
            }, 500);
          } catch (error) {
            console.error('ERROR: Fallback initialization failed:', error);
          }
        }
      };
      
      // Start initialization
      initializeDropdowns();
      
      // Add event listeners programmatically (more reliable than inline onchange)
      const countrySelect = document.getElementById('country');
      const stateSelect = document.getElementById('state');
      
      // Event listener is handled by inline onchange in HTML (same as register.html)
      
    });
    
    // Initialize role change handler
    roleSelect.addEventListener("change", function() {
      toggleMedicalLicense(this.value);
    });
    
    // Initialize signature section visibility based on current role
    const currentUser = JSON.parse(localStorage.getItem("user"));
    if (currentUser && currentUser.role === "Doctor") {
      toggleMedicalLicense("Doctor");
    }
    
  </script>
