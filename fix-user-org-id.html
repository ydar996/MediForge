<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix User Organization ID</title>
  <!-- Auto Hard Refresh -->
  <script src="js/auto-hard-refresh.js?v=20251022080000"></script>
</head>
<body>
    <h1>Fix User Organization ID</h1>
    <div id="output"></div>
    
    <script>
        console.log('=== Fixing User Organization ID ===');
        
        // Get current user
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        console.log('Current user:', user);
        
        // Get organizations
        const organizations = JSON.parse(localStorage.getItem('organizations') || '{}');
        console.log('Available organizations:', organizations);
        
        // Fix organization ID for Mecure Clinics users
        if (user.username === 'ydar2' || user.email === 'ydar2@mecureclinics.com') {
            console.log('ðŸ”§ Fixing organization ID for ydar2...');
            
            // Set the organization ID
            user.organizationId = '576522cc-e769-4fb4-9487-3d150857d970';
            user.org = 'Mecure Clinics';
            
            // Update user in localStorage
            localStorage.setItem('user', JSON.stringify(user));
            
            console.log('âœ… Fixed user organization ID:', user.organizationId);
            
            // Also ensure organizations object has Mecure Clinics
            if (!organizations['Mecure Clinics']) {
                organizations['Mecure Clinics'] = {
                    id: '576522cc-e769-4fb4-9487-3d150857d970',
                    name: 'Mecure Clinics',
                    addressLine1: '123 Medical Street',
                    city: 'Lagos',
                    country: 'Nigeria',
                    state: 'Lagos',
                    phone: '+234-123-456-7890'
                };
                localStorage.setItem('organizations', JSON.stringify(organizations));
                console.log('âœ… Added Mecure Clinics to organizations');
            }
        }
        
        // Display results
        const updatedUser = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('output').innerHTML = `
            <h2>User Fixed:</h2>
            <pre>${JSON.stringify(updatedUser, null, 2)}</pre>
            <p><strong>Organization ID:</strong> ${updatedUser.organizationId || 'NOT SET'}</p>
            <p><strong>Organization:</strong> ${updatedUser.org || 'NOT SET'}</p>
        `;
        
        console.log('âœ… User organization ID fix complete');
    </script>
</body>
</html>
