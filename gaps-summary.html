        // Helper functions
        function getDataKey(key) {
            try {
                const user = JSON.parse(localStorage.getItem("user"));
                return user ? `${user.org}_${key}` : key;
            } catch (e) {
                return key;
            }
        }
        
        // Helper to ensure hasDiabetes field exists
        function ensureDiabetesField(patients) {
            let changed = false;
            const updatedPatients = patients.map(p => {
                if (p.hasDiabetes === undefined) {
                    p.hasDiabetes = false;
                    changed = true;
                }
                return p;
            });
            
            if (changed) {
                const prefixedKey = getDataKey("patients");
                localStorage.setItem(prefixedKey, JSON.stringify(updatedPatients));
            }
            
            return updatedPatients;
        }
        
        // Helper function to check if patient has recent intervention
        function hasRecentIntervention(patient, intervention, years) {
            if (!patient || !intervention) return false;
            
            // Check immunizations
            if (patient.immunizations && Array.isArray(patient.immunizations)) {
                const relevantVaccines = getRelevantVaccines(intervention);
                if (relevantVaccines.length > 0) {
                    const cutoff = new Date();
                    cutoff.setFullYear(cutoff.getFullYear() - years);
                    const recent = patient.immunizations.some(imm => {
                        if (!imm.dateAdded) return false;
                        const immDate = new Date(imm.dateAdded);
                        return relevantVaccines.some(v => 
                            (imm.vaccine && imm.vaccine.toLowerCase().includes(v.toLowerCase())) &&
                            immDate >= cutoff
                        );
                    });
                    if (recent) return true;
                }
            }
            
            // Check visits for documented interventions
            if (patient.visits && Array.isArray(patient.visits)) {
                const cutoff = new Date();
                cutoff.setFullYear(cutoff.getFullYear() - years);
                return patient.visits.some(visit => {
                    if (!visit.visitDate) return false;
                    const visitDate = new Date(visit.visitDate);
                    if (visitDate < cutoff) return false;
                    
                    // Check if intervention is mentioned in visit notes
                    const notes = (visit.soap?.subjective?.chiefComplaint || '') +
                                 (visit.soap?.objective?.physicalExam || '') +
                                 (visit.soap?.assessment?.diagnosis || '') +
                                 (visit.soap?.plan?.plan || '');
                    return notes.toLowerCase().includes(intervention.toLowerCase());
                });
            }
            
            return false;
        }
        
        // Helper to get relevant vaccines for an intervention
        function getRelevantVaccines(intervention) {
            const lower = intervention.toLowerCase();
            const vaccines = [];
            if (lower.includes('influenza') || lower.includes('flu')) vaccines.push('influenza');
            if (lower.includes('tdap') || lower.includes('tetanus')) vaccines.push('tdap', 'td', 'tetanus');
            if (lower.includes('pneumococcal') || lower.includes('pneumonia')) vaccines.push('pneumococcal', 'pneumonia');
            if (lower.includes('hpv')) vaccines.push('hpv', 'human papillomavirus');
            if (lower.includes('meningococcal')) vaccines.push('meningococcal');
            if (lower.includes('zoster') || lower.includes('shingles')) vaccines.push('zoster', 'shingles');
            if (lower.includes('hepatitis b') || lower.includes('hep b')) vaccines.push('hepatitis b', 'hep b');
            if (lower.includes('dtap') || lower.includes('mmr') || lower.includes('hib') || 
                lower.includes('varicella') || lower.includes('rotavirus') || lower.includes('pcv')) {
                vaccines.push('dtap', 'mmr', 'hib', 'hep b', 'varicella', 'pcv', 'rotavirus');
            }
            return vaccines;
        }
        
        // Helper to get frequency years
        function getFrequencyYears(frequency) {
            if (!frequency) return 1;
            const lower = frequency.toLowerCase();
            if (lower.includes('annually') || lower.includes('annual')) return 1;
            if (lower.includes('every 2 years') || lower.includes('every 2 year')) return 2;
            if (lower.includes('every 3 years') || lower.includes('every 3 year')) return 3;
            if (lower.includes('every 5 years') || lower.includes('every 5 year')) return 5;
            if (lower.includes('every 10 years') || lower.includes('every 10 year')) return 10;
            if (lower.includes('month')) {
                const match = frequency.match(/(\d+)\s*month/);
                if (match) return parseInt(match[1]) / 12;
            }
            return 1; // Default to 1 year
        }
        
        function calculateAge(dob) {
            let parts = dob.split('-');
            let year, month, day;
            try {
                year = parseInt(parts[0]);
                month = parseInt(parts[1]) - 1;
                day = parseInt(parts[2]);
                let birthDate = new Date(year, month, day);
                if (isNaN(birthDate.getTime())) {
                    if (parts[0].length === 2 && parts[2].length === 4 && parseInt(parts[0]) <= 31 && parseInt(parts[1]) <= 12) {
                        year = parseInt(parts[2]);
                        month = parseInt(parts[1]) - 1;
                        day = parseInt(parts[0]);
                        birthDate = new Date(year, month, day);
                        if (isNaN(birthDate.getTime())) return NaN;
                    } else {
                        return NaN;
                    }
                }
                let age = new Date().getFullYear() - birthDate.getFullYear();
                const m = new Date().getMonth() - birthDate.getMonth();
                if (m < 0 || (m === 0 && new Date().getDate() < birthDate.getDate())) {
                    age--;
                }
                return age;
            } catch (e) {
                return NaN;
            }
        }
        
        function matchesAgeRange(age, range) {
            if (range === 'During pregnancy' || range === 'Post-delivery') {
                return false;
            }
            if (range.endsWith('+')) {
                return age >= parseInt(range);
            }
            const [minStr, maxStr] = range.split('-');
            let min = parseInt(minStr);
            let max = maxStr ? parseInt(maxStr.replace(' months', '')) : Infinity;
            if (maxStr && maxStr.includes(' months')) max /= 12;
            return age >= min && age <= max;
        }
        
        async function aggregateGaps() {
            // Use Supabase-first data loading
            const patients = await window.loadPatientsWithSupabasePriority();
            
            if (!patients || !Array.isArray(patients) || patients.length === 0) {
                console.warn('⚠️ No patients found');
                return [];
            }
            
            // Ensure hasDiabetes field exists
            const updatedPatients = ensureDiabetesField(patients);
            
            // Use the global PREVENTIVE_INTERVENTIONS if available, otherwise use local
            const interventions = window.PREVENTIVE_INTERVENTIONS || LOCAL_PREVENTIVE_INTERVENTIONS;
            
            const summary = interventions.map(int => {
                let totalRelevant = 0, addressed = 0, unaddressedPatients = [];
                
                updatedPatients.forEach(patient => {
                    if (!patient.dob) return; // Skip patients without DOB
                    
                    const age = calculateAge(patient.dob);
                    if (isNaN(age) || age < 0) return; // Skip invalid ages
                    
                    const matchesAge = matchesAgeRange(age, int.ageRange);
                    const baseGender = int.gender.split(' ')[0];
                    const matchesGender = (baseGender === 'Any') || (baseGender.toLowerCase() === (patient.gender || '').toLowerCase());
                    const hasDiabetes = patient.hasDiabetes ?? false;
                    const requiresDiabetes = int.gender.includes('with diabetes');
                    const matchesDiabetes = !requiresDiabetes || hasDiabetes;
                    
                    if (matchesAge && matchesGender && matchesDiabetes) {
                        totalRelevant++;
                        
                        // Use actual preventive gaps logic instead of random
                        const years = getFrequencyYears(int.frequency);
                        const autoAddressed = hasRecentIntervention(patient, int.intervention, years);
                        const gapEntry = patient.preventiveGaps?.find(g => g.intervention === int.intervention);
                        const isAddressed = gapEntry ? gapEntry.addressed : autoAddressed;
                        
                        if (isAddressed) {
                            addressed++;
                        } else {
                            const patientName = `${patient.firstName || ''} ${patient.lastName || ''}`.trim() || 
                                              patient.name || 
                                              `Patient ${patient.id}`;
                            unaddressedPatients.push({ id: patient.id, name: patientName });
                        }
                    }
                });
                
                return {
                    intervention: int.intervention,
                    totalRelevant,
                    addressed,
                    unaddressed: totalRelevant - addressed,
                    unaddressedPatients
                };
            });
            
            return summary;
        }
        
        async function populateTable() {
            try {
                const summary = await aggregateGaps();
                const tbody = document.getElementById('summary-list');
                if (!tbody) return;
                
                tbody.innerHTML = '';
                
                if (summary.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px; color: #666;">No preventive care gap data available</td></tr>';
                    document.getElementById('total-patients').textContent = '0';
                    document.getElementById('last-updated').textContent = new Date().toLocaleString();
                    return;
                }
                
                summary.forEach((item, index) => {
                    const row = document.createElement('tr');
                    const drillDownLink = item.unaddressed > 0 ? 
                        `<a href="unaddressed-patients?intIndex=${index}" class="link">List of Unaddressed patients</a>` : 
                        'N/A';
                    
                    row.innerHTML = `
                        <td>${item.intervention}</td>
                        <td>${item.totalRelevant}</td>
                        <td>${item.addressed}</td>
                        <td>${item.unaddressed}</td>
                        <td>${drillDownLink}</td>
                    `;
                    tbody.appendChild(row);
                });
                
                // Update stats - get patient count from Supabase
                const patients = await window.loadPatientsWithSupabasePriority();
                document.getElementById('total-patients').textContent = patients ? patients.length : '0';
                document.getElementById('last-updated').textContent = new Date().toLocaleString();
            } catch (error) {
                console.error('❌ Error populating gaps summary table:', error);
                const tbody = document.getElementById('summary-list');
                if (tbody) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px; color: #d32f2f;">Error loading data. Please refresh the page.</td></tr>';
                }
            }
        }
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            populateTable();
            
            // Force table alignment AND Nigerian Heritage theme after DOM is ready
            function enforceTableStyles() {
                const table = document.querySelector('.gaps-summary-table');
                if (!table) return;
                
                // Force table display properties
                table.style.setProperty('display', 'table', 'important');
                table.style.setProperty('table-layout', 'fixed', 'important');
                table.style.setProperty('width', '100%', 'important');
                table.style.setProperty('border-collapse', 'collapse', 'important');
                
                const thead = table.querySelector('thead');
                const tbody = table.querySelector('tbody');
                if (thead) {
                    thead.style.setProperty('display', 'table-header-group', 'important');
                    
                    // Force Nigerian Heritage theme on headers
                    const headerRows = thead.querySelectorAll('tr');
                    headerRows.forEach(row => {
                        row.style.setProperty('display', 'table-row', 'important');
                        const headers = row.querySelectorAll('th');
                        headers.forEach((th, index) => {
                            th.style.setProperty('display', 'table-cell', 'important');
                            th.style.setProperty('background', 'linear-gradient(135deg, #008753 0%, #006b42 100%)', 'important');
                            th.style.setProperty('color', 'white', 'important');
                            th.style.setProperty('border', '1px solid #006b42', 'important');
                            th.style.setProperty('font-weight', '600', 'important');
                            th.style.setProperty('padding', '12px 10px', 'important');
                            
                            // Column widths
                            if (index === 0) {
                                th.style.setProperty('width', '50%', 'important');
                                th.style.setProperty('min-width', '300px', 'important');
                                th.style.setProperty('text-align', 'left', 'important');
                            } else {
                                th.style.setProperty('width', '12.5%', 'important');
                                th.style.setProperty('min-width', index === 4 ? '150px' : '100px', 'important');
                                th.style.setProperty('text-align', 'center', 'important');
                            }
                        });
                    });
                }
                
                if (tbody) {
                    tbody.style.setProperty('display', 'table-row-group', 'important');
                    
                    // Force row and cell display properties with Nigerian Heritage theme
                    const rows = tbody.querySelectorAll('tr');
                    rows.forEach((row, rowIndex) => {
                        row.style.setProperty('display', 'table-row', 'important');
                        const cells = row.querySelectorAll('td');
                        cells.forEach((cell, cellIndex) => {
                            cell.style.setProperty('display', 'table-cell', 'important');
                            cell.style.setProperty('padding', '12px 10px', 'important');
                            cell.style.setProperty('border', '1px solid #e0e0e0', 'important');
                            cell.style.setProperty('box-sizing', 'border-box', 'important');
                            
                            // Column widths matching headers
                            if (cellIndex === 0) {
                                cell.style.setProperty('width', '50%', 'important');
                                cell.style.setProperty('min-width', '300px', 'important');
                                cell.style.setProperty('text-align', 'left', 'important');
                            } else {
                                cell.style.setProperty('width', '12.5%', 'important');
                                cell.style.setProperty('min-width', cellIndex === 4 ? '150px' : '100px', 'important');
                                cell.style.setProperty('text-align', 'center', 'important');
                            }
                            
                            // Nigerian Heritage theme alternating rows
                            if (rowIndex % 2 === 1) {
                                cell.style.setProperty('background-color', 'rgba(0, 135, 83, 0.1)', 'important');
                            } else {
                                cell.style.setProperty('background-color', 'white', 'important');
                            }
                            
                            // Hover effect
                            row.addEventListener('mouseenter', function() {
                                const hoverCells = this.querySelectorAll('td');
                                hoverCells.forEach(c => {
                                    c.style.setProperty('background-color', 'rgba(0, 135, 83, 0.3)', 'important');
                                });
                            });
                            row.addEventListener('mouseleave', function() {
                                const hoverCells = this.querySelectorAll('td');
                                hoverCells.forEach((c, idx) => {
                                    if ((rowIndex % 2) === 1) {
                                        c.style.setProperty('background-color', 'rgba(0, 135, 83, 0.1)', 'important');
                                    } else {
                                        c.style.setProperty('background-color', 'white', 'important');
                                    }
                                });
                            });
                        });
                    });
                }
            }
            
            // Run immediately and after delays to catch dynamic content
            setTimeout(enforceTableStyles, 50);
            setTimeout(enforceTableStyles, 200);
            setTimeout(enforceTableStyles, 500);
            setTimeout(enforceTableStyles, 1000);
            
            // User info
            try {
                const user = JSON.parse(localStorage.getItem("user"));
                if (user) {
                    document.getElementById("user-info").innerHTML = `${user.username} (${user.role}) from ${user.org} is logged in`;
                }
            } catch (e) {
                document.getElementById("user-info").innerHTML = "User info unavailable";
            }
        });
    </script>
</body>
</html>
