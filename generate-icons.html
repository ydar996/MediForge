<!DOCTYPE html>
<html>
<head>
  <script src="/js/supabase-env.js"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Generate Icons</title>

  <!-- Supabase CDN Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.1">

  <!-- Supabase Client Initialization -->
  <script src="js/supabase-client.js?v=202510220113080113081308">

  <!-- Universal Data Loader for Supabase-first architecture -->
  <script src="js/universal-data-loader.js?v=202510220113080113081308"></script>
</head>
<body>
    <h1>Icon Generator</h1>
    <canvas id="canvas" width="144" height="144" style="border: 1px solid #ccc;"></canvas>
    <br><br>
    <button onclick="generateAllIcons()">Generate All Icons</button>
    
    <script>
        function generateAllIcons() {
            const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
            
            sizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                
                // Green background
                ctx.fillStyle = '#4CAF50';
                ctx.fillRect(0, 0, size, size);
                
                // White medical cross
                ctx.fillStyle = 'white';
                const crossWidth = Math.max(4, size / 12);
                const crossLength = size * 0.6;
                const centerX = size / 2;
                const centerY = size / 2;
                
                // Vertical line
                ctx.fillRect(centerX - crossWidth/2, centerY - crossLength/2, crossWidth, crossLength);
                // Horizontal line
                ctx.fillRect(centerX - crossLength/2, centerY - crossWidth/2, crossLength, crossWidth);
                
                // Add "EHR" text for larger icons
                if (size >= 96) {
                    ctx.fillStyle = 'white';
                    ctx.font = `bold ${Math.max(12, size/8)}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.fillText('EHR', centerX, centerY + size/6);
                }
                
                // Download
                const link = document.createElement('a');
                link.download = `icon-${size}x${size}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
        
        // Auto-generate on load
        window.onload = function() {
            generateAllIcons();
        };
    </script>

  <!-- General helpers -->
  <script src="js/main.js?v=20251101160000"></script>

  <!-- Universal Sync Status Indicator -->
  <script src="js/universal-sync-status.js?v=202510220113080113081308"></script>
</body>
</html>
