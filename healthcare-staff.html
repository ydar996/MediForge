<body>
  <a href="platform-dashboard" class="back-button"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to Platform Dashboard</a>
  
  <div class="page-header">
    <h1><i class="fa-solid fa-user-doctor" aria-hidden="true"></i> Healthcare Staff Directory</h1>
    <p>Comprehensive listing of all doctors, nurses, and physician assistants across the platform</p>
  </div>
  
  <!-- Filters -->
  <div class="filters-section">
    <h2 style="margin-top: 0; margin-bottom: 20px; border-bottom: none; padding-bottom: 0;"><i class="fa-solid fa-filter" aria-hidden="true"></i> Filter Healthcare Staff</h2>
    <div class="filters-grid">
      <div class="filter-group">
        <label for="country-filter">Country:</label>
        <select id="country-filter">
          <option value="">All Countries</option>
        </select>
      </div>
      
      <div class="filter-group">
        <label for="role-filter">Role:</label>
        <select id="role-filter">
          <option value="">All Healthcare Professionals</option>
          <option value="Doctor">Doctors</option>
          <option value="Nurse">Nurses</option>
          <option value="Physician Assistant">Physician Assistants</option>
        </select>
      </div>
      
      <div class="filter-group">
        <label for="gender-filter">Gender:</label>
        <select id="gender-filter">
          <option value="">All Genders</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>
      
      <div class="filter-group">
        <label for="search-filter">Search by Name/License:</label>
        <input type="text" id="search-filter" placeholder="Search...">
      </div>
    </div>
    
    <div class="filter-buttons">
      <button class="apply-btn" onclick="applyFilters()">Apply Filters</button>
      <button class="reset-btn" onclick="resetFilters()">Reset All</button>
      <button class="apply-btn" onclick="exportToCSV()" style="background: #4CAF50;"><i class="fa-solid fa-file-csv" aria-hidden="true"></i> Export to CSV</button>
    </div>
  </div>
  
  <!-- Summary Statistics -->
  <div class="stats-grid" id="summary-stats">
    <!-- Populated by JavaScript -->
  </div>
  
  <!-- Patient-to-Staff Ratio Analytics -->
  <div class="section">
    <h2><i class="fa-solid fa-chart-line" aria-hidden="true"></i> Patient-to-Healthcare Professional Ratio</h2>
    <div id="ratio-analytics">
      <!-- Populated by JavaScript -->
    </div>
  </div>
  
  <!-- Gender Analysis -->
  <div class="section">
    <h2><i class="fa-solid fa-venus-mars" aria-hidden="true"></i> Healthcare Professionals by Gender</h2>
    <div id="gender-analysis">
      <!-- Populated by JavaScript -->
    </div>
  </div>
  
  <!-- Staff Listings -->
  <div id="staff-listings">
    <!-- Populated by JavaScript -->
  </div>
  
  <script>
    let currentFilters = {
      country: '',
      role: '',
      gender: '',
      search: ''
    };
    
    let allStaff = [];
    
    window.addEventListener('load', async function() {
      // Check platform admin auth
      const platformAdmin = JSON.parse(localStorage.getItem("platformAdmin") || "null");
      if (!platformAdmin) {
        alert('Please login as platform admin');
        window.location.href = 'platform-login';
        return;
      }
      
      // Load all staff data
      await loadAllStaff();
      
      // Populate filters
      populateFilters();
      
      // Display staff
      displayStaff(allStaff);
      
      // Display ratio analytics
      await displayRatioAnalytics();
      
      // Display gender analysis
      await displayGenderAnalysis();
    });
    
    async function loadAllStaff() {
      try {
        console.log('[Healthcare Staff] Loading healthcare staff data...');
        
        let users = [];
        
        // Try Supabase first
        if (typeof window.supabaseClient !== 'undefined' && window.supabaseClient) {
          console.log('[Healthcare Staff] Fetching users from Supabase...');
          try {
            const { data: supabaseUsers, error: usersError } = await window.supabaseClient
              .from('users')
              .select('*');
            
            if (usersError) {
              console.warn('[Healthcare Staff] Error loading users from Supabase:', usersError);
              // Fallback to localStorage
              console.log('[Healthcare Staff] Falling back to localStorage...');
              const allUsers = JSON.parse(localStorage.getItem('users') || "[]");
              users = allUsers;
            } else if (supabaseUsers && supabaseUsers.length > 0) {
              console.log(`Loaded ${supabaseUsers.length} users from Supabase`);
              users = supabaseUsers;
            } else {
              console.log('[Healthcare Staff] No users found in Supabase, trying localStorage...');
              const allUsers = JSON.parse(localStorage.getItem('users') || "[]");
              users = allUsers;
            }
          } catch (error) {
            console.warn('[Healthcare Staff] Supabase query failed, using localStorage:', error);
            const allUsers = JSON.parse(localStorage.getItem('users') || "[]");
            users = allUsers;
          }
        } else {
          console.log('[Healthcare Staff] Supabase client not available, using localStorage...');
          const allUsers = JSON.parse(localStorage.getItem('users') || "[]");
          users = allUsers;
        }
        
        console.log(`[Healthcare Staff] Total users loaded: ${users.length}`);
        
        if (users.length === 0) {
          console.warn('[Healthcare Staff] No users found in Supabase or localStorage');
          allStaff = [];
          return;
        }
        
        const orgs = await getAllOrganizations();
        console.log(`[Healthcare Staff] Found ${Object.keys(orgs).length} organizations:`, Object.keys(orgs));
        
        // Log all unique roles found in users
        const allRoles = [...new Set(users.map(u => u.role).filter(Boolean))];
        console.log(`[Healthcare Staff] All unique roles found:`, allRoles);
        
        // Filter to only healthcare professionals - use case-insensitive matching and include more roles
        const healthcareRoles = [
          'Doctor', 'doctor', 'DOCTOR',
          'Nurse', 'nurse', 'NURSE',
          'Physician Assistant', 'physician assistant', 'Physician assistant',
          'Medical Assistant', 'medical assistant',
          'Physician', 'physician',
          'Nurse Practitioner', 'nurse practitioner'
        ];
        
        // Function to check if role is healthcare-related (case-insensitive)
        const isHealthcareRole = (role) => {
          if (!role) return false;
          const roleLower = role.toLowerCase().trim();
          return healthcareRoles.some(hr => hr.toLowerCase() === roleLower) ||
                 roleLower.includes('doctor') ||
                 roleLower.includes('nurse') ||
                 roleLower.includes('physician') ||
                 roleLower.includes('medical');
        };
        
        allStaff = (users || [])
          .filter(user => {
            const hasHealthcareRole = isHealthcareRole(user.role);
            if (!hasHealthcareRole && user.role) {
              console.log(`[Healthcare Staff] Skipping user ${user.username} with role: "${user.role}"`);
            } else if (hasHealthcareRole) {
              console.log(`Including user ${user.username} with role: "${user.role}"`);
            }
            return hasHealthcareRole;
          })
          .map(user => {
            // Find organization name from ID
            let orgName = 'Unknown';
            let org = null;
            
            if (user.organization_id) {
              orgName = Object.keys(orgs).find(name => orgs[name].id === user.organization_id);
              org = orgs[orgName];
              
              if (!orgName) {
                console.warn(`[Healthcare Staff] Could not find organization for ID: ${user.organization_id}`);
                // Try to find by matching ID in orgs values
                const orgEntry = Object.entries(orgs).find(([name, orgData]) => orgData.id === user.organization_id);
                if (orgEntry) {
                  orgName = orgEntry[0];
                  org = orgEntry[1];
                }
              }
            } else {
              console.warn(`[Healthcare Staff] User ${user.username} has no organization_id`);
            }
            
            return {
              firstName: user.first_name || '',
              lastName: user.last_name || '',
              fullName: `${user.first_name || ''} ${user.last_name || ''}`.trim() || user.username,
              username: user.username,
              role: user.role,
              gender: user.gender || 'Unknown',
              organization: orgName || 'Unknown',
              country: org?.country || 'Unknown',
              medicalLicenseNumber: user.medical_license_number || user.license_number || 'Not specified',
              createdAt: user.created_at || null
            };
          });
        
        // Count by role (case-insensitive)
        const roleCounts = {};
        allStaff.forEach(s => {
          const roleKey = s.role.toLowerCase();
          roleCounts[roleKey] = (roleCounts[roleKey] || 0) + 1;
        });
        
        console.log(`Processed ${allStaff.length} healthcare professionals by role:`, roleCounts);
        console.log(`[Healthcare Staff] Staff details:`, allStaff.map(s => ({
          name: s.fullName,
          role: s.role,
          org: s.organization,
          country: s.country
        })));
        
        if (allStaff.length === 0) {
          console.error('No healthcare professionals found!');
          console.warn('[Healthcare Staff] All user roles in database:', allRoles);
          console.warn('[Healthcare Staff] Total users loaded:', users.length);
          console.warn('[Healthcare Staff] Organizations available:', Object.keys(orgs));
          
          // Show a message on the page
          const container = document.getElementById('staff-listings');
          if (container) {
            container.innerHTML = `
              <div class="no-staff" style="padding: 40px; text-align: center; color: #999;">
                <h3><i class="fa-solid fa-user-slash" aria-hidden="true"></i> No healthcare staff found</h3>
                <p>Found ${users.length} total users, but none matched healthcare roles.</p>
                <p>Roles in database: ${allRoles.join(', ') || 'None found'}</p>
                <p>Please check the console for more details.</p>
              </div>
            `;
          }
        } else {
          console.log(`Successfully loaded ${allStaff.length} healthcare professionals`);
        }
      } catch (error) {
        console.error('Error loading healthcare staff:', error);
        allStaff = [];
      }
    }
    
    function populateFilters() {
      // Populate country filter
      const countries = [...new Set(allStaff.map(s => s.country))].sort();
      const countryFilter = document.getElementById('country-filter');
      
      countries.forEach(country => {
        const option = document.createElement('option');
        option.value = country;
        option.textContent = country;
        countryFilter.appendChild(option);
      });
    }
    
    function applyFilters() {
      currentFilters.country = document.getElementById('country-filter').value;
      currentFilters.role = document.getElementById('role-filter').value;
      currentFilters.gender = document.getElementById('gender-filter').value;
      currentFilters.search = document.getElementById('search-filter').value.toLowerCase();
      
      let filtered = allStaff;
      
      // Apply country filter
      if (currentFilters.country) {
        filtered = filtered.filter(s => s.country === currentFilters.country);
      }
      
      // Apply role filter
      if (currentFilters.role) {
        filtered = filtered.filter(s => s.role === currentFilters.role);
      }
      
      // Apply gender filter
      if (currentFilters.gender) {
        filtered = filtered.filter(s => s.gender === currentFilters.gender);
      }
      
      // Apply search filter
      if (currentFilters.search) {
        filtered = filtered.filter(s => 
          s.fullName.toLowerCase().includes(currentFilters.search) ||
          s.username.toLowerCase().includes(currentFilters.search) ||
          s.medicalLicenseNumber.toLowerCase().includes(currentFilters.search) ||
          s.organization.toLowerCase().includes(currentFilters.search)
        );
      }
      
      displayStaff(filtered);
    }
    
    function resetFilters() {
      document.getElementById('country-filter').value = '';
      document.getElementById('role-filter').value = '';
      document.getElementById('gender-filter').value = '';
      document.getElementById('search-filter').value = '';
      
      currentFilters = { country: '', role: '', gender: '', search: '' };
      
      displayStaff(allStaff);
    }
    
    function displayStaff(staff) {
      // Update summary statistics
      updateSummaryStats(staff);
      
      // Group staff by country
      const byCountry = {};
      staff.forEach(s => {
        if (!byCountry[s.country]) {
          byCountry[s.country] = [];
        }
        byCountry[s.country].push(s);
      });
      
      const container = document.getElementById('staff-listings');
      
      if (staff.length === 0) {
        container.innerHTML = '<div class="no-staff"><h3>No healthcare staff found matching your criteria</h3><p>Try adjusting your filters</p></div>';
        return;
      }
      
      container.innerHTML = '';
      
      // Sort countries by staff count
      const sortedCountries = Object.entries(byCountry).sort((a, b) => b[1].length - a[1].length);
      
      sortedCountries.forEach(([country, staffList]) => {
        const countrySection = document.createElement('div');
        countrySection.className = 'country-section';
        
        // Calculate country stats
        const doctors = staffList.filter(s => s.role === 'Doctor').length;
        const nurses = staffList.filter(s => s.role === 'Nurse').length;
        const pas = staffList.filter(s => s.role === 'Physician Assistant').length;
        const medicalAssistants = staffList.filter(s => s.role === 'Medical Assistant').length;
        const billers = staffList.filter(s => s.role === 'Biller/Accountant').length;
        const officeManagers = staffList.filter(s => s.role === 'Office Manager').length;
        const receptionists = staffList.filter(s => s.role === 'Medical Receptionist').length;
        const coordinators = staffList.filter(s => s.role === 'Referrals Coordinator').length;
        
        countrySection.innerHTML = `
          <div class="country-header">
            <div class="country-name"><i class="fa-solid fa-landmark-flag" aria-hidden="true"></i> ${country}</div>
            <div class="country-stats">
              <div class="country-stat">
                <span class="country-stat-value">${doctors}</span>
                <span>Doctors</span>
              </div>
              <div class="country-stat">
                <span class="country-stat-value">${nurses}</span>
                <span>Nurses</span>
              </div>
              <div class="country-stat">
                <span class="country-stat-value">${pas}</span>
                <span>PAs</span>
              </div>
              <div class="country-stat">
                <span class="country-stat-value">${staffList.length}</span>
                <span>Total</span>
              </div>
            </div>
          </div>
        `;
        
        // Sort staff by role, then by name
        staffList.sort((a, b) => {
          const roleOrder = { 'Doctor': 1, 'Nurse': 2, 'Physician Assistant': 3 };
          if (roleOrder[a.role] !== roleOrder[b.role]) {
            return roleOrder[a.role] - roleOrder[b.role];
          }
          return a.fullName.localeCompare(b.fullName);
        });
        
        staffList.forEach(person => {
          const roleClass = person.role.toLowerCase().replace(/ /g, '-');
          const roleClassName = `role-${roleClass}`;
          
          const card = document.createElement('div');
          card.className = `staff-card ${roleClass}`;
          card.innerHTML = `
            <div class="staff-header">
              <div>
                <div class="staff-name">${person.fullName}</div>
                <span class="staff-role ${roleClassName}">${person.role}</span>
              </div>
            </div>
            <div class="staff-info">
              <div class="info-item">

    function exportToCSV() {
      let csv = 'Name,Username,Role,Gender,Organization,Country,License Number\n';
      
      const filtered = getFilteredStaff();
      
      filtered.forEach(person => {
        csv += `"${person.fullName}","${person.username}","${person.role}","${person.gender}","${person.organization}","${person.country}","${person.medicalLicenseNumber}"\n`;
      });
      
      // Download CSV
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `healthcare-staff-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      window.URL.revokeObjectURL(url);
    }
    
    function getFilteredStaff() {
      let filtered = allStaff;
      
      if (currentFilters.country) {
        filtered = filtered.filter(s => s.country === currentFilters.country);
      }
      if (currentFilters.role) {
        filtered = filtered.filter(s => s.role === currentFilters.role);
      }
      if (currentFilters.gender) {
        filtered = filtered.filter(s => s.gender === currentFilters.gender);
      }
      if (currentFilters.search) {
        filtered = filtered.filter(s => 
          s.fullName.toLowerCase().includes(currentFilters.search) ||
          s.username.toLowerCase().includes(currentFilters.search) ||
          s.medicalLicenseNumber.toLowerCase().includes(currentFilters.search) ||
          s.organization.toLowerCase().includes(currentFilters.search)
        );
      }
      
      return filtered;
    }
    
    async function displayRatioAnalytics() {
      const orgs = await getAllOrganizations();
      
      // Calculate total patients
      let totalPatients = 0;
      for (const orgName of Object.keys(orgs)) {
        const stats = await getOrganizationStats(orgName);
        totalPatients += stats.patientCount;
      }
      
      // Calculate staff by role
      const totalDoctors = allStaff.filter(s => s.role === 'Doctor').length;
      const totalNurses = allStaff.filter(s => s.role === 'Nurse').length;
      const totalPAs = allStaff.filter(s => s.role === 'Physician Assistant').length;
      const totalHealthcareStaff = allStaff.length;
      
      // Calculate ratios
      const patientToStaffRatio = totalHealthcareStaff > 0 ? (totalPatients / totalHealthcareStaff).toFixed(1) : 0;
      const patientToDoctorRatio = totalDoctors > 0 ? (totalPatients / totalDoctors).toFixed(1) : 0;
      const patientToNurseRatio = totalNurses > 0 ? (totalPatients / totalNurses).toFixed(1) : 0;
      
      // Determine ratio quality (WHO recommends 1 doctor per 1000 patients, 1 nurse per 300 patients)
      const doctorRatioClass = patientToDoctorRatio <= 100 ? 'ratio-good' : patientToDoctorRatio <= 500 ? 'ratio-moderate' : 'ratio-high';
      const nurseRatioClass = patientToNurseRatio <= 50 ? 'ratio-good' : patientToNurseRatio <= 200 ? 'ratio-moderate' : 'ratio-high';
      const overallRatioClass = patientToStaffRatio <= 50 ? 'ratio-good' : patientToStaffRatio <= 150 ? 'ratio-moderate' : 'ratio-high';
      
      // Calculate by country
      const countryRatios = {};
      for (const orgName of Object.keys(orgs)) {
        const org = orgs[orgName];
        const country = org.country || 'Unknown';
        const stats = await getOrganizationStats(orgName);
        
        if (!countryRatios[country]) {
          countryRatios[country] = {
            patients: 0,
            doctors: 0,
            nurses: 0,
            pas: 0,
            totalStaff: 0
          };
        }
        
        countryRatios[country].patients += stats.patientCount;
        
        // Count staff for this country
        const countryStaff = allStaff.filter(s => s.country === country);
        countryRatios[country].doctors = countryStaff.filter(s => s.role === 'Doctor').length;
        countryRatios[country].nurses = countryStaff.filter(s => s.role === 'Nurse').length;
        countryRatios[country].pas = countryStaff.filter(s => s.role === 'Physician Assistant').length;
        countryRatios[country].totalStaff = countryStaff.length;
      }
      
      const container = document.getElementById('ratio-analytics');
      
      let html = `
        <div class="ratio-grid">
          <div class="ratio-card ${overallRatioClass}">
            <h3>Overall Patient-to-Staff Ratio</h3>
            <div class="ratio-value">${patientToStaffRatio}:1</div>
            <div class="ratio-label">${totalPatients.toLocaleString()} patients per healthcare professional</div>
            <div class="ratio-detail">
              <strong>${totalPatients.toLocaleString()}</strong> total patients<br>
              <strong>${totalHealthcareStaff}</strong> healthcare professionals
            </div>
          </div>
          
          <div class="ratio-card ${doctorRatioClass}">
            <h3><i class="fa-solid fa-user-doctor" aria-hidden="true"></i> Patient-to-Doctor Ratio</h3>
            <div class="ratio-value">${patientToDoctorRatio}:1</div>
            <div class="ratio-label">${totalPatients.toLocaleString()} patients per doctor</div>
            <div class="ratio-detail">
              <strong>${totalPatients.toLocaleString()}</strong> total patients<br>
              <strong>${totalDoctors}</strong> doctors
            </div>
          </div>
          
          <div class="ratio-card ${nurseRatioClass}">
            <h3><i class="fa-solid fa-user-nurse" aria-hidden="true"></i> Patient-to-Nurse Ratio</h3>
            <div class="ratio-value">${patientToNurseRatio}:1</div>
            <div class="ratio-label">${totalPatients.toLocaleString()} patients per nurse</div>
            <div class="ratio-detail">
              <strong>${totalPatients.toLocaleString()}</strong> total patients<br>
              <strong>${totalNurses}</strong> nurses
            </div>
          </div>
        </div>
        
        <div class="country-ratio-table">
          <h3 style="margin-top: 0; margin-bottom: 15px;"><i class="fa-solid fa-earth-africa" aria-hidden="true"></i> Ratio Breakdown by Country</h3>
          <table class="billing-table" style="display: table; width: 100%; border-collapse: collapse;">
            <thead>
              <tr>
                <th class="left" style="width: 20%;">Country</th>
                <th class="center" style="width: 12%;">Total Patients</th>
                <th class="center" style="width: 10%;">Doctors</th>
                <th class="center" style="width: 10%;">Nurses</th>
                <th class="center" style="width: 10%;">PAs</th>
                <th class="center" style="width: 12%;">Total Staff</th>
                <th class="center" style="width: 13%;">Patient:Staff</th>
                <th class="center" style="width: 13%;">Patient:Doctor</th>
              </tr>
            </thead>
            <tbody>
      `;
      
      // Sort countries by patient count
      const sortedCountries = Object.entries(countryRatios).sort((a, b) => b[1].patients - a[1].patients);
      
      sortedCountries.forEach(([country, data]) => {
        const staffRatio = data.totalStaff > 0 ? (data.patients / data.totalStaff).toFixed(1) : 'N/A';
        const doctorRatio = data.doctors > 0 ? (data.patients / data.doctors).toFixed(1) : 'N/A';
        
        // Color code ratios
        const staffRatioColor = staffRatio <= 50 ? '#4CAF50' : staffRatio <= 150 ? '#FF9800' : '#F44336';
        const doctorRatioColor = doctorRatio <= 100 ? '#4CAF50' : doctorRatio <= 500 ? '#FF9800' : '#F44336';
        
        html += `
          <tr>
            <td class="left"><strong>${country}</strong></td>
            <td class="center"><strong style="color: #2196F3;">${data.patients.toLocaleString()}</strong></td>
            <td class="center">${data.doctors}</td>
            <td class="center">${data.nurses}</td>
            <td class="center">${data.pas}</td>
            <td class="center"><strong>${data.totalStaff}</strong></td>
            <td class="center"><strong style="color: ${staffRatioColor}; font-size: 16px;">${staffRatio}:1</strong></td>
            <td class="center"><strong style="color: ${doctorRatioColor}; font-size: 16px;">${doctorRatio}:1</strong></td>
          </tr>
        `;
      });
      
      html += `
            </tbody>
          </table>
          
          <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; color: #666; font-size: 14px;">
            <strong><i class="fa-solid fa-circle-info" aria-hidden="true"></i> Ratio Guidelines:</strong><br>
            <span style="color: #4CAF50;"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> Good:</span> Patient-to-Doctor = 100:1, Patient-to-Nurse = 50:1<br>
            <span style="color: #FF9800;"><i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i> Moderate:</span> Patient-to-Doctor = 500:1, Patient-to-Nurse = 200:1<br>
            <span style="color: #F44336;"><i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i> High:</span> Patient-to-Doctor > 500:1, Patient-to-Nurse > 200:1
          </div>
        </div>
      `;
      
      container.innerHTML = html;
    }
    
    async function displayGenderAnalysis() {
      // Overall gender breakdown
      const genderByRole = {
        'Doctor': { Male: 0, Female: 0 },
        'Nurse': { Male: 0, Female: 0 },
        'Physician Assistant': { Male: 0, Female: 0 }
      };
      
      allStaff.forEach(person => {
        const gender = (person.gender === 'Male' || person.gender === 'Female') ? person.gender : 'Male';
        if (genderByRole[person.role]) {
          genderByRole[person.role][gender] = (genderByRole[person.role][gender] || 0) + 1;
        }
      });
      
      // Gender breakdown by country
      const countryGenderData = {};
      allStaff.forEach(person => {
        const country = person.country;
        if (!countryGenderData[country]) {
          countryGenderData[country] = {
            'Doctor': { Male: 0, Female: 0 },
            'Nurse': { Male: 0, Female: 0 },
            'Physician Assistant': { Male: 0, Female: 0 }
          };
        }
        
        const gender = (person.gender === 'Male' || person.gender === 'Female') ? person.gender : 'Male';
        if (countryGenderData[country][person.role]) {
          countryGenderData[country][person.role][gender] = (countryGenderData[country][person.role][gender] || 0) + 1;
        }
      });
      
      // Calculate total patients by gender from Supabase
      const patientsByGender = { Male: 0, Female: 0 };
      
      try {
        const { data: allPatients, error: patientsError } = await window.supabaseClient
          .from('patients')
          .select('gender');
        
        if (!patientsError && allPatients) {
          allPatients.forEach(patient => {
            const gender = (patient.gender === 'Male' || patient.gender === 'Female') ? patient.gender : 'Male';
            patientsByGender[gender] = (patientsByGender[gender] || 0) + 1;
          });
        }
      } catch (error) {
        console.error('Error fetching patients for gender analysis:', error);
      }
      
      const totalPatients = Object.values(patientsByGender).reduce((a, b) => a + b, 0);
      
      const container = document.getElementById('gender-analysis');
      
      let html = `
        <!-- Overall Gender Distribution by Role -->
        <h3 style="margin-top: 0; margin-bottom: 20px;"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> Global Gender Distribution by Role</h3>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px;">
      `;
      
      // Create cards for each role
      Object.entries(genderByRole).forEach(([role, genders]) => {
        const total = Object.values(genders).reduce((a, b) => a + b, 0);
        const roleIcon = role === 'Doctor' ? '<i class="fa-solid fa-user-doctor"></i>' : role === 'Nurse' ? '<i class="fa-solid fa-user-nurse"></i>' : '<i class="fa-solid fa-user"></i>';
        const roleColor = role === 'Doctor' ? '#00BCD4' : role === 'Nurse' ? '#E91E63' : '#FF9800';
        
        html += `
          <div style="background: white; border: 2px solid ${roleColor}; border-radius: 12px; padding: 20px;">
            <h4 style="margin: 0 0 15px 0; color: ${roleColor}; font-size: 18px;">${roleIcon} ${role}s</h4>
            <div style="margin-bottom: 10px;">
              <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span><strong style="color: #2196F3;"><i class="fa-solid fa-mars" aria-hidden="true"></i> Male:</strong></span>
                <span style="font-size: 18px; font-weight: bold; color: #2196F3;">${genders.Male}</span>
                <span style="color: #666;">${total > 0 ? ((genders.Male / total) * 100).toFixed(1) : 0}%</span>
              </div>
              <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span><strong style="color: #E91E63;"><i class="fa-solid fa-venus" aria-hidden="true"></i> Female:</strong></span>
                <span style="font-size: 18px; font-weight: bold; color: #E91E63;">${genders.Female}</span>
                <span style="color: #666;">${total > 0 ? ((genders.Female / total) * 100).toFixed(1) : 0}%</span>
              </div>
            </div>
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; text-align: center;">
              <strong style="font-size: 20px; color: ${roleColor};">Total: ${total}</strong>
            </div>
          </div>
        `;
      });
      
      html += `
        </div>
        
        <!-- Patient Population by Gender -->
        <div style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 25px; border-radius: 12px; margin-bottom: 30px;">
          <h3 style="margin: 0 0 20px 0;"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> Patient Population by Gender</h3>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
            <div style="text-align: center;">
              <div style="font-size: 14px; opacity: 0.9; margin-bottom: 5px;"><i class="fa-solid fa-mars" aria-hidden="true"></i> Male Patients</div>
              <div style="font-size: 32px; font-weight: bold;">${patientsByGender.Male.toLocaleString()}</div>
              <div style="font-size: 14px; opacity: 0.8;">${totalPatients > 0 ? ((patientsByGender.Male / totalPatients) * 100).toFixed(1) : 0}%</div>
            </div>
            <div style="text-align: center;">
              <div style="font-size: 14px; opacity: 0.9; margin-bottom: 5px;"><i class="fa-solid fa-venus" aria-hidden="true"></i> Female Patients</div>
              <div style="font-size: 32px; font-weight: bold;">${patientsByGender.Female.toLocaleString()}</div>
              <div style="font-size: 14px; opacity: 0.8;">${totalPatients > 0 ? ((patientsByGender.Female / totalPatients) * 100).toFixed(1) : 0}%</div>
            </div>
            <div style="text-align: center;">
              <div style="font-size: 14px; opacity: 0.9; margin-bottom: 5px;">Total</div>
              <div style="font-size: 32px; font-weight: bold;">${totalPatients.toLocaleString()}</div>
              <div style="font-size: 14px; opacity: 0.8;">100%</div>
            </div>
          </div>
        </div>
        
        <!-- Gender Distribution by Country -->
        <h3 style="margin-top: 0; margin-bottom: 15px;"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> Gender Distribution by Country & Role</h3>
        <table class="billing-table" style="display: table; width: 100%; border-collapse: collapse;">
          <thead>
            <tr>
              <th class="left" style="width: 20%;">Country</th>
              <th class="center" style="width: 15%;">Role</th>
              <th class="center" style="width: 12%;"><i class="fa-solid fa-mars" aria-hidden="true"></i> Male</th>
              <th class="center" style="width: 12%;"><i class="fa-solid fa-venus" aria-hidden="true"></i> Female</th>
              <th class="center" style="width: 12%;">Total</th>
              <th class="center" style="width: 29%;">Gender Distribution</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      // Sort countries and display data
      const sortedCountries = Object.keys(countryGenderData).sort();
      
      sortedCountries.forEach(country => {
        const roles = countryGenderData[country];
        let firstRow = true;
        
        Object.entries(roles).forEach(([role, genders]) => {
          const total = Object.values(genders).reduce((a, b) => a + b, 0);
          
          // Skip if no staff of this role in this country
          if (total === 0) return;
          
          const roleIcon = role === 'Doctor' ? '<i class="fa-solid fa-user-doctor"></i>' : role === 'Nurse' ? '<i class="fa-solid fa-user-nurse"></i>' : '<i class="fa-solid fa-user"></i>';
          const malePercent = total > 0 ? ((genders.Male / total) * 100).toFixed(0) : 0;
          const femalePercent = total > 0 ? ((genders.Female / total) * 100).toFixed(0) : 0;
          
          html += `
            <tr>
              ${firstRow ? `<td class="left" rowspan="3" style="vertical-align: middle;"><strong>${country}</strong></td>` : ''}
              <td class="center">${roleIcon} ${role}</td>
              <td class="center"><strong style="color: #2196F3;">${genders.Male}</strong></td>
              <td class="center"><strong style="color: #E91E63;">${genders.Female}</strong></td>
              <td class="center"><strong>${total}</strong></td>
              <td class="center">
                <div style="display: flex; gap: 5px; justify-content: center; align-items: center;">
                  ${malePercent > 0 ? `<div style="background: #2196F3; color: white; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 600;"><i class="fa-solid fa-mars"></i> ${malePercent}%</div>` : ''}
                  ${femalePercent > 0 ? `<div style="background: #E91E63; color: white; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 600;"><i class="fa-solid fa-venus"></i> ${femalePercent}%</div>` : ''}
                </div>
              </td>
            </tr>
          `;
          
          firstRow = false;
        });
      });
      
      html += `
            </tbody>
          </table>
          
          <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; color: #666; font-size: 14px;">
            <strong><i class="fa-solid fa-lightbulb" aria-hidden="true"></i> Insights:</strong><br>
            &bull; Gender diversity in healthcare teams can improve patient outcomes and satisfaction<br>
            &bull; A balanced gender distribution among healthcare professionals reflects inclusive hiring practices<br>
            &bull; Compare staff gender distribution with patient gender distribution to ensure culturally appropriate care
          </div>
      `;
      
      container.innerHTML = html;
    }
  </script>
