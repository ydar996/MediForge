<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Agreement Acceptance - MediForge</title>
  <style>
    :root {
      --primary-green: #008753;
      --dark-green: #006b42;
      --nigerian-white: #FFFFFF;
      --gold: #FFD700;
      --dark-gold: #B8860B;
      --bronze: #CD7F32;
      --earth-brown: #8B4513;
      --warm-orange: #FF8C00;
      --deep-red: #8B0000;
      --kente-gold: #DAA520;
      --adire-blue: #4169E1;
      --coral: #FF7F50;
      --ivory: #FFFFF0;
      --warm-gray: #F5F5DC;
      --charcoal: #36454F;
      --soft-white: #FAFAFA;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, var(--ivory) 0%, var(--warm-gray) 50%, var(--soft-white) 100%);
      min-height: 100vh;
      padding: 20px;
      color: var(--charcoal);
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: linear-gradient(135deg, var(--nigerian-white), var(--ivory));
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.2), 0 0 60px rgba(218, 165, 32, 0.1);
      border: 3px solid;
      border-image: linear-gradient(135deg, var(--primary-green), var(--kente-gold), var(--warm-orange)) 1;
    }
    
    h1 {
      background: linear-gradient(135deg, var(--primary-green), var(--dark-green), var(--bronze));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 10px;
      text-align: center;
    }
    
    .subtitle {
      text-align: center;
      color: var(--charcoal);
      margin-bottom: 30px;
      font-size: 16px;
    }
    
    .agreement-box {
      background: linear-gradient(135deg, rgba(0, 135, 83, 0.05), rgba(0, 107, 66, 0.03), var(--ivory));
      border: 2px solid var(--primary-green);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
      max-height: 500px;
      overflow-y: auto;
    }
    
    .agreement-box h2 {
      color: var(--primary-green);
      margin-bottom: 20px;
      font-size: 24px;
      border-bottom: 2px solid var(--primary-green);
      padding-bottom: 10px;
    }
    
    .agreement-box h3 {
      color: var(--dark-green);
      margin-top: 25px;
      margin-bottom: 15px;
      font-size: 18px;
    }
    
    .agreement-box p {
      line-height: 1.8;
      margin-bottom: 15px;
      color: var(--charcoal);
    }
    
    .agreement-box ol, .agreement-box ul {
      margin-left: 25px;
      margin-bottom: 15px;
      line-height: 1.8;
    }
    
    .agreement-box li {
      margin-bottom: 10px;
    }
    
    .acceptance-section {
      background: linear-gradient(135deg, rgba(0, 135, 83, 0.1), rgba(0, 107, 66, 0.05));
      border: 3px solid var(--primary-green);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 25px;
    }
    
    .acceptance-section label {
      display: flex;
      align-items: flex-start;
      cursor: pointer;
      font-size: 16px;
      line-height: 1.6;
    }
    
    .acceptance-section input[type="checkbox"] {
      margin-right: 15px;
      margin-top: 3px;
      width: 24px;
      height: 24px;
      cursor: pointer;
      accent-color: var(--primary-green);
      flex-shrink: 0;
    }
    
    .acceptance-section span {
      color: var(--charcoal);
    }
    
    .acceptance-section strong {
      color: var(--dark-green);
    }
    
    .button-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 30px;
    }
    
    .btn {
      padding: 15px 40px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--primary-green), var(--dark-green));
      color: white;
      border: 2px solid var(--adire-blue);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 135, 83, 0.4);
    }
    
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-secondary {
      background: linear-gradient(135deg, var(--charcoal), var(--earth-brown));
      color: white;
    }
    
    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    
    .loading {
      display: none;
      text-align: center;
      color: var(--primary-green);
      font-weight: 600;
      margin-top: 20px;
    }
    
    .error {
      display: none;
      background: linear-gradient(135deg, var(--deep-red), var(--coral));
      color: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 600;
    }
    
    .success {
      display: none;
      background: linear-gradient(135deg, var(--primary-green), var(--dark-green));
      color: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>?? Legal Agreement Acceptance</h1>
    <p class="subtitle">Please review and accept the legal agreements to continue</p>
    
    <div class="error" id="error-message"></div>
    <div class="success" id="success-message"></div>
    
    <div class="agreement-box" id="agreement-content">
      <!-- Agreement content will be loaded here -->
      <p style="text-align: center; color: #666; padding: 40px;">Loading agreement...</p>
    </div>
    
    <div class="acceptance-section">
      <label>
        <input type="checkbox" id="legal-agreement-accept" required>
        <span>
          <strong>I accept and agree</strong> to the MediForge Service Subscription and Data Processing Agreement and Business Associate Agreement (BAA). 
          I confirm that I have the authority to bind my medical practice and accept these terms on behalf of myself and all authorized users in my organization. 
          <strong style="color: var(--deep-red);">*Required</strong>
        </span>
      </label>
      <p style="margin-top: 15px; font-size: 14px; color: #666; font-style: italic;">
        An electronic copy of your signed agreement will be stored securely in your account and accessible to platform administrators.
      </p>
    </div>
    
    <div class="button-group">
      <button class="btn btn-secondary" onclick="logout()">Logout</button>
      <button class="btn btn-primary" id="accept-btn" onclick="acceptAgreement()" disabled>
        Accept & Continue
      </button>
    </div>
    
    <div class="loading" id="loading">Processing your acceptance...</div>
  </div>
  
  <script src="js/vendor/supabase.min.js"></script>
  <script src="js/supabase-client.js?v=20251021140000"></script>
  <script src="js/legal-agreements.js?v=20250118000000"></script>
  
  <script>
    // Load agreement content
    async function loadAgreementContent() {
      try {
        const response = await fetch('legal-agreement.html');
        if (response.ok) {
          const html = await response.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          const content = doc.querySelector('.legal-content') || doc.body;
          document.getElementById('agreement-content').innerHTML = content.innerHTML;
        } else {
          document.getElementById('agreement-content').innerHTML = `
            <h2>MEDIFORGE � SERVICE SUBSCRIPTION AND DATA PROCESSING AGREEMENT</h2>
            <p>Please visit <a href="legal-agreement" target="_blank">legal-agreement</a> to read the full agreement.</p>
          `;
        }
      } catch (error) {
        console.error('Error loading agreement:', error);
        document.getElementById('agreement-content').innerHTML = `
          <h2>MEDIFORGE � SERVICE SUBSCRIPTION AND DATA PROCESSING AGREEMENT</h2>
          <p>Please visit <a href="legal-agreement" target="_blank">legal-agreement</a> to read the full agreement.</p>
        `;
      }
    }
    
    // Enable/disable accept button based on checkbox
    document.getElementById('legal-agreement-accept').addEventListener('change', function() {
      document.getElementById('accept-btn').disabled = !this.checked;
    });
    
    // Accept agreement
    async function acceptAgreement() {
      const checkbox = document.getElementById('legal-agreement-accept');
      if (!checkbox.checked) {
        showError('Please accept the agreement to continue');
        return;
      }
      
      // Get current user
      const userStr = localStorage.getItem('user');
      if (!userStr) {
        showError('User session not found. Please login again.');
        setTimeout(() => {
          window.location.href = '/login';
        }, 2000);
        return;
      }
      
      const user = JSON.parse(userStr);
      // Prefer users table ID (not authUserId)
      let userId = user.id;
      
      // If we don't have users table ID, fetch it from Supabase using authUserId
      if (!userId && (user.authUserId || user.auth_user_id) && typeof window.supabaseClient !== 'undefined' && window.supabaseClient) {
        try {
          const authUserId = user.authUserId || user.auth_user_id;
          const { data: userRecord, error: userError } = await window.supabaseClient
            .from('users')
            .select('id')
            .eq('auth_user_id', authUserId)
            .maybeSingle();
          
          if (!userError && userRecord && userRecord.id) {
            userId = userRecord.id;
          }
        } catch (fetchError) {
          console.error('Error fetching user ID:', fetchError);
        }
      }
      
      if (!userId) {
        showError('User ID not found. Please login again.');
        setTimeout(() => {
          window.location.href = '/login';
        }, 2000);
        return;
      }
      const firstName = user.firstName || user.first_name || '';
      const lastName = user.lastName || user.last_name || '';
      const userName = `${firstName} ${lastName}`.trim() || user.username || 'User';
      const userEmail = user.email || `${user.username}@mediforge.app`;
      const userRole = user.role || 'User';
      const organizationId = user.organizationId || user.organization_id || null;
      
      // Show loading
      document.getElementById('loading').style.display = 'block';
      document.getElementById('accept-btn').disabled = true;
      
      try {
        // Save Service Agreement
        const serviceAgreementResult = await window.saveLegalAgreement({
          userId: userId,
          organizationId: organizationId,
          agreementType: 'service_agreement',
          userName: userName,
          userRole: userRole,
          userEmail: userEmail,
          agreementText: 'MediForge Service Subscription and Data Processing Agreement - Version 2025-11-18'
        });
        
        if (!serviceAgreementResult.success) {
          throw new Error(serviceAgreementResult.error || 'Failed to save Service Agreement');
        }
        
        // Save BAA
        const baaResult = await window.saveLegalAgreement({
          userId: userId,
          organizationId: organizationId,
          agreementType: 'baa',
          userName: userName,
          userRole: userRole,
          userEmail: userEmail,
          agreementText: 'Business Associate Agreement (BAA) - Version 2025-11-18'
        });
        
        if (!baaResult.success) {
          throw new Error(baaResult.error || 'Failed to save BAA');
        }
        
        // Success - redirect to dashboard
        showSuccess('Agreements accepted successfully! Redirecting to dashboard...');
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1500);
        
      } catch (error) {
        console.error('Error accepting agreement:', error);
        showError('Failed to save agreement: ' + error.message);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('accept-btn').disabled = false;
      }
    }
    
    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 5000);
    }
    
    function showSuccess(message) {
      const successDiv = document.getElementById('success-message');
      successDiv.textContent = message;
      successDiv.style.display = 'block';
    }
    
    function logout() {
      localStorage.removeItem('user');
      localStorage.removeItem('supabase_session');
      window.location.href = '/login';
    }
    
    // Load agreement content on page load
    document.addEventListener('DOMContentLoaded', function() {
      loadAgreementContent();
    });
  </script>

  <script src="js/logout-button.js"></script>
  <script src="js/session-timeout.js"></script>  <!-- Auto-logout after 30 minutes of inactivity -->
</body>
</html>
