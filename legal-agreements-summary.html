<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Agreements Summary - MediForge</title>
  <link rel="stylesheet" href="css/styles.css?v=239">
  
  <!-- Supabase CDN Library -->
  <script src="js/vendor/supabase.min.js"></script>
  
  <!-- Supabase Client Initialization -->
  <script src="js/supabase-client.js?v=20251112063500"></script>
  <script src="js/legal-agreements.js?v=20250118000000"></script>
  
  <style>
    body {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f7fa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    
    .header {
      background: linear-gradient(135deg, #008753 0%, #006b42 100%);
      color: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 4px 20px rgba(0, 135, 83, 0.3);
    }
    
    .header h1 {
      margin: 0 0 10px 0;
      font-size: 32px;
    }
    
    .header p {
      margin: 0;
      opacity: 0.9;
      font-size: 16px;
    }
    
    .back-button {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #008753, #006b42);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s;
      box-shadow: 0 2px 8px rgba(0, 135, 83, 0.2);
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    
    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 135, 83, 0.3);
    }
    
    .summary-card {
      background: linear-gradient(135deg, rgba(0, 135, 83, 0.1), rgba(0, 107, 66, 0.05));
      border: 2px solid #008753;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 30px;
    }
    
    .summary-card h3 {
      color: #008753;
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 24px;
    }
    
    .summary-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    
    .stat-item {
      text-align: center;
      padding: 15px;
      background: white;
      border-radius: 8px;
      border: 2px solid #008753;
    }
    
    .stat-number {
      font-size: 32px;
      font-weight: 800;
      color: #008753;
      display: block;
    }
    
    .stat-label {
      font-size: 14px;
      color: #666;
      margin-top: 5px;
    }
    
    .org-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .org-card {
      background: linear-gradient(135deg, #ffffff, #f8f9fa);
      border: 2px solid #008753;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 12px rgba(0, 135, 83, 0.15);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .org-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 20px rgba(0, 135, 83, 0.25);
    }
    
    .org-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }
    
    .org-name {
      color: #008753;
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }
    
    .org-id {
      color: #666;
      margin: 5px 0 0 0;
      font-size: 13px;
    }
    
    .agreement-count-badge {
      text-align: center;
      background: linear-gradient(135deg, #008753, #006b42);
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      min-width: 70px;
    }
    
    .agreement-count-number {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }
    
    .agreement-count-label {
      font-size: 11px;
      text-transform: uppercase;
      opacity: 0.9;
    }
    
    .org-card-footer {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(0, 135, 83, 0.2);
      text-align: center;
      color: #008753;
      font-weight: 600;
      font-size: 14px;
    }
    
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #666;
      font-size: 18px;
      background: white;
      border-radius: 12px;
      border: 3px solid #008753;
    }
    
    .error {
      text-align: center;
      padding: 60px 20px;
      color: #dc3545;
      font-size: 18px;
      background: white;
      border-radius: 12px;
      border: 3px solid #dc3545;
    }
    
    .error button {
      margin-top: 20px;
      padding: 12px 24px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
      background: white;
      border-radius: 12px;
      border: 3px solid #008753;
    }
  </style>
  <script src="js/ui-title-case.js?v=20260616120000" defer></script>
</head>
<body>
  <a href="platform-dashboard" class="back-button">&larr; Back to Platform Dashboard</a>
  
  <div class="header">
    <h1>&#127963; Legal Agreements by Organization</h1>
    <p>View all organizations and their signed legal agreements</p>
  </div>
  
  <div id="loading" class="loading">Loading legal agreements...</div>
  <div id="content" style="display: none;"></div>
  
  <script>
    // Check if user is platform admin
    async function checkPlatformAdmin() {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      const platformAdmin = JSON.parse(localStorage.getItem('platformAdmin') || 'null');
      const platformAdminRoles = ['PlatformAdmin', 'PlatformOwner', 'Platform Admin', 'Platform Owner', 'Platform administrator', 'Platform owner'];
      
      if (!user || !user.role) {
        if (!platformAdmin && !platformAdminRoles.includes(user.role)) {
          window.location.href = '/dashboard';
          return false;
        }
      }
      return true;
    }
    
    // Load all agreements and group by organization
    async function loadAgreementsSummary() {
      const loadingDiv = document.getElementById('loading');
      const contentDiv = document.getElementById('content');
      
      try {
        if (!await checkPlatformAdmin()) {
          return;
        }
        
        if (typeof window.getAllLegalAgreements === 'undefined') {
          throw new Error('Legal agreements module not loaded');
        }
        
        const { success, agreements, error } = await window.getAllLegalAgreements();
        
        if (!success) {
          throw new Error(error || 'Failed to load legal agreements');
        }
        
        loadingDiv.style.display = 'none';
        contentDiv.style.display = 'block';
        
        if (!agreements || agreements.length === 0) {
          contentDiv.innerHTML = `
            <div class="empty-state">
              <p style="font-size: 18px; margin-bottom: 10px;">No signed legal agreements found.</p>
              <p style="font-size: 14px;">Agreements will appear here once users sign them during registration or login.</p>
            </div>
          `;
          return;
        }
        
        // Group agreements by organization
        const agreementsByOrg = {};
        const totalUsers = new Set();
        
        agreements.forEach((agreement) => {
          const orgId = agreement.organization_id || 'no-org';
          const orgName = agreement.organizations?.name || 'Unknown Organization';
          const userId = agreement.user_id;
          totalUsers.add(userId);
          
          if (!agreementsByOrg[orgId]) {
            agreementsByOrg[orgId] = {
              organization: { id: orgId, name: orgName },
              count: 0
            };
          }
          
          agreementsByOrg[orgId].count++;
        });
        
        // Build HTML
        let html = `
          <div class="summary-card">
            <h3>&#128202; Summary</h3>
            <div class="summary-stats">
              <div class="stat-item">
                <span class="stat-number">${agreements.length}</span>
                <span class="stat-label">Total Agreements</span>
              </div>
              <div class="stat-item">
                <span class="stat-number">${Object.keys(agreementsByOrg).length}</span>
                <span class="stat-label">Organizations</span>
              </div>
              <div class="stat-item">
                <span class="stat-number">${totalUsers.size}</span>
                <span class="stat-label">Unique Users</span>
              </div>
            </div>
          </div>
          
          <h2 style="color: #008753; margin-bottom: 20px;">Organizations</h2>
          <div class="org-cards-grid">
        `;
        
        // Display organization cards
        Object.values(agreementsByOrg).forEach((orgGroup) => {
          const org = orgGroup.organization;
          
          html += `
            <div class="org-card" onclick="window.location.href = '/legal-agreements-org?orgId=${encodeURIComponent(org.id)}'; return false;">
              <div class="org-card-header">
                <div style="flex: 1;">
                  <h3 class="org-name">${org.name}</h3>
                  <p class="org-id">Organization ID: ${org.id === 'no-org' ? 'N/A' : org.id.substring(0, 8)}...</p>
                </div>
                <div class="agreement-count-badge">
                  <div class="agreement-count-number">${orgGroup.count}</div>
                  <div class="agreement-count-label">${orgGroup.count === 1 ? 'Agreement' : 'Agreements'}</div>
                </div>
              </div>
              <div class="org-card-footer">
                &#128196; Click to view agreements &#8594;
              </div>
            </div>
          `;
        });
        
        html += '</div>';
        contentDiv.innerHTML = html;
        
      } catch (error) {
        console.error('Error loading agreements summary:', error);
        loadingDiv.style.display = 'none';
        contentDiv.style.display = 'block';
        contentDiv.innerHTML = `
          <div class="error">
            <h3>Error Loading Legal Agreements</h3>
            <p>${error.message}</p>
            <button onclick="loadAgreementsSummary()">Try Again</button>
          </div>
        `;
      }
    }
    
    // Load on page load
    document.addEventListener('DOMContentLoaded', () => {
      loadAgreementsSummary();
    });
  </script>

  <script src="js/logout-button.js"></script>
  <script src="js/session-timeout.js"></script>  <!-- Auto-logout after 30 minutes of inactivity -->
</body>
</html>
