<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Messages & Tasks - MediForge</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f5dc 0%, #fafafa 50%, #ffffff 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .messages-container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 30px;
    }

    .messages-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 3px solid #008753;
    }

    .messages-header h1 {
      margin: 0;
      color: #008753;
      font-size: 32px;
    }

    .new-message-btn {
      background: linear-gradient(135deg, #008753, #006b42);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(0, 135, 83, 0.3);
      transition: all 0.3s;
    }

    .new-message-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 135, 83, 0.4);
    }

    .messages-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 12px 24px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }

    .tab-btn.active {
      color: #008753;
      border-bottom-color: #008753;
    }

    .tab-btn:hover {
      color: #008753;
    }

    .messages-content {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 30px;
      min-height: 600px;
    }

    .messages-list {
      border-right: 2px solid #e0e0e0;
      padding-right: 20px;
      max-height: 700px;
      overflow-y: auto;
    }

    .message-item {
      background: #f9f9f9;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .message-item:hover {
      border-color: #008753;
      box-shadow: 0 2px 8px rgba(0, 135, 83, 0.2);
    }

    .message-item.unread {
      background: #e8f5e9;
      border-color: #4caf50;
      font-weight: 600;
    }

    .message-item.selected {
      background: #c8e6c9;
      border-color: #008753;
    }

    .message-item-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 10px;
    }

    .message-subject {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }

    .message-meta {
      font-size: 12px;
      color: #666;
      display: flex;
      gap: 15px;
    }

    .message-preview {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .message-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
    }

    .badge-task {
      background: #ff9800;
      color: white;
    }

    .badge-high {
      background: #f44336;
      color: white;
    }

    .badge-urgent {
      background: #d32f2f;
      color: white;
    }

    .message-detail {
      background: #fafafa;
      border-radius: 8px;
      padding: 25px;
      min-height: 500px;
    }

    .message-detail-header {
      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    .message-detail-subject {
      font-size: 24px;
      font-weight: 700;
      color: #333;
      margin-bottom: 15px;
    }

    .message-detail-meta {
      display: flex;
      gap: 20px;
      font-size: 14px;
      color: #666;
      flex-wrap: wrap;
    }

    .message-detail-body {
      font-size: 16px;
      line-height: 1.8;
      color: #333;
      white-space: pre-wrap;
      margin-bottom: 30px;
      padding: 20px;
      background: white;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }

    .message-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #e0e0e0;
    }

    .action-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-reply {
      background: #008753;
      color: white;
    }

    .btn-reply:hover {
      background: #006b42;
    }

    .btn-mark-read {
      background: #2196f3;
      color: white;
    }

    .btn-mark-addressed {
      background: #4caf50;
      color: white;
    }

    .btn-mark-in-process {
      background: #ff9800;
      color: white;
    }

    .btn-archive {
      background: #757575;
      color: white;
    }

    .category-section {
      margin-bottom: 40px;
    }

    .category-title {
      font-size: 20px;
      font-weight: 700;
      color: #008753;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #008753;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      box-sizing: border-box;
    }

    .form-group textarea {
      min-height: 150px;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #008753;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 25px;
    }

    .btn-primary {
      background: #008753;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }

    .btn-secondary {
      background: #757575;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }

    .back-btn {
      background: #757575;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .messages-content {
        grid-template-columns: 1fr;
      }

      .messages-list {
        border-right: none;
        border-bottom: 2px solid #e0e0e0;
        padding-right: 0;
        padding-bottom: 20px;
        margin-bottom: 20px;
        max-height: 400px;
      }
    }
  </style>
  <script src="js/ui-title-case.js?v=20260616120000" defer></script>
</head>
<body>
  <div class="messages-container">
    <div class="messages-header">
      <div>
        <h1>💬 Messages & Tasks</h1>
        <a class='back-btn' href='dashboard' style='display: inline-block; margin-top: 10px; text-decoration: none;'>← Back to Dashboard</a>
      </div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <a class='new-message-btn' href='/compose-message' style='text-decoration: none; display: inline-block;'>+ New Message</a>
      </div>
    </div>

    <div class="messages-tabs">
      <button class="tab-btn active" onclick="switchTab('inbox')">📥 Inbox</button>
      <button class="tab-btn" onclick="switchTab('sent')">📤 Sent</button>
      <button class="tab-btn" onclick="switchTab('tasks')">✅ Tasks</button>
      <button class="tab-btn" onclick="switchTab('notifications')">🔔 Notifications</button>
      <button class="tab-btn" onclick="switchTab('portal')">🏥 Patient Portal</button>
    </div>

    <div class="messages-content">
      <div class="messages-list" id="messages-list">
        <div class="empty-state">
          <div class="empty-state-icon">📭</div>
          <p>Loading messages...</p>
        </div>
      </div>

      <div class="message-detail" id="message-detail">
        <div class="empty-state">
          <div class="empty-state-icon">📄</div>
          <p>Select a message to view details</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/vendor/supabase.min.js"></script>
  <script src="js/supabase-client.js?v=20251019043800"></script>
  <script src="js/utils.js"></script>
  <script src="js/main.js?v=20251019043800"></script>
  <script src="js/universal-data-loader.js?v=20251019043800"></script>
  <script src="js/patient-id-normalizer.js"></script>
  <script src="js/patients.js?v=20260429200000-mrn-sweep"></script>
  <script src="js/messages.js?v=2"></script>
  <script src="js/patient-portal.js"></script>
  <script>
    let currentTab = 'inbox';
    let currentMessages = { received: [], sent: [] };
    let currentNotifications = [];
    let selectedMessageId = null;
    let portalThreads = [];
    let portalResultRequests = [];
    let portalAppointmentRequests = [];
    let selectedPortalPatientId = null;

    // Initialize page
    window.addEventListener('load', async function() {
      try {
        await loadRecipients();
        await loadMessages();
        if (typeof window.loadNotifications === 'function') {
          currentNotifications = await window.loadNotifications();
        }
        
        // After loading, check for unread messages and switch to Inbox if needed
        const unreadCount = (currentMessages.received || []).filter(m => !m.isRead).length;
        if (unreadCount > 0) {
          // Switch to Inbox tab automatically
          switchTab('inbox');
        }
        
        // Notifications badge will be handled by dashboard
      } catch (error) {
        console.error('Error initializing messages page:', error);
      }
    });

    // Load messages
    async function loadMessages() {
      try {
        if (typeof window.loadMessagesWithSupabasePriority === 'function') {
          currentMessages = await window.loadMessagesWithSupabasePriority();
          
          // Check for unread messages and show badge on Inbox tab
          const unreadCount = (currentMessages.received || []).filter(m => !m.isRead).length;
          if (unreadCount > 0) {
            const inboxTab = document.querySelector('.tab-btn[onclick*="inbox"]');
            if (inboxTab) {
              // Remove existing badge if any
              const existingBadge = inboxTab.querySelector('span');
              if (existingBadge) existingBadge.remove();
              
              // Add unread count badge
              const badge = document.createElement('span');
              badge.style.cssText = 'background: #ff4444; color: white; border-radius: 10px; padding: 2px 6px; font-size: 11px; margin-left: 5px; font-weight: bold;';
              badge.textContent = unreadCount;
              inboxTab.appendChild(badge);
            }
          } else {
            // Remove badge if no unread messages
            const inboxTab = document.querySelector('.tab-btn[onclick*="inbox"]');
            if (inboxTab) {
              const badge = inboxTab.querySelector('span');
              if (badge) badge.remove();
            }
          }
          
          displayMessages();
        } else {
          console.error('Messages module not loaded');
        }
      } catch (error) {
        console.error('Error loading messages:', error);
      }
    }

    let allStaff = [];
    let allPatients = [];
    let filteredRecipients = [];

    // Load recipients for new message
    async function loadRecipients() {
      try {
        // Load staff - ensure it's only staff
        if (typeof window.loadOrganizationUsers === 'function') {
          const loadedStaff = await window.loadOrganizationUsers();
          // Filter to ensure only staff (double-check)
          allStaff = (loadedStaff || []).filter(r => r && r.type === 'staff');
          console.log('✅ Loaded staff:', allStaff.length, allStaff);
        }
        
        // Load patients - ensure it's only patients
        if (typeof window.loadOrganizationPatients === 'function') {
          const loadedPatients = await window.loadOrganizationPatients();
          // Filter to ensure only patients (double-check)
          allPatients = (loadedPatients || []).filter(r => r && r.type === 'patient');
          console.log('✅ Loaded patients:', allPatients.length, allPatients);
        }
      } catch (error) {
        console.error('Error loading recipients:', error);
      }
    }

    // Switch tabs
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      
      const tabButtons = document.querySelectorAll('.tab-btn');
      tabButtons.forEach(btn => {
        const btnText = btn.textContent.trim();
        if ((tab === 'inbox' && btnText.includes('Inbox')) ||
            (tab === 'sent' && btnText.includes('Sent')) ||
            (tab === 'tasks' && btnText.includes('Tasks')) ||
            (tab === 'notifications' && btnText.includes('Notifications')) ||
            (tab === 'portal' && btnText.includes('Patient Portal'))) {
          btn.classList.add('active');
        }
      });

      if (tab === 'portal') {
        loadPortalTab();
      } else {
        displayMessages();
      }
    }

    function getStaffOrgId() {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      return user.organizationId || user.organization_id;
    }

    async function loadPortalTab() {
      const orgId = getStaffOrgId();
      if (!orgId || !window.MediForgePatientPortal) {
        document.getElementById('messages-list').innerHTML = '<div class="empty-state"><p>Organization not found</p></div>';
        return;
      }
      portalThreads = await window.MediForgePatientPortal.loadStaffPortalThreads(orgId);
      portalResultRequests = await window.MediForgePatientPortal.loadOrdersAwaitingPublish(orgId);
      portalAppointmentRequests = await window.MediForgePatientPortal.loadStaffAppointmentRequests(orgId);
      displayPortalTab();
    }

    function groupPortalThreads(messages) {
      const byPatient = {};
      (messages || []).forEach((m) => {
        const pid = m.patient_id;
        if (!byPatient[pid]) byPatient[pid] = { patientId: pid, patient: m.patients, messages: [], unread: 0 };
        byPatient[pid].messages.push(m);
        if (m.from_patient && !m.is_read_by_staff) byPatient[pid].unread += 1;
      });
      return Object.values(byPatient).sort((a, b) => {
        const ta = a.messages[a.messages.length - 1]?.created_at || '';
        const tb = b.messages[b.messages.length - 1]?.created_at || '';
        return tb.localeCompare(ta);
      });
    }

    function displayPortalTab() {
      const listDiv = document.getElementById('messages-list');
      const detailDiv = document.getElementById('message-detail');
      const groups = groupPortalThreads(portalThreads);

      let requestsHtml = '';
      if (portalAppointmentRequests.length) {
        requestsHtml += `<div class="category-section"><div class="category-title">📅 Appointment requests</div>` +
          portalAppointmentRequests.map((r) => {
            const p = r.patients || {};
            const name = `${p.first_name || ''} ${p.last_name || ''}`.trim() || 'Patient';
            const appt = r.appointments || {};
            const isCancel = r.request_type === 'cancel';
            const isNew = r.request_type === 'new';
            const typeLabel = isNew ? 'New appointment' : (isCancel ? 'Cancel' : 'Reschedule');
            const apptWhen = appt.appointment_date
              ? `${appt.appointment_date}${appt.appointment_time ? ' ' + appt.appointment_time : ''}`
              : ':';
            const reqAt = r.created_at ? new Date(r.created_at).toLocaleString() : '';
            const detail = isNew
              ? `Reason: ${escapeHtml(r.reason || ':')}. Preferred: ${escapeHtml(r.preferred_date || ':')} at ${escapeHtml(r.preferred_time || ':')}${r.reschedule_notes ? ': ' + escapeHtml(r.reschedule_notes) : ''}`
              : (isCancel
                ? `Reason: ${escapeHtml(r.reason || ':')}`
                : `Preferred: ${escapeHtml(r.preferred_date || ':')} at ${escapeHtml(r.preferred_time || ':')}${r.reschedule_notes ? ': ' + escapeHtml(r.reschedule_notes) : ''}`);
            return `<div class="message-item unread" style="cursor:default">
              <div class="message-subject">${escapeHtml(name)}: ${typeLabel} request</div>
              <div class="message-meta">${isNew ? '' : 'Current appt: ' + escapeHtml(apptWhen) + ' · '}${escapeHtml(reqAt)}</div>
              <div class="message-preview">${detail}</div>
              <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
                <button class="action-btn btn-mark-addressed" onclick="actionAppointmentRequest('${r.id}','actioned')">Mark actioned</button>
                <button class="action-btn btn-archive" onclick="actionAppointmentRequest('${r.id}','declined')">Decline</button>
                <a class="action-btn btn-reply" href="appointments" style="text-decoration:none;display:inline-block">Open appointments</a>
              </div>
            </div>`;
          }).join('') + '</div>';
      }
      if (portalResultRequests.length) {
        requestsHtml += `<div class="category-section"><div class="category-title">📋 Result publish requests</div>` +
          portalResultRequests.map((o) => {
            const p = o.patients || {};
            const name = `${p.first_name || ''} ${p.last_name || ''}`.trim() || 'Patient';
            const reqAt = o.portal_results_request_at ? new Date(o.portal_results_request_at).toLocaleString() : '';
            return `<div class="message-item" style="cursor:default">
              <div class="message-subject">${escapeHtml(name)}: ${o.type === 'imaging' ? 'Imaging' : 'Lab'}</div>
              <div class="message-meta">Requested ${escapeHtml(reqAt)}</div>
              <button class="action-btn btn-mark-addressed" style="margin-top:10px" onclick="publishPortalResults('${o.id}')">Publish for patient</button>
            </div>`;
          }).join('') + '</div>';
      }

      if (!groups.length && !portalResultRequests.length && !portalAppointmentRequests.length) {
        listDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><p>No patient portal messages yet</p></div>';
        detailDiv.innerHTML = '<div class="empty-state"><p>Patients can message your clinic from their portal</p></div>';
        return;
      }

      listDiv.innerHTML = requestsHtml + (groups.length ? '<div class="category-section"><div class="category-title">💬 Conversations</div>' +
        groups.map((g) => {
          const p = g.patient || {};
          const name = `${p.first_name || ''} ${p.last_name || ''}`.trim() || 'Patient';
          const last = g.messages[g.messages.length - 1];
          const preview = (last?.body || '').substring(0, 80);
          const unread = g.unread > 0 ? ` <span class="message-badge badge-urgent">${g.unread}</span>` : '';
          const sel = selectedPortalPatientId === g.patientId ? ' selected' : '';
          return `<div class="message-item${sel}${g.unread ? ' unread' : ''}" data-portal-patient="${g.patientId}" onclick="selectPortalPatient('${g.patientId}')">
            <div class="message-subject">${escapeHtml(name)}${unread}</div>
            <div class="message-preview">${escapeHtml(preview)}</div>
          </div>`;
        }).join('') + '</div>' : '');

      if (selectedPortalPatientId) {
        renderPortalConversation(selectedPortalPatientId);
      } else if (groups.length) {
        selectPortalPatient(groups[0].patientId);
      } else {
        detailDiv.innerHTML = '<div class="empty-state"><p>Select a conversation</p></div>';
      }
    }

    async function selectPortalPatient(patientId) {
      selectedPortalPatientId = patientId;
      document.querySelectorAll('.message-item[data-portal-patient]').forEach((el) => {
        el.classList.toggle('selected', el.dataset.portalPatient === patientId);
      });
      await renderPortalConversation(patientId);
      const unreadIds = portalThreads.filter((m) => m.patient_id === patientId && m.from_patient && !m.is_read_by_staff).map((m) => m.id);
      if (unreadIds.length) {
        await window.MediForgePatientPortal.staffMarkPortalMessagesRead(unreadIds);
        portalThreads.forEach((m) => { if (unreadIds.includes(m.id)) m.is_read_by_staff = true; });
      }
    }

    function renderPortalConversation(patientId) {
      const detailDiv = document.getElementById('message-detail');
      const thread = portalThreads.filter((m) => m.patient_id === patientId).sort((a, b) => a.created_at.localeCompare(b.created_at));
      const p = thread[0]?.patients || {};
      const name = `${p.first_name || ''} ${p.last_name || ''}`.trim() || 'Patient';

      detailDiv.innerHTML = `
        <div class="message-detail-header">
          <div class="message-detail-subject">${escapeHtml(name)}</div>
          <div class="message-detail-meta">Patient portal messaging</div>
        </div>
        <div id="portal-thread-messages" style="max-height:400px;overflow-y:auto;margin-bottom:16px">
          ${thread.map((m) => {
            const who = m.from_patient ? 'Patient' : 'Clinic';
            const t = new Date(m.created_at).toLocaleString();
            return `<div style="margin-bottom:12px;padding:12px;background:${m.from_patient ? '#e8f5e9' : '#e3f2fd'};border-radius:8px">
              <strong>${who}</strong> <span style="font-size:12px;color:#666">${t}</span><br>${escapeHtml(m.body)}
            </div>`;
          }).join('')}
        </div>
        <div class="form-group">
          <label>Reply to patient</label>
          <textarea id="portal-reply-body" placeholder="Type your reply…"></textarea>
        </div>
        <button class="action-btn btn-reply" onclick="sendPortalStaffReply('${patientId}')">Send reply</button>
      `;
      const box = document.getElementById('portal-thread-messages');
      if (box) box.scrollTop = box.scrollHeight;
    }

    async function sendPortalStaffReply(patientId) {
      const body = (document.getElementById('portal-reply-body')?.value || '').trim();
      if (!body) return;
      const orgId = getStaffOrgId();
      try {
        await window.MediForgePatientPortal.staffReplyToPatient(patientId, orgId, body);
        await loadPortalTab();
        selectedPortalPatientId = patientId;
        displayPortalTab();
      } catch (e) {
        alert('Could not send reply: ' + (e.message || e));
      }
    }

    async function publishPortalResults(orderId) {
      if (!confirm('Publish these results for the patient to view in their portal?')) return;
      try {
        await window.MediForgePatientPortal.staffPublishOrderResults(orderId);
        await loadPortalTab();
      } catch (e) {
        alert('Could not publish: ' + (e.message || e));
      }
    }

    async function actionAppointmentRequest(requestId, status) {
      const label = status === 'declined' ? 'decline' : 'mark as actioned';
      if (!confirm(`${label.charAt(0).toUpperCase() + label.slice(1)} this appointment request?`)) return;
      try {
        await window.MediForgePatientPortal.staffMarkAppointmentRequestActioned(requestId, status);
        await loadPortalTab();
      } catch (e) {
        alert('Could not update request: ' + (e.message || e));
      }
    }

    // Display messages based on current tab
    function displayMessages() {
      const listDiv = document.getElementById('messages-list');
      let messages = [];

      if (currentTab === 'inbox') {
        messages = currentMessages.received.filter(m => !m.isArchived);
      } else if (currentTab === 'sent') {
        messages = currentMessages.sent.filter(m => !m.isArchived);
      } else if (currentTab === 'tasks') {
        messages = [...currentMessages.received, ...currentMessages.sent]
          .filter(m => m.messageType === 'task' && !m.isArchived);
      } else if (currentTab === 'notifications') {
        listDiv.innerHTML = renderNotificationsList();
        document.querySelectorAll('.message-item[data-notification-id]').forEach(item => {
          item.addEventListener('click', function() {
            const nid = this.dataset.notificationId;
            selectNotification(nid);
          });
        });
        return;
      } else if (currentTab === 'portal') {
        loadPortalTab();
        return;
      }

      if (messages.length === 0) {
        listDiv.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <p>No ${currentTab === 'inbox' ? 'received' : currentTab === 'sent' ? 'sent' : 'task'} messages</p>
          </div>
        `;
        return;
      }

      // Categorize tasks
      if (currentTab === 'tasks') {
        const outstanding = messages.filter(m => m.taskStatus === 'outstanding');
        const inProcess = messages.filter(m => m.taskStatus === 'in-process');
        const addressed = messages.filter(m => m.taskStatus === 'addressed' || m.taskStatus === 'completed');

        let html = '';
        
        if (outstanding.length > 0) {
          html += `<div class="category-section">
            <div class="category-title">Outstanding (${outstanding.length})</div>
            ${outstanding.map(m => renderMessageItem(m)).join('')}
          </div>`;
        }

        if (inProcess.length > 0) {
          html += `<div class="category-section">
            <div class="category-title">In Process (${inProcess.length})</div>
            ${inProcess.map(m => renderMessageItem(m)).join('')}
          </div>`;
        }

        if (addressed.length > 0) {
          html += `<div class="category-section">
            <div class="category-title">Addressed/Completed (${addressed.length})</div>
            ${addressed.map(m => renderMessageItem(m)).join('')}
          </div>`;
        }

        listDiv.innerHTML = html || `
          <div class="empty-state">
            <div class="empty-state-icon">✅</div>
            <p>No tasks found</p>
          </div>
        `;
      } else {
        listDiv.innerHTML = messages.map(m => renderMessageItem(m)).join('');
      }

      // Add click handlers
      document.querySelectorAll('.message-item').forEach(item => {
        item.addEventListener('click', function() {
          const messageId = this.dataset.messageId;
          selectMessage(messageId);
        });
      });

      // Resolve user names asynchronously
      resolveUserNames();
      
      // Resolve delivery statuses for sent messages
      if (currentTab === 'sent') {
        resolveDeliveryStatuses();
      }
    }

    // Check delivery status for sent messages
    async function checkDeliveryStatus(messageId, recipientId) {
      if (!messageId || !recipientId || !window.supabaseClient) {
        return null;
      }
      
      try {
        // Check if message exists in Supabase with correct recipient
        const { data, error } = await window.supabaseClient
          .from('messages')
          .select('id, is_read, read_at')
          .eq('id', messageId)
          .eq('recipient_id', recipientId)
          .single();
        
        if (error || !data) {
          return { status: 'pending', label: 'Pending', icon: '⏳' };
        }
        
        if (data.is_read) {
          return { status: 'read', label: 'Read', icon: '✓✓', readAt: data.read_at };
        }
        
        return { status: 'delivered', label: 'Delivered', icon: '✓' };
      } catch (error) {
        console.warn('Error checking delivery status:', error);
        return null;
      }
    }

    function renderNotificationsList() {
      const notifications = currentNotifications || [];
      if (notifications.length === 0) {
        return '<div class="empty-state"><div class="empty-state-icon">🔔</div><p>No notifications</p></div>';
      }
      return notifications.map(n => {
        const isUnread = !n.is_read;
        const isAddressed = n.is_addressed === true;
        const typeLabel = (n.type === 'appointment_reminder') ? '📅 Appointment' : (n.type || 'Notification');
        const date = n.created_at ? new Date(n.created_at).toLocaleString() : '';
        let preview = (n.title || '') + ': ' + (n.body || '').substring(0, 100);
        if (n.type === 'appointment_reminder' && n.metadata && typeof n.metadata === 'object') {
          const m = n.metadata;
          preview = (m.patient_name || 'Patient') + ' (ID: ' + (m.patient_id || ':') + ') | ' + (m.appointment_date || '') + ' ' + (m.appointment_time || '') + ' | ' + (m.reason || '');
        } else if (n.body) {
          preview = (n.title || '') + ': ' + (n.body || '').substring(0, 100);
        }
        return `<div class="message-item ${isUnread ? 'unread' : ''} ${isAddressed ? 'addressed' : ''}" data-notification-id="${n.id}">
          <div class="message-item-header">
            <div>
              <div class="message-subject">${typeLabel}${isAddressed ? ' <span style="color:#4caf50;font-size:11px;">✓ Addressed</span>' : ''}</div>
              <div class="message-meta"><span>${date}</span></div>
            </div>
          </div>
          <div class="message-preview">${escapeHtml(preview)}${(preview.length > 100) ? '...' : ''}</div>
        </div>`;
      }).join('');
    }

    async function selectNotification(notificationId) {
      const n = (currentNotifications || []).find(x => x.id === notificationId);
      if (!n) return;
      if (typeof window.markNotificationAsRead === 'function') {
        await window.markNotificationAsRead(notificationId);
      }
      n.is_read = true;
      const detailDiv = document.getElementById('message-detail');
      const url = n.action_url || (n.type === 'appointment_reminder' ? 'appointments' : '');
      const isAppointment = n.type === 'appointment_reminder';
      const isAddressed = n.is_addressed === true;
      const actionLink = url
        ? (url.includes('appointment-sms-reminders')
          ? '<p style="margin-top:15px;"><a href="' + escapeHtml(url) + '" class="new-message-btn" style="display:inline-block;text-decoration:none;margin-right:10px;">Send SMS</a></p>'
          : '<p style="margin-top:15px;"><a href="' + escapeHtml(url) + '" class="new-message-btn" style="display:inline-block;text-decoration:none;">View details</a></p>')
        : '';
      const markAddressedBtn = (isAppointment && !isAddressed && typeof window.markNotificationAsAddressed === 'function')
        ? '<p style="margin-top:15px;"><button type="button" class="new-message-btn" id="mark-addressed-btn" data-notification-id="' + notificationId + '" style="display:inline-block;border:none;cursor:pointer;">Mark as addressed</button></p>'
        : '';
      detailDiv.innerHTML = `
        <div class="message-detail-content">
          <h3>${escapeHtml(n.title || 'Notification')}</h3>
          <div class="message-meta">${n.created_at ? new Date(n.created_at).toLocaleString() : ''}${isAddressed ? ' <span style="color:#4caf50;">✓ Addressed</span>' : ''}</div>
          <div class="message-body" style="margin-top:15px;white-space:pre-wrap;">${escapeHtml(n.body || '')}</div>
          ${actionLink}${markAddressedBtn}
        </div>
      `;
      const btn = document.getElementById('mark-addressed-btn');
      if (btn) {
        btn.addEventListener('click', async () => {
          await window.markNotificationAsAddressed(notificationId);
          n.is_addressed = true;
          selectNotification(notificationId);
          displayMessages();
        });
      }
      displayMessages();
    }

    // Render message item (async name resolution will be done in selectMessage)
    function renderMessageItem(message) {
      const isUnread = !message.isRead;
      const isSelected = selectedMessageId === message.id;
      const isTask = message.messageType === 'task';
      const priorityBadge = message.priority === 'high' || message.priority === 'urgent' 
        ? `<span class="message-badge badge-${message.priority}">${message.priority.toUpperCase()}</span>` 
        : '';
      const taskBadge = isTask ? `<span class="message-badge badge-task">TASK</span>` : '';
      
      // Store user IDs for async name resolution
      const userId = currentTab === 'inbox' ? message.senderId : message.recipientId;
      const userNamePlaceholder = userId ? 'Loading...' : 'Unknown';
      
      const date = new Date(message.createdAt).toLocaleString();
      
      // Add delivery status placeholder for sent messages
      const deliveryStatusPlaceholder = currentTab === 'sent' && message.recipientId
        ? '<span class="delivery-status-placeholder" data-message-id="' + message.id + '" data-recipient-id="' + message.recipientId + '">⏳ Checking...</span>'
        : '';

      return `
        <div class="message-item ${isUnread ? 'unread' : ''} ${isSelected ? 'selected' : ''}" data-message-id="${message.id}" data-user-id="${userId || ''}">
          <div class="message-item-header">
            <div>
              <div class="message-subject">
                ${escapeHtml(message.subject)} ${priorityBadge} ${taskBadge}${deliveryStatusPlaceholder}
              </div>
              <div class="message-meta">
                <span>${currentTab === 'inbox' ? 'From' : 'To'}: <span class="user-name-placeholder">${userNamePlaceholder}</span></span>
                <span>${date}</span>
              </div>
            </div>
          </div>
          <div class="message-preview">${escapeHtml((message.body || '').substring(0, 100))}${message.body && message.body.length > 100 ? '...' : ''}</div>
        </div>
      `;
    }

    // Resolve user names for all message items
    async function resolveUserNames() {
      const placeholders = document.querySelectorAll('.user-name-placeholder');
      const userIds = new Set();
      placeholders.forEach(placeholder => {
        const messageItem = placeholder.closest('.message-item');
        if (messageItem) {
          const userId = messageItem.dataset.userId;
          if (userId) userIds.add(userId);
        }
      });

      console.log('🔍 Resolving names for', userIds.size, 'user IDs:', Array.from(userIds));

      // Fetch all user names at once - use window.getUserNameById directly
      const nameMap = {};
      for (const userId of userIds) {
        try {
          console.log('🔍 Looking up name for user ID:', userId);
          
          // Use window.getUserNameById directly (from js/messages.js)
          let name = 'Unknown User';
          if (typeof window.getUserNameById === 'function') {
            name = await window.getUserNameById(userId);
          } else {
            console.warn('⚠️ window.getUserNameById not available, using direct query');
          }
          
          // If still unknown, try direct Supabase query
          if (name === 'Unknown User' && window.supabaseClient) {
            try {
              // Try users table
              const { data: user } = await window.supabaseClient
                .from('users')
                .select('first_name, last_name, username, id')
                .eq('id', userId)
                .single();
              
              if (user) {
                const foundName = `${user.first_name || ''} ${user.last_name || ''}`.trim() || user.username;
                if (foundName) {
                  name = foundName;
                  console.log('✅ Found via direct query (users):', foundName);
                }
              } else {
                // Try patients table
                const { data: patient } = await window.supabaseClient
                  .from('patients')
                  .select('first_name, last_name, middle_name, patient_id, id')
                  .eq('id', userId)
                  .single();
                
                if (patient) {
                  const foundName = `${patient.first_name || ''} ${patient.middle_name || ''} ${patient.last_name || ''}`.trim();
                  if (foundName) {
                    name = foundName;
                    console.log('✅ Found via direct query (patients):', foundName);
                  }
                }
              }
              
              if (name === 'Unknown User') {
                console.warn('⚠️ No user or patient found with ID:', userId);
              }
            } catch (queryError) {
              console.error('❌ Error in direct query fallback:', queryError);
            }
          }
          
          nameMap[userId] = name;
          console.log('✅ Final name for', userId, ':', name);
        } catch (error) {
          console.error('❌ Error getting name for', userId, ':', error);
          nameMap[userId] = 'Unknown User';
        }
      }

      // Update placeholders
      placeholders.forEach(placeholder => {
        const messageItem = placeholder.closest('.message-item');
        if (messageItem) {
          const userId = messageItem.dataset.userId;
          const name = nameMap[userId] || 'Unknown User';
          placeholder.textContent = name;
          
          if (name === 'Unknown User') {
            console.warn('⚠️ Still showing Unknown User for ID:', userId, 'Message ID:', messageItem.dataset.messageId);
          }
        }
      });
      
      console.log('✅ Name resolution complete. Results:', nameMap);
    }

    // Resolve delivery status for sent messages
    async function resolveDeliveryStatuses() {
      const statusPlaceholders = document.querySelectorAll('.delivery-status-placeholder');
      
      for (const placeholder of statusPlaceholders) {
        const messageId = placeholder.dataset.messageId;
        const recipientId = placeholder.dataset.recipientId;
        
        if (!messageId || !recipientId) {
          placeholder.remove();
          continue;
        }
        
        try {
          const deliveryStatus = await checkDeliveryStatus(messageId, recipientId);
          
          if (deliveryStatus) {
            placeholder.className = `delivery-status ${deliveryStatus.status}`;
            placeholder.innerHTML = `<span class="delivery-status-icon">${deliveryStatus.icon}</span> ${deliveryStatus.label}`;
            if (deliveryStatus.readAt) {
              placeholder.title = `Read at ${new Date(deliveryStatus.readAt).toLocaleString()}`;
            }
          } else {
            placeholder.remove();
          }
        } catch (error) {
          console.warn('Error checking delivery status:', error);
          placeholder.remove();
        }
      }
    }

    // Select message to view
    async function selectMessage(messageId) {
      selectedMessageId = messageId;
      const allMessages = [...currentMessages.received, ...currentMessages.sent];
      const message = allMessages.find(m => m.id === messageId);

      if (!message) {
        console.error('Message not found:', messageId);
        return;
      }
      
      console.log('📧 Selected message:', {
        id: message.id,
        subject: message.subject,
        senderId: message.senderId,
        recipientId: message.recipientId,
        currentTab: currentTab
      });

      // Mark as read if unread - use window.updateMessageStatus directly
      if (!message.isRead && currentTab === 'inbox') {
        if (typeof window.updateMessageStatus === 'function') {
          try {
            await window.updateMessageStatus(messageId, { isRead: true });
            message.isRead = true;
            // Reload to refresh UI
            await loadMessages();
            // Re-select to show updated status
            selectMessage(messageId);
          } catch (error) {
            console.error('Error marking message as read:', error);
          }
        }
      }

      // Get sender/recipient names - use window.getUserNameById directly
      console.log('🔍 Getting names for message:', {
        senderId: message.senderId,
        recipientId: message.recipientId
      });
      
      let senderName = 'Unknown User';
      let recipientName = 'All Users';
      
      if (typeof window.getUserNameById === 'function') {
        senderName = await window.getUserNameById(message.senderId);
      }
      
      if (message.recipientId) {
        console.log('🔍 Looking up recipient:', message.recipientId);
        if (typeof window.getUserNameById === 'function') {
          recipientName = await window.getUserNameById(message.recipientId);
        }
        console.log('✅ Recipient name found:', recipientName);
        
        // If still unknown, try direct Supabase query
        if (recipientName === 'Unknown User' && window.supabaseClient) {
          try {
            // Try users table
            const { data: user } = await window.supabaseClient
              .from('users')
              .select('first_name, last_name, username')
              .eq('id', message.recipientId)
              .single();
            
            if (user) {
              recipientName = `${user.first_name || ''} ${user.last_name || ''}`.trim() || user.username;
              console.log('✅ Found recipient via direct query (users):', recipientName);
            } else {
              // Try patients table
              const { data: patient } = await window.supabaseClient
                .from('patients')
                .select('first_name, last_name, middle_name, patient_id')
                .eq('id', message.recipientId)
                .single();
              
              if (patient) {
                recipientName = `${patient.first_name || ''} ${patient.middle_name || ''} ${patient.last_name || ''}`.trim();
                console.log('✅ Found recipient via direct query (patients):', recipientName);
              }
            }
          } catch (error) {
            console.error('Error checking recipient in Supabase:', error);
          }
        }
      }

      // Render message detail
      const detailDiv = document.getElementById('message-detail');
      const date = new Date(message.createdAt).toLocaleString();
      const priorityBadge = message.priority === 'high' || message.priority === 'urgent' 
        ? `<span class="message-badge badge-${message.priority}">${message.priority.toUpperCase()}</span>` 
        : '';
      const taskBadge = message.messageType === 'task' 
        ? `<span class="message-badge badge-task">TASK: ${message.taskStatus.toUpperCase()}</span>` 
        : '';

      detailDiv.innerHTML = `
        <div class="message-detail-header">
          <div class="message-detail-subject">
            ${escapeHtml(message.subject)} ${priorityBadge} ${taskBadge}
          </div>
          <div class="message-detail-meta">
            <span><strong>From:</strong> ${escapeHtml(senderName)}</span>
            <span><strong>To:</strong> ${escapeHtml(recipientName)}</span>
            <span><strong>Date:</strong> ${date}</span>
            ${message.messageType === 'task' && message.taskDueDate ? `<span><strong>Due:</strong> ${new Date(message.taskDueDate).toLocaleString()}</span>` : ''}
          </div>
        </div>
        <div class="message-detail-body">${escapeHtml(message.body)}</div>
        <div class="message-actions">
          ${currentTab === 'inbox' ? `
            <button class="action-btn btn-reply" onclick="replyToMessage('${messageId}')">Reply</button>
            ${!message.isRead ? `<button class="action-btn btn-mark-read" onclick="markAsRead('${messageId}')">Mark as Read</button>` : ''}
            ${message.messageType === 'task' ? `
              <button class="action-btn btn-mark-in-process" onclick="updateTaskStatus('${messageId}', 'in-process')">Mark In Process</button>
              <button class="action-btn btn-mark-addressed" onclick="updateTaskStatus('${messageId}', 'addressed')">Mark as Addressed</button>
            ` : ''}
            <button class="action-btn btn-archive" onclick="archiveMessage('${messageId}')">Archive</button>
          ` : ''}
        </div>
      `;

      // Refresh message list to update selected state
      displayMessages();
    }

    // Update message status - use window.updateMessageStatus directly to avoid recursion
    // No local wrapper needed - just call window.updateMessageStatus directly

    // Mark as read - use window.updateMessageStatus directly
    async function markAsRead(messageId) {
      if (typeof window.updateMessageStatus === 'function') {
        await window.updateMessageStatus(messageId, { isRead: true });
        await loadMessages();
        if (selectedMessageId === messageId) {
          selectMessage(messageId);
        }
      }
    }

    // Update task status - use window.updateMessageStatus directly
    async function updateTaskStatus(messageId, status) {
      if (typeof window.updateMessageStatus === 'function') {
        await window.updateMessageStatus(messageId, { taskStatus: status });
        await loadMessages();
        if (selectedMessageId === messageId) {
          selectMessage(messageId);
        }
      }
    }

    // Archive message - use window.updateMessageStatus directly
    async function archiveMessage(messageId) {
      if (confirm('Are you sure you want to archive this message?')) {
        if (typeof window.updateMessageStatus === 'function') {
          await window.updateMessageStatus(messageId, { isArchived: true });
          await loadMessages();
          const detailDiv = document.getElementById('message-detail');
          if (detailDiv) {
            detailDiv.innerHTML = `
              <div class="empty-state">
                <div class="empty-state-icon">📄</div>
                <p>Select a message to view details</p>
              </div>
            `;
          }
        }
      }
    }

    // Reply to message
    async function replyToMessage(messageId) {
      const allMessages = [...currentMessages.received, ...currentMessages.sent];
      const message = allMessages.find(m => m.id === messageId);
      
      if (message) {
        // Determine if sender is staff or patient
        const senderIsStaff = allStaff.some(s => s.id === message.senderId);
        const senderIsPatient = allPatients.some(p => p.id === message.senderId);
        
        const recipientType = senderIsStaff ? 'staff' : (senderIsPatient ? 'patient' : '');
        const params = new URLSearchParams();
        params.set('replyTo', messageId);
        if (message.subject) params.set('subject', message.subject);
        if (message.senderId) params.set('recipientId', message.senderId);
        if (recipientType) params.set('recipientType', recipientType);

        window.location.href = `compose-message?${params.toString()}`;
      }
    }

    // Use window.getUserNameById directly - no local wrapper to avoid recursion
    // getUserNameById is defined in js/messages.js and exported to window

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    window.addEventListener('click', function(event) {});
  </script>
</body>
