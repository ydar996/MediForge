<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">

  <script src="/js/supabase-env.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migrate Backup to Supabase</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .section {
            background: #f8f9fa;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .section h2 {
            color: #667eea;
            margin-top: 0;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
            margin-right: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .log {
            background: #1a202c;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 500px;
            overflow-y: auto;
            margin-top: 20px;
        }
        
        .log-entry {
            margin: 5px 0;
            padding: 3px 0;
        }
        
        .log-entry.success { color: #68d391; }
        .log-entry.error { color: #fc8181; }
        .log-entry.warning { color: #f6ad55; }
        .log-entry.info { color: #63b3ed; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #e2e8f0;
        }
        
        .stat-box .number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-box .label {
            font-size: 14px;
            color: #64748b;
            margin-top: 10px;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e2e8f0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.1"></script>
    <script src="js/supabase-client.js?v=20251018191427?v=1"></script>

    <div class="container">
        <h1><i class="fa-solid fa-lock" aria-hidden="true"></i> Migrate Backup to Supabase</h1>
        
        <div class="section">
            <h2><i class="fa-solid fa-lock" aria-hidden="true"></i> Step 1: Load Backup File</h2>
            <input type="file" id="backup-file" accept=".json" style="margin-bottom: 15px;">
            <button class="btn" onclick="loadBackup()">Load Backup</button>
            
            <div class="stats" id="backup-stats" style="display: none;">
                <div class="stat-box">
                    <div class="number" id="stat-patients">0</div>
                    <div class="label">Patients</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="stat-appointments">0</div>
                    <div class="label">Appointments</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="stat-users">0</div>
                    <div class="label">Users</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="stat-invoices">0</div>
                    <div class="label">Invoices</div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2><i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i> Step 2: Migrate Data</h2>
            <button class="btn" id="migrate-btn" onclick="startMigration()" disabled>Start Migration</button>
            <button class="btn" onclick="clearLogs()">Clear Logs</button>
            
            <div class="progress-bar" style="display: none;" id="progress-bar">
                <div class="progress-fill" id="progress-fill">0%</div>
            </div>
        </div>
        
        <div class="log" id="migration-log"></div>
    </div>

    <script>
        let backupData = null;
        let orgId = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('migration-log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function updateProgress(percent, text) {
            const progressBar = document.getElementById('progress-bar');
            const progressFill = document.getElementById('progress-fill');
            progressBar.style.display = 'block';
            progressFill.style.width = `${percent}%`;
            progressFill.textContent = text || `${percent}%`;
        }

        function clearLogs() {
            document.getElementById('migration-log').innerHTML = '';
        }

        async function loadBackup() {
            const fileInput = document.getElementById('backup-file');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a backup file');
                return;
            }

            log('<i class="fa-solid fa-lock" aria-hidden="true"></i> Reading backup file...', 'info');
            
            try {
                const text = await file.text();
                // Handle duplicate keys by removing them
                const cleanedText = text.replace(/"followup":\s*"[^"]*",\s*"followUp"/g, '"followUp"');
                backupData = JSON.parse(cleanedText);
                
                log('✓ Backup file loaded successfully', 'success');
                
                // Display stats
                const mecureData = backupData.organizationData?.['Mecure Clinics'];
                if (mecureData) {
                    document.getElementById('stat-patients').textContent = mecureData.patients?.length || 0;
                    document.getElementById('stat-appointments').textContent = mecureData.appointments?.length || 0;
                    document.getElementById('stat-users').textContent = backupData.users?.length || 0;
                    
                    // Count invoices
                    let invoiceCount = 0;
                    if (mecureData.appointments) {
                        invoiceCount = mecureData.appointments.filter(a => a.invoice).length;
                    }
                    document.getElementById('stat-invoices').textContent = invoiceCount;
                    
                    document.getElementById('backup-stats').style.display = 'grid';
                    document.getElementById('migrate-btn').disabled = false;
                    
                    log(`<i class="fa-solid fa-file-lines" aria-hidden="true"></i> Found: ${mecureData.patients?.length || 0} patients, ${mecureData.appointments?.length || 0} appointments`, 'info');
                } else {
                    log('âš  No Mecure Clinics data found in backup', 'warning');
                }
            } catch (error) {
                log(`âŒ Error loading backup: ${error.message}`, 'error');
                console.error(error);
            }
        }

        async function startMigration() {
            if (!backupData) {
                alert('Please load a backup file first');
                return;
            }

            if (!supabaseClient) {
                log('âŒ Supabase client not initialized', 'error');
                return;
            }

            document.getElementById('migrate-btn').disabled = true;
            log('<i class="fa-solid fa-rocket" aria-hidden="true"></i> Starting migration process...', 'info');
            
            try {
                // Step 1: Get or create organization
                await migrateOrganization();
                
                // Step 2: Migrate users
                await migrateUsers();
                
                // Step 3: Migrate patients
                await migratePatients();
                
                // Step 4: Migrate appointments
                await migrateAppointments();
                
                log('<i class="fa-solid fa-circle-check" aria-hidden="true"></i> Migration completed successfully!', 'success');
                updateProgress(100, '✓ Complete');
                
            } catch (error) {
                log(`âŒ Migration failed: ${error.message}`, 'error');
                console.error(error);
            } finally {
                document.getElementById('migrate-btn').disabled = false;
            }
        }

        async function migrateOrganization() {
            log('<i class="fa-solid fa-building" aria-hidden="true"></i> Step 1: Checking organization...', 'info');
            updateProgress(10, 'Checking organization...');
            
            const orgData = backupData.organizations?.['Mecure Clinics'];
            if (!orgData) {
                throw new Error('Mecure Clinics data not found in backup');
            }

            // Check if organization already exists by org_code OR name
            let { data: existingOrgs, error: checkError } = await supabaseClient
                .from('organizations')
                .select('*')
                .eq('org_code', orgData.orgCode);

            if (checkError) throw checkError;

            // If not found by org_code, try by name
            if (!existingOrgs || existingOrgs.length === 0) {
                const result = await supabaseClient
                    .from('organizations')
                    .select('*')
                    .eq('name', orgData.name);
                
                existingOrgs = result.data;
                if (result.error) throw result.error;
            }

            if (existingOrgs && existingOrgs.length > 0) {
                orgId = existingOrgs[0].id;
                log(`✓ Organization already exists: ${orgData.name} (ID: ${orgId})`, 'success');
                
                // Update org_code if it's missing
                if (!existingOrgs[0].org_code && orgData.orgCode) {
                    log(`<i class="fa-solid fa-file-lines" aria-hidden="true"></i> Updating org_code to: ${orgData.orgCode}`, 'info');
                    await supabaseClient
                        .from('organizations')
                        .update({ org_code: orgData.orgCode })
                        .eq('id', orgId);
                }
            } else {
                // Create organization with full address details
                const { data: newOrg, error: createError } = await supabaseClient
                    .from('organizations')
                    .insert([{
                        name: orgData.name,
                        org_code: orgData.orgCode,
                        country: orgData.country,
                        phone: orgData.phone,
                        address: `${orgData.addressLine1}${orgData.addressLine2 ? ', ' + orgData.addressLine2 : ''}`,
                        address_line1: orgData.addressLine1,
                        address_line2: orgData.addressLine2 || null,
                        city: orgData.city,
                        state: orgData.state,
                        status: 'active',
                        created_at: new Date().toISOString()
                    }])
                    .select()
                    .single();

                if (createError) throw createError;
                orgId = newOrg.id;
                log(`✓ Organization created (ID: ${orgId})`, 'success');
            }
        }

        async function migrateUsers() {
            log('<i class="fa-solid fa-file-lines" aria-hidden="true"></i> Step 2: Migrating users...', 'info');
            updateProgress(20, 'Migrating users...');
            
            const users = backupData.users || [];
            let migratedCount = 0;
            let skippedCount = 0;

            for (const user of users) {
                // Skip platform admin
                if (user.username === 'admin' && !user.org) {
                    skippedCount++;
                    continue;
                }

                // Check if user already exists
                const { data: existing } = await supabaseClient
                    .from('users')
                    .select('id')
                    .eq('username', user.username)
                    .eq('organization_id', orgId);

                if (existing && existing.length > 0) {
                    skippedCount++;
                    continue;
                }

                // Normalize role - convert "admin" to "Admin" or appropriate role
                let role = user.role || 'Staff';
                
                // Map common role variations to valid Supabase roles
                const roleMap = {
                    'admin': 'Admin',
                    'doctor': 'Doctor',
                    'nurse': 'Nurse',
                    'staff': 'Staff',
                    'reception': 'Reception',
                    'receptionist': 'Reception'
                };
                
                // Normalize to lowercase, then map, or keep original if not in map
                const normalizedRole = roleMap[role.toLowerCase()] || role;

                // Prepare user data
                const userData = {
                    username: user.username,
                    role: normalizedRole,
                    first_name: user.firstName,
                    last_name: user.lastName,
                    gender: user.gender,
                    organization_id: orgId,
                    created_at: new Date().toISOString()
                };

                // Add optional fields only if they have values
                if (user.orgPhone) userData.phone = user.orgPhone;
                if (user.license || user.medicalLicenseNumber) {
                    userData.medical_license_number = user.license || user.medicalLicenseNumber;
                }

                // Insert user
                const { error } = await supabaseClient
                    .from('users')
                    .insert([userData]);

                if (error) {
                    log(`âš  Error migrating user ${user.username}: ${error.message}`, 'warning');
                } else {
                    migratedCount++;
                }
            }

            log(`✓ Users: ${migratedCount} migrated, ${skippedCount} skipped`, 'success');
        }

        async function migratePatients() {
            log('<i class="fa-solid fa-file-lines" aria-hidden="true"></i> Step 3: Migrating patients...', 'info');
            updateProgress(40, 'Migrating patients...');
            
            const patients = backupData.organizationData?.['Mecure Clinics']?.patients || [];
            let migratedCount = 0;
            let skippedCount = 0;
            let errorCount = 0;

            for (let i = 0; i < patients.length; i++) {
                const patient = patients[i];
                
                // Check if patient already exists
                const { data: existing } = await supabaseClient
                    .from('patients')
                    .select('id')
                    .eq('patient_id', patient.id)
                    .eq('organization_id', orgId);

                if (existing && existing.length > 0) {
                    skippedCount++;
                    continue;
                }

                // Prepare patient data with full details including addresses
                const patientData = {
                    patient_id: patient.id,
                    organization_id: orgId,
                    first_name: patient.firstName,
                    middle_name: patient.middleName || null,
                    last_name: patient.lastName,
                    date_of_birth: patient.dob || null,
                    gender: patient.gender,
                    marital_status: patient.maritalStatus || null,
                    phone: patient.phone,
                    email: patient.email || null,
                    address: patient.addressLine1 || null,
                    city: patient.city || null,
                    state: patient.state || null,
                    country: patient.country || null,
                    blood_group: patient.bloodGroup || null,
                    allergies: patient.allergies ? JSON.stringify(patient.allergies) : null,
                    chronic_conditions: patient.conditions ? JSON.stringify(patient.conditions) : null,
                    emergency_contact_name: `${patient.emergencyFirstName || ''} ${patient.emergencyLastName || ''}`.trim() || null,
                    emergency_contact_phone: patient.emergencyPhone || null,
                    emergency_contact_relationship: patient.emergencyRelationship || null,
                    created_at: patient.createdDate || new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };

                // Insert patient
                const { error } = await supabaseClient
                    .from('patients')
                    .insert([patientData]);

                if (error) {
                    log(`âš  Error migrating patient ${patient.id}: ${error.message}`, 'warning');
                    errorCount++;
                } else {
                    migratedCount++;
                }

                // Update progress
                const progress = 40 + Math.floor((i / patients.length) * 30);
                updateProgress(progress, `Migrating patients... ${i + 1}/${patients.length}`);
            }

            log(`✓ Patients: ${migratedCount} migrated, ${skippedCount} skipped, ${errorCount} errors`, 'success');
        }

        async function migrateAppointments() {
            log('<i class="fa-solid fa-file-lines" aria-hidden="true"></i> Step 4: Migrating appointments...', 'info');
            updateProgress(70, 'Migrating appointments...');
            
            const appointments = backupData.organizationData?.['Mecure Clinics']?.appointments || [];
            let migratedCount = 0;
            let skippedCount = 0;
            let errorCount = 0;

            // Remove duplicates based on appointment ID
            const uniqueAppointments = [];
            const seenIds = new Set();
            
            for (const appt of appointments) {
                if (!seenIds.has(appt.id)) {
                    seenIds.add(appt.id);
                    uniqueAppointments.push(appt);
                }
            }

            if (appointments.length !== uniqueAppointments.length) {
                log(`âš  Removed ${appointments.length - uniqueAppointments.length} duplicate appointments`, 'warning');
            }

            for (let i = 0; i < uniqueAppointments.length; i++) {
                const appt = uniqueAppointments[i];
                
                // Check if appointment already exists
                const { data: existing } = await supabaseClient
                    .from('appointments')
                    .select('id')
                    .eq('appointment_id', appt.id)
                    .eq('organization_id', orgId);

                if (existing && existing.length > 0) {
                    skippedCount++;
                    continue;
                }

                // Normalize status
                let status = appt.status || 'scheduled';
                const validStatuses = ['scheduled', 'confirmed', 'completed', 'cancelled', 'no-show'];
                if (!validStatuses.includes(status.toLowerCase())) {
                    status = 'scheduled';
                }

                // Validate patient_id - must be UUID or null
                let patient_id_value = null;
                if (appt.patientId) {
                    // Check if it's a valid UUID format
                    const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
                    if (uuidRegex.test(appt.patientId)) {
                        patient_id_value = appt.patientId;
                    }
                }

                // Prepare appointment data
                const appointmentData = {
                    appointment_id: appt.id,
                    organization_id: orgId,
                    patient_id: patient_id_value,
                    patient_name: appt.patientName,
                    doctor_name: appt.doctorName || null,
                    appointment_date: appt.date,
                    appointment_time: appt.time || null,
                    duration: appt.duration || 30,
                    reason: appt.reason || null,
                    notes: appt.notes || null,
                    status: status,
                    created_at: appt.createdDate || new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };

                // Insert appointment
                const { error } = await supabaseClient
                    .from('appointments')
                    .insert([appointmentData]);

                if (error) {
                    log(`âš  Error migrating appointment ${appt.id}: ${error.message}`, 'warning');
                    errorCount++;
                } else {
                    migratedCount++;
                }

                // Update progress
                const progress = 70 + Math.floor((i / uniqueAppointments.length) * 25);
                updateProgress(progress, `Migrating appointments... ${i + 1}/${uniqueAppointments.length}`);
            }

            log(`✓ Appointments: ${migratedCount} migrated, ${skippedCount} skipped, ${errorCount} errors`, 'success');
        }

</html>
