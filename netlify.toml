headersOrigin = "config"
redirectsOrigin = "config"
plugins = []

[functions]

[functions."*"]

[functions."appointment-reminders-daily"]
  timeout = 26

[functions."interop-gateway"]
  timeout = 26

[build]
# Fail deploy if user-facing HTML still has ? / ?? icon placeholders (UTF-8 / copy-paste guard).
command = "node scripts/inject-supabase-env.cjs && npm run check"
publish = "."
publishOrigin = "config"

  [build.environment]
    # Documentation-only paths omitted from secret scan (must not contain live keys)
    SECRETS_SCAN_OMIT_PATHS = "Correct deployment pipeline.txt"

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]

[[headers]]
for = "/*"

  [headers.values]
  X-Frame-Options = "DENY"
  X-XSS-Protection = "1; mode=block"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
  Cross-Origin-Opener-Policy = "same-origin"
  Cross-Origin-Resource-Policy = "same-origin"
  # CSP including report-uri for violation reporting (handled by csp-report Netlify function)
  # CSP: removed 'unsafe-eval' to reduce XSS risk (dev test). If scripts break, revert.
  Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://js.paystack.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://api.paystack.co; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://paystack.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; frame-src 'self' https://checkout.paystack.com https://js.paystack.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://*.supabase.co https://api.paystack.co; object-src 'none'; upgrade-insecure-requests; block-all-mixed-content; report-uri /.netlify/functions/csp-report"

[[headers]]
for = "/*.js"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.html"

  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/.well-known/security.txt"

  [headers.values]
  Content-Type = "text/plain; charset=utf-8"
  Cache-Control = "public, max-age=86400"

# Canonical production hostname: redirect www Netlify alias to apex (TLS + scanner alignment).
[[redirects]]
from = "https://www.mediforge.netlify.app/*"
to = "https://mediforge.netlify.app/:splat"
status = 301
force = true

[[redirects]]
from = "/*.html"
to = "/:splat"
status = 301
force = true

  [redirects.query]

  [redirects.conditions]
  path = [
    "!/*.js",
    "!/*.css",
    "!/*.json",
    "!/*.svg",
    "!/*.png",
    "!/*.jpg",
    "!/*.jpeg",
    "!/*.gif",
    "!/*.ico",
    "!/*.woff",
    "!/*.woff2",
    "!/*.map"
  ]

  [redirects.headers]

