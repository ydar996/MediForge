<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#008751">
  <title>Change Password - Patient Portal</title>
  <link rel="stylesheet" href="css/styles.css">
  
  <style>
    :root {
      --nigerian-green: #008751;
      --nigerian-green-dark: #006B3F;
      --nigerian-white: #FFFFFF;
      --nigerian-gold: #FFD700;
      --warm-beige: #F5F5DC;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--nigerian-green) 0%, var(--nigerian-green-dark) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .password-container {
      background: var(--nigerian-white);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 450px;
    }
    
    .password-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--nigerian-green) 33%, var(--nigerian-white) 33%, var(--nigerian-white) 66%, var(--nigerian-gold) 66%);
    }
    
    h1 {
      color: var(--nigerian-green);
      text-align: center;
      margin-bottom: 10px;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }
    
    .info-box {
      background: var(--warm-beige);
      border-left: 4px solid var(--nigerian-green);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e1e5e9;
      border-radius: 10px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--nigerian-green);
      box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1);
    }
    
    .change-button {
      width: 100%;
      background: linear-gradient(135deg, var(--nigerian-green) 0%, var(--nigerian-green-dark) 100%);
      color: var(--nigerian-white);
      border: none;
      padding: 16px;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 135, 81, 0.3);
    }
    
    .change-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 135, 81, 0.4);
    }
    
    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .success-message {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    
    .success-message.show {
      display: block;
    }
  </style>
  <script src="js/ui-title-case.js?v=20260616120000" defer></script>
</head>
<body>
  <div class="password-container">
    <h1>&#128274; Change Password</h1>
    <p class="subtitle">Create a new secure password</p>
    
    <div class="info-box" id="firstLoginInfo">
      <strong>First Time Login:</strong> Please create a new password to secure your account.
    </div>
    
    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>
    
    <form id="changePasswordForm">
      <div class="form-group" id="currentPasswordGroup" style="display: none;">
        <label for="currentPassword">Current Password</label>
        <input type="password" id="currentPassword" name="currentPassword" placeholder="Enter current password">
      </div>
      
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password (min. 8 characters)" required minlength="8">
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirm New Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required minlength="8">
      </div>
      
      <button type="submit" class="change-button" id="changeButton">
        Change Password
      </button>
    </form>
  </div>

  <script src="js/vendor/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/patient-auth.js"></script>
  
  <script>
    // Check if first login
    const urlParams = new URLSearchParams(window.location.search);
    const isFirstLogin = urlParams.get('firstLogin') === 'true';
    
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const isPasswordResetRequired = user.passwordResetRequired || isFirstLogin;
    
    if (isPasswordResetRequired) {
      document.getElementById('currentPasswordGroup').style.display = 'none';
      document.getElementById('firstLoginInfo').style.display = 'block';
    } else {
      document.getElementById('currentPasswordGroup').style.display = 'block';
      document.getElementById('firstLoginInfo').style.display = 'none';
    }
    
    document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMessage = document.getElementById('errorMessage');
      const successMessage = document.getElementById('successMessage');
      const changeButton = document.getElementById('changeButton');
      
      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');
      changeButton.disabled = true;
      
      try {
        const result = await window.patientChangePassword(
          isPasswordResetRequired ? '' : currentPassword,
          newPassword,
          confirmPassword
        );
        
        if (result.success) {
          successMessage.textContent = 'Password changed successfully! Redirecting...';
          successMessage.classList.add('show');
          
          setTimeout(() => {
            window.location.href = '/patient-dashboard';
          }, 1500);
        } else {
          throw new Error(result.error || 'Failed to change password');
        }
      } catch (error) {
        errorMessage.textContent = error.message || 'Failed to change password';
        errorMessage.classList.add('show');
        changeButton.disabled = false;
      }
    });
  </script>

  <script src="js/logout-button.js"></script>
  <script src="js/session-timeout.js"></script>  <!-- Auto-logout after 30 minutes of inactivity -->
</body>
</html>
