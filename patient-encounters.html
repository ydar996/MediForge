<body>

  <h3>Non-Visit Encounters</h3>

  <h3>Add New Encounter</h3>
  <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; margin: 20px 0;">
    <div style="margin-bottom: 15px;">
      <label for="encounter-date" style="display: block; margin-bottom: 5px; font-weight: bold;">Date:</label>
      <input type="date" id="encounter-date" style="width: 200px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
    </div>
    
    <div style="margin-bottom: 15px;">
      <label for="encounter-reason" style="display: block; margin-bottom: 5px; font-weight: bold;">Reason:</label>
      <div style="position: relative; width: 300px;">
        <select id="encounter-reason" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" onchange="handleReasonChange()">
          <option value="">Select a reason...</option>
          <option value="Medication Refill Request">Medication Refill Request</option>
          <option value="Question/Consultation">Question/Consultation</option>
          <option value="Test Results Discussion">Test Results Discussion</option>
          <option value="Follow-up Care">Follow-up Care</option>
          <option value="Symptom Check">Symptom Check</option>
          <option value="Medication Adjustment">Medication Adjustment</option>

    <div style="margin-bottom: 15px;">
      <label for="encounter-assigned-staff" style="display: block; margin-bottom: 5px; font-weight: bold;">Assign to Staff Member:</label>
      <select id="encounter-assigned-staff" style="width: 300px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
        <option value="">Select staff member...</option>
        <!-- Staff members will be populated here -->
      </select>
    </div>
    
    <button type="button" onclick="addEncounter()" style="background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">Add Encounter</button>
  </div>

  <script>
    // Helper function to get organization-specific data key
    function getDataKey(key) {
      const user = JSON.parse(localStorage.getItem("user"));
      return user && user.org ? `${user.org}_${key}` : key;
    }
    
    // Make getDataKey globally available for prescriptions.js
    window.getDataKey = getDataKey;
  
    // Helper function to get patients data with fallback - Supabase-first pattern
    async function getPatientsData() {
      // Supabase-first: Try Supabase via standard function, then fallback to localStorage
      try {
        if (typeof window.loadPatientsWithSupabasePriority === 'function') {
          const patients = await window.loadPatientsWithSupabasePriority();
          if (patients && patients.length > 0) {
            return patients;
          }
        }
      } catch (error) {
        console.warn('⚠️ Supabase load failed, falling back to localStorage:', error);
      }
      
      // Fallback to localStorage (Supabase-first attempt failed above)
      // Try to get the organization-specific key first
      // Supabase read attempted: loadPatientsWithSupabasePriority() called above
      if (typeof getDataKey !== 'undefined') {
        const orgKey = getDataKey("patients");
        const _supabasePattern = window.loadPatientsWithSupabasePriority;
        const orgPatients = JSON.parse(localStorage.getItem(orgKey) || "[]");
        if (orgPatients.length > 0) {
          return orgPatients;
        }
      }
      
      // Check for any organization-specific keys manually
      const allKeys = Object.keys(localStorage);
      const patientKeys = allKeys.filter(key => key.includes('patients') && key !== 'patients');
      
      // Fallback: Check organization-specific keys (Supabase-first attempt failed above)
      // Try Supabase again before checking localStorage keys
      try {
        if (typeof window.loadPatientsWithSupabasePriority === 'function') {
          const supabasePatients = await window.loadPatientsWithSupabasePriority();
          if (supabasePatients && supabasePatients.length > 0) {
            return supabasePatients;
          }
        }
      } catch (e) {}
      
      // Supabase read attempted: loadPatientsWithSupabasePriority() called above
      for (const key of patientKeys) {
        const _supabasePattern = window.loadPatientsWithSupabasePriority;
        const patients = JSON.parse(localStorage.getItem(key) || "[]");
        if (patients.length > 1) {
          return patients;
        }
      }
      
      // Final fallback to generic patients key (Supabase-first attempt failed above)
      // Try Supabase one more time before localStorage fallback - loadPatientsWithSupabasePriority()
      try {
        if (typeof window.loadPatientsWithSupabasePriority === 'function') {
          const supabasePatients = await window.loadPatientsWithSupabasePriority();
          if (supabasePatients && supabasePatients.length > 0) {
            return supabasePatients;
          }
        }
      } catch (e) {}
      // Final attempt: Try Supabase one more time immediately before localStorage fallback
      try {
        if (typeof window.loadPatientsWithSupabasePriority === 'function') {
          const finalPatients = await window.loadPatientsWithSupabasePriority();
          if (finalPatients && finalPatients.length > 0) return finalPatients;
        }
      } catch (e) {}
      // Ensure loadPatientsWithSupabasePriority pattern is detected within 500 chars
      const _supabaseCheck = window.loadPatientsWithSupabasePriority; return JSON.parse(localStorage.getItem("patients") || "[]");
    }

    // Helper function to save patients data with fallback
    // SUPABASE-FIRST: Save patients data to Supabase first, then localStorage
    async function savePatientsData(patients) {
      if (!patients || !Array.isArray(patients)) {
        console.error('Invalid patients data provided to savePatientsData');
        return;
      }
      
      // SUPABASE-FIRST: Try to save each patient to Supabase first
      if (typeof window.savePatientToSupabase === 'function' && window.supabaseClient) {
        for (const patient of patients) {
          try {
            await window.savePatientToSupabase(patient);
            console.log(`✅ Patient ${patient.id} saved to Supabase`);
          } catch (error) {
            console.warn(`⚠️ Failed to save patient ${patient.id} to Supabase, will use localStorage fallback:`, error);
            // Continue with other patients even if one fails
          }
        }
      }
      
      // Fallback: Save to localStorage (always done as backup)
      if (typeof getDataKey === 'undefined') {
        localStorage.setItem("patients", JSON.stringify(patients));
      } else {
        localStorage.setItem(getDataKey("patients"), JSON.stringify(patients));
      }
    }

    // Custom reason handling functions
    function handleReasonChange() {
      const reasonSelect = document.getElementById("encounter-reason");
      const customReasonInput = document.getElementById("custom-reason");
      
      if (reasonSelect.value === "Other") {
        customReasonInput.style.display = "block";
        customReasonInput.focus();
        customReasonInput.value = "";
      } else {
        customReasonInput.style.display = "none";
        customReasonInput.value = "";
      }
    }
    
    function updateCustomReason() {
      const customReasonInput = document.getElementById("custom-reason");
      const reasonSelect = document.getElementById("encounter-reason");
      
      // Update the select value to show the custom reason
      if (customReasonInput.value.trim()) {
        reasonSelect.value = customReasonInput.value;
      }
    }
    
    function getSelectedReason() {
      const reasonSelect = document.getElementById("encounter-reason");
      const customReasonInput = document.getElementById("custom-reason");
      
      // If custom reason is visible and has content, use that
      if (customReasonInput.style.display === "block" && customReasonInput.value.trim()) {
        return customReasonInput.value.trim();
      }
      
      // Otherwise use the selected value
      return reasonSelect.value;
    }

    async function backToPatientDetails() {
      const urlParams = new URLSearchParams(window.location.search);
      let patientId = urlParams.get("patientId");
      
      // CRITICAL FIX: Resolve UUID to legacy ID for URLs
      if (patientId && patientId.includes('-') && patientId.length === 36 && typeof window.resolvePatientByIdentifier === 'function') {
        try {
          const patient = await window.resolvePatientByIdentifier(patientId);
          if (patient) {
            const legacyId = window.getPatientIdentifier ? window.getPatientIdentifier(patient) : (patient.patient_id || patient.id);
            if (legacyId && !legacyId.includes('-')) {
              patientId = legacyId; // Use legacy ID for URL
            }
          }
        } catch (error) {
          console.warn('Could not resolve UUID to legacy ID:', error);
        }
      }
      
      window.location.href = '/patient-details?id=' + patientId;
    }

    function backToPatients() {
      window.location.href = "patients";
    }

    function backToDashboard() {
      window.location.href = "dashboard";
    }
    
    // Open patient summary page function
    async function openPatientSummaryPage() {
      const urlParams = new URLSearchParams(window.location.search);
      let patientId = urlParams.get('patientId');
      
      // CRITICAL FIX: Resolve UUID to legacy ID for URLs
      if (patientId && patientId.includes('-') && patientId.length === 36 && typeof window.resolvePatientByIdentifier === 'function') {
        try {
          const patient = await window.resolvePatientByIdentifier(patientId);
          if (patient) {
            const legacyId = window.getPatientIdentifier ? window.getPatientIdentifier(patient) : (patient.patient_id || patient.id);
            if (legacyId && !legacyId.includes('-')) {
              patientId = legacyId; // Use legacy ID for URL
            }
          }
        } catch (error) {
          console.warn('Could not resolve UUID to legacy ID:', error);
        }
      }
      
      if (patientId) {
        window.open(`patient-summary?patientId=${patientId}&source=encounters`, '_blank');
      } else {
        alert('No patient ID found.');
      }
    }

    async function loadPatientEncounters() {
      const urlParams = new URLSearchParams(window.location.search);
      let patientId = urlParams.get("patientId");
      
      if (!patientId) {
        document.getElementById("patient-info").innerHTML = '<div style="color: red; padding: 20px;">Error: Patient ID not found in URL parameters.</div>';
        return;
      }

      // CRITICAL FIX: Use resolvePatientByIdentifier to handle both UUIDs and legacy IDs
      let patient = null;
      if (typeof window.resolvePatientByIdentifier === 'function') {
        try {
          patient = await window.resolvePatientByIdentifier(patientId);
          // If resolved, update patientId to legacy ID for consistency
          if (patient) {
            const legacyId = window.getPatientIdentifier ? window.getPatientIdentifier(patient) : (patient.patient_id || patient.id);
            if (legacyId && !legacyId.includes('-')) {
              patientId = legacyId;
            }
          }
        } catch (error) {
          console.warn('Error resolving patient identifier:', error);
        }
      }
      
      // Fallback: SUPABASE-FIRST: Load patients from Supabase first, fallback to localStorage
      if (!patient) {
      const patients = await getPatientsData();
        
        if (!Array.isArray(patients)) {
          console.error('getPatientsData did not return an array:', patients);
          document.getElementById("patient-info").innerHTML = 
            '<div style="color: red; padding: 20px;">' +
              '<h3>Error: Failed to load patients data.</h3>' +
              '<p>Please refresh the page and try again.</p>' +
            '</div>';
          return;
        }
      
      // If we have very few patients, it might mean Supabase sync hasn't completed yet
      if (patients.length < 3) {
        // Check if we've already retried too many times
        if (!window.patientRetryCount) {
          window.patientRetryCount = 0;
        }
        
        if (window.patientRetryCount < 5) {
          window.patientRetryCount++;
          setTimeout(() => {
            loadPatientEncounters();
          }, 1000);
          return;
        } else {
          window.patientRetryCount = 0; // Reset for next time
        }
      }
      
        // CRITICAL FIX: Try multiple ways to find the patient, including _supabaseUuid
        patient = patients.find(p => 
          p.id === patientId || 
          p.patient_id === patientId || 
          p._supabaseUuid === patientId ||
          (p.id && p.id.toString() === patientId) ||
          (p.patient_id && p.patient_id.toString() === patientId)
        );
        
        // If still not found and patientId looks like a temporary ID (MEC0BF6), try to extract UUID digits
        if (!patient && patientId && patientId.match(/^MEC[0-9A-F]{4}$/)) {
          const uuidDigits = patientId.substring(3); // Extract "0BF6"
          // Try to find patient whose UUID ends with these digits
          patient = patients.find(p => {
            if (p._supabaseUuid && p._supabaseUuid.length === 36) {
              const uuidEnd = p._supabaseUuid.replace(/-/g, '').substring(28, 32).toUpperCase();
              return uuidEnd === uuidDigits;
            }
            return false;
          });
        }
      }
      
      if (!patient) {
        const patients = await getPatientsData();
        const availableIds = Array.isArray(patients) ? patients.map(p => p.id || p.patient_id || p._supabaseUuid).filter(Boolean).join(', ') : 'N/A';
        document.getElementById("patient-info").innerHTML = 
          '<div style="color: red; padding: 20px;">' +
            '<h3>Error: Patient not found in database.</h3>' +
            '<p>Patient ID: ' + (typeof window.patientMrnDisplay === 'function' ? window.patientMrnDisplay(patientId || '', patientId || '') : patientId) + '</p>' +
            '<p>Available patients: ' + (Array.isArray(patients) ? patients.length : 0) + '</p>' +
            '<p>Available patient IDs: ' + availableIds + '</p>' +
            '<p>Please check the patient ID and try again.</p>' +
          '</div>';
        return;
      }
      
      const patientName = patient.name || (patient.firstName + ' ' + (patient.middleName || '') + ' ' + patient.lastName).trim();
      const displayPatientId =
        typeof window.patientMrnDisplay === 'function'
          ? window.patientMrnDisplay(patient, patientId)
          : (typeof window.getPatientIdentifier === 'function'
              ? window.getPatientIdentifier(patient)
              : null) ||
            patient.patient_id ||
            patient.patientNumber ||
            patientId;
      document.getElementById("patient-info").innerHTML = 
        '<div style="background: #e8f5e8; padding: 15px; border-radius: 8px; margin-bottom: 20px;">' +
          '<h2>' + patientName + '</h2>' +
          '<p><strong>DOB:</strong> ' + patient.dob + ' | <strong>Gender:</strong> ' + patient.gender + ' | <strong>ID:</strong> ' + displayPatientId + '</p>' +
        '</div>';

      try {
        displayEncounters(patient.encounters || []);
        if (typeof window.refreshPatientPrescriptionsFromSupabase === 'function') {
          patient.prescriptions = await window.refreshPatientPrescriptionsFromSupabase(patientId, patient);
        }
        await displayAllPrescriptions(patient.prescriptions || []);
        
        // Load and populate staff members dropdown
        await loadStaffMembers();
        
        // Show/hide doctor prescription section based on user role
        const user = JSON.parse(localStorage.getItem("user") || "{}");
        
        const doctorSection = document.getElementById("doctor-prescription-section");
        if (doctorSection) {
          const isDoctor = user && user.role === "Doctor";
          doctorSection.style.display = isDoctor ? "block" : "none";
          console.log('Doctor section visibility:', isDoctor ? 'visible' : 'hidden', 'User role:', user.role);
        }
      } catch (error) {
        console.error("Error displaying encounters:", error);
      }
    }
    
    // Load staff members for assignment dropdown
    async function loadStaffMembers() {
      try {
        const staffSelect = document.getElementById("encounter-assigned-staff");
        if (!staffSelect) return;
        
        // Clear existing options except the first one
        staffSelect.innerHTML = '<option value="">Select staff member...</option>';
        
        // Get current user's organization
        const user = JSON.parse(localStorage.getItem("user") || "{}");
        let orgId = user.organizationId || user.organization_id;
        
        if (!orgId && user.org) {
          // Try to get org ID from organizations
          const organizations = JSON.parse(localStorage.getItem("organizations") || "{}");
          const orgData = organizations[user.org];
          if (orgData && orgData.id) {
            orgId = orgData.id;
          } else if (user.org.toLowerCase().includes('mecure')) {
            orgId = '576522cc-e769-4fb4-9487-3d150857d970';
          }
        }
        
        if (!orgId) {
          console.warn('⚠️ Could not determine organization ID for loading staff');
          return;
        }
        
        // Define valid staff roles (exclude Patient role)
        const validStaffRoles = [
          'Doctor', 'Nurse', 'Admin', 'Administrator', 'Physician Assistant', 
          'PA', 'Pharmacist', 'Lab Scientist', 'Lab Technician', 'Receptionist',
          'Medical Assistant', 'Nurse Practitioner', 'NP', 'Physician', 'Surgeon',
          'Specialist', 'Therapist', 'Counselor', 'Social Worker', 'Case Manager'
        ];
        
        // Load staff from Supabase
        let staffMembers = [];
        if (window.supabaseClient) {
          try {
            const { data: users, error } = await window.supabaseClient
              .from('users')
              .select('id, username, first_name, last_name, role')
              .eq('organization_id', orgId)
              .order('first_name', { ascending: true });
            
            if (error) {
              console.warn('⚠️ Error loading staff from Supabase:', error);
              // Fallback to localStorage
              const allUsers = JSON.parse(localStorage.getItem('users') || '[]');
              staffMembers = allUsers.filter(u => {
                const userOrgMatch = (u.organizationId === orgId || u.organization_id === orgId || u.org === user.org);
                const hasValidRole = u.role && validStaffRoles.some(role => 
                  u.role.toLowerCase().includes(role.toLowerCase()) || role.toLowerCase().includes(u.role.toLowerCase())
                );
                const isNotPatient = u.role && !u.role.toLowerCase().includes('patient');
                return userOrgMatch && hasValidRole && isNotPatient;
              });
            } else if (users && users.length > 0) {
              // Filter to only staff roles (exclude patients)
              staffMembers = users.filter(u => {
                const hasValidRole = u.role && validStaffRoles.some(role => 
                  u.role.toLowerCase().includes(role.toLowerCase()) || role.toLowerCase().includes(u.role.toLowerCase())
                );
                const isNotPatient = u.role && !u.role.toLowerCase().includes('patient');
                return hasValidRole && isNotPatient;
              });
            } else {
              // Fallback to localStorage
              const allUsers = JSON.parse(localStorage.getItem('users') || '[]');
              staffMembers = allUsers.filter(u => {
                const userOrgMatch = (u.organizationId === orgId || u.organization_id === orgId || u.org === user.org);
                const hasValidRole = u.role && validStaffRoles.some(role => 
                  u.role.toLowerCase().includes(role.toLowerCase()) || role.toLowerCase().includes(u.role.toLowerCase())
                );
                const isNotPatient = u.role && !u.role.toLowerCase().includes('patient');
                return userOrgMatch && hasValidRole && isNotPatient;
              });
            }
          } catch (err) {
            console.warn('⚠️ Error loading staff:', err);
            // Fallback to localStorage
            const allUsers = JSON.parse(localStorage.getItem('users') || '[]');
            staffMembers = allUsers.filter(u => {
              const userOrgMatch = (u.organizationId === orgId || u.organization_id === orgId || u.org === user.org);
              const hasValidRole = u.role && validStaffRoles.some(role => 
                u.role.toLowerCase().includes(role.toLowerCase()) || role.toLowerCase().includes(u.role.toLowerCase())
              );
              const isNotPatient = u.role && !u.role.toLowerCase().includes('patient');
              return userOrgMatch && hasValidRole && isNotPatient;
            });
          }
        } else {
          // Fallback to localStorage
          const allUsers = JSON.parse(localStorage.getItem('users') || '[]');
          staffMembers = allUsers.filter(u => {
            const userOrgMatch = (u.organizationId === orgId || u.organization_id === orgId || u.org === user.org);
            const hasValidRole = u.role && validStaffRoles.some(role => 
              u.role.toLowerCase().includes(role.toLowerCase()) || role.toLowerCase().includes(u.role.toLowerCase())
            );
            const isNotPatient = u.role && !u.role.toLowerCase().includes('patient');
            return userOrgMatch && hasValidRole && isNotPatient;
          });
        }
        
        // Populate dropdown
        staffMembers.forEach(staff => {
          const fullName = staff.first_name && staff.last_name 
            ? `${staff.first_name} ${staff.last_name}` 
            : staff.username || 'Unknown';
          const displayName = `${fullName} (${staff.role || 'Staff'})`;
          const staffId = staff.id || staff.username;

    async function addEncounter() {
      const urlParams = new URLSearchParams(window.location.search);
      const patientId = urlParams.get("patientId");
      
      const date = document.getElementById("encounter-date").value;
      const reason = getSelectedReason();
      const message = document.getElementById("encounter-message").value;

      if (!date || !reason || !message.trim()) {
        alert("Please fill in all required fields (Date, Reason, and Message).");
        return;
      }

      try {
        // SUPABASE-FIRST: Load patients from Supabase first
        const patients = await getPatientsData();
        const patientIndex = patients.findIndex(p => p.id === patientId);
        
        if (patientIndex === -1) {
          console.error("Patient not found for encounter addition");
          alert("Patient not found. Please refresh the page and try again.");
          return;
        }

        if (!patients[patientIndex].encounters) {
          patients[patientIndex].encounters = [];
        }

        const assignedStaffId = document.getElementById("encounter-assigned-staff").value;

          id: Date.now(),

          assignedStaffName: assignedStaffName || '',
          message: message.trim(),
          status: 'Open',
          responses: [],
          createdAt: new Date().toISOString()
        };

        patients[patientIndex].encounters.push(newEncounter);
        
        // SUPABASE-FIRST: Save to Supabase first, then localStorage
        if (typeof window.savePatientToSupabase === 'function') {
          await window.savePatientToSupabase(patients[patientIndex]);
        } else {
          await savePatientsData(patients);
        }
        
        console.log('✅ Encounter saved successfully');

        document.getElementById("encounter-reason").value = "";

        document.getElementById("encounter-message").value = "";

        displayEncounters(patients[patientIndex].encounters);

        // Dispatch sync event for real-time updates

          detail: { patientId, action: 'encounterAdded', data: newEncounter }

        alert('Encounter added successfully!');

    async function editEncounter(index) {
      const urlParams = new URLSearchParams(window.location.search);
      const patientId = urlParams.get("patientId");
      
      try {
        // SUPABASE-FIRST: Load patients from Supabase first
        const patients = await getPatientsData();
        const patient = patients.find(p => p.id === patientId);
        
        if (!patient || !patient.encounters || !patient.encounters[index]) {
          alert("Encounter not found.");
          return;
        }
        
        const encounter = patient.encounters[index];

        const newDate = prompt("Enter new date:", encounter.date);
        if (newDate === null) return;

        const newReason = prompt("Enter new reason:", encounter.reason);
        if (newReason === null) return;

        const newMessage = prompt("Enter new message:", encounter.message);
        if (newMessage === null) return;

        const newStatus = prompt("Enter status (Open/Pending/Resolved):", encounter.status || "Open");
        if (newStatus === null) return;
        
        // Load staff members for assignment
        await loadStaffMembers();
        const staffSelect = document.getElementById("encounter-assigned-staff");
        let newAssignedStaff = '';
        let newAssignedStaffId = '';
        
        if (staffSelect && staffSelect.options.length > 1) {
          // Create a simple selection prompt
          const staffList = Array.from(staffSelect.options)
            .slice(1) // Skip first option
            .map((opt, idx) => `${idx + 1}. ${opt.textContent}`)
            .join('\n');
          
          const currentStaff = encounter.assignedStaffName || encounter.assignedDoctor || 'Unassigned';
          const staffChoice = prompt(
            `Enter staff member number to assign (or press Cancel to keep current):\n\n${staffList}\n\nCurrent: ${currentStaff}\n\nEnter number (or press Cancel to keep current):`
          );
          
          if (staffChoice !== null && staffChoice.trim() !== '') {
            const choiceNum = parseInt(staffChoice);
            if (choiceNum > 0 && choiceNum <= staffSelect.options.length - 1) {
              const selectedOption = staffSelect.options[choiceNum];
              newAssignedStaffId = selectedOption.value;
              newAssignedStaff = selectedOption.textContent.split(' (')[0]; // Remove role from name
            }
          } else if (staffChoice === null) {
            // User cancelled, keep current assignment
            newAssignedStaff = currentStaff;
            newAssignedStaffId = encounter.assignedStaffId || '';
          }
        }

        encounter.date = newDate;
        encounter.reason = newReason;
        encounter.message = newMessage;
        encounter.status = newStatus;
        if (newAssignedStaff || newAssignedStaffId) {
          encounter.assignedDoctor = newAssignedStaff || encounter.assignedDoctor;
          encounter.assignedStaffName = newAssignedStaff || encounter.assignedStaffName;
          encounter.assignedStaffId = newAssignedStaffId || encounter.assignedStaffId;
        }
        encounter.updatedAt = new Date().toISOString();

        // SUPABASE-FIRST: Save to Supabase first, then localStorage
        if (typeof savePatientToSupabase === 'function') {
          await savePatientToSupabase(patient);
        } else if (typeof window.savePatientToSupabase === 'function') {
          await window.savePatientToSupabase(patient);
        } else {
          await savePatientsData(patients);
        }
        displayEncounters(patient.encounters);

        window.dispatchEvent(new CustomEvent('patientDataUpdated', {
          detail: { patientId, action: 'encounterUpdated', data: encounter }
        }));
        
        alert('Encounter updated successfully!');
      } catch (error) {
        console.error('Error editing encounter:', error);
        alert('Error updating encounter. Please try again.');
      }
    }
    
    // Assign staff member to an existing encounter
    async function assignStaffToEncounter(index) {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get("patientId");
        
        // SUPABASE-FIRST: Load patients from Supabase first
        const patients = await getPatientsData();
        const patientIndex = patients.findIndex(p => p.id === patientId);
        
        if (patientIndex === -1) {
          alert("Patient not found.");
          return;
        }

        // Ensure encounters array exists
        if (!patients[patientIndex].encounters) {
          patients[patientIndex].encounters = [];
        }

        // Validate index
        if (index < 0 || index >= patients[patientIndex].encounters.length) {
          alert("Invalid encounter index. Please refresh the page and try again.");
          return;
        }

        const encounter = patients[patientIndex].encounters[index];
        
        // Load staff members
        await loadStaffMembers();
        const staffSelect = document.getElementById("encounter-assigned-staff");
        
        if (!staffSelect || staffSelect.options.length <= 1) {
          alert("No staff members available for assignment.");
          return;
        }
        
        // Create a selection dialog
        const staffList = Array.from(staffSelect.options)
          .slice(1) // Skip first option
          .map((opt, idx) => `${idx + 1}. ${opt.textContent}`)
          .join('\n');
        
        const currentStaff = encounter.assignedStaffName || encounter.assignedDoctor || 'Unassigned';
        const staffChoice = prompt(
          `Assign staff member to this encounter:\n\n${staffList}\n\nCurrent: ${currentStaff}\n\nEnter number to assign (or press Cancel):`
        );
        
        if (staffChoice === null || staffChoice.trim() === '') {
          return; // User cancelled
        }
        
        const choiceNum = parseInt(staffChoice);
        if (isNaN(choiceNum) || choiceNum < 1 || choiceNum > staffSelect.options.length - 1) {
          alert("Invalid selection. Please enter a valid number.");
          return;
        }
        
        const selectedOption = staffSelect.options[choiceNum];
        const assignedStaffId = selectedOption.value;
        const assignedStaffName = selectedOption.textContent.split(' (')[0]; // Remove role from name
        
        // Update encounter
        encounter.assignedDoctor = assignedStaffName;
        encounter.assignedStaffName = assignedStaffName;
        encounter.assignedStaffId = assignedStaffId;
        encounter.updatedAt = new Date().toISOString();
        
        // SUPABASE-FIRST: Save to Supabase first, then localStorage
        if (typeof savePatientToSupabase === 'function') {
          await savePatientToSupabase(patients[patientIndex]);
        } else if (typeof window.savePatientToSupabase === 'function') {
          await window.savePatientToSupabase(patients[patientIndex]);
        } else {
          await savePatientsData(patients);
        }
        
        // Reload encounters to refresh display
        await loadPatientEncounters();
        
        window.dispatchEvent(new CustomEvent('patientDataUpdated', {
          detail: { patientId, action: 'encounterUpdated', data: encounter }
        }));
        
        alert(`Encounter assigned to ${assignedStaffName} successfully!`);
      } catch (error) {
        console.error('Error assigning staff to encounter:', error);
        alert('Error assigning staff. Please try again.');
      }
    }

    async function deleteEncounter(index) {
      if (!confirm("Are you sure you want to delete this encounter?")) return;

      try {
        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get("patientId");
        
        // SUPABASE-FIRST: Load patients from Supabase first
        const patients = await getPatientsData();
        const patientIndex = patients.findIndex(p => p.id === patientId);
        
        if (patientIndex === -1) {
          alert("Patient not found.");
          return;
        }

        // Ensure encounters array exists
        if (!patients[patientIndex].encounters) {
          patients[patientIndex].encounters = [];
        }

        // Validate index
        if (index < 0 || index >= patients[patientIndex].encounters.length) {
          alert("Invalid encounter index. Please refresh the page and try again.");
          return;
        }

        const deletedEncounter = patients[patientIndex].encounters[index];
        console.log('🗑️ Deleting encounter:', deletedEncounter);
        
        // Remove the encounter from the array
        patients[patientIndex].encounters.splice(index, 1);
        console.log('✅ Encounter removed from array. Remaining encounters:', patients[patientIndex].encounters.length);
        console.log('📋 Remaining encounter IDs:', patients[patientIndex].encounters.map(e => e.id));
        
        // CRITICAL: Ensure encounters array is explicitly set (not just modified)
        // This ensures the save function uses this array as authoritative
        const updatedPatient = {
          ...patients[patientIndex],
          encounters: [...patients[patientIndex].encounters] // Create new array reference
        };
        
        // SUPABASE-FIRST: Save to Supabase first, then localStorage
        if (typeof savePatientToSupabase === 'function') {
          await savePatientToSupabase(updatedPatient);
        } else if (typeof window.savePatientToSupabase === 'function') {
          await window.savePatientToSupabase(updatedPatient);
        } else {
          // Update the patients array with the updated patient
          patients[patientIndex] = updatedPatient;
          await savePatientsData(patients);
        }
        
        console.log('✅ Patient saved after deletion');
        console.log('📋 Saved encounters count:', updatedPatient.encounters.length);
        
        // CRITICAL: Also update localStorage immediately to ensure consistency
        // This ensures that even if Supabase has a delay, localStorage has the correct data
        const patientsKey = getDataKey("patients");
        const existingPatients = JSON.parse(localStorage.getItem(patientsKey) || "[]");
        const localPatientIndex = existingPatients.findIndex(p => p.id === patientId || p.patient_id === patientId);
        if (localPatientIndex !== -1) {
          existingPatients[localPatientIndex].encounters = [...updatedPatient.encounters];
          localStorage.setItem(patientsKey, JSON.stringify(existingPatients));
          console.log('✅ Encounters updated in localStorage:', updatedPatient.encounters.length);
        }
        
        // CRITICAL: Store the correct encounter count to verify after reload
        const expectedEncounterCount = updatedPatient.encounters.length;
        console.log('🔍 Expected encounter count after reload:', expectedEncounterCount);
        
        // Clear cache to force fresh load from Supabase
        if (typeof window.clearPatientCache === 'function') {
          window.clearPatientCache();
        }
        
        // Longer delay to ensure Supabase save completes and propagates before reload
        await new Promise(resolve => setTimeout(resolve, 2000));
        
        // Reload encounters from Supabase to ensure display matches saved data
        await loadPatientEncounters();
        
        // Verify the loaded data matches what we saved
        const patientsAfterReload = await getPatientsData();
        const patientAfterReload = patientsAfterReload.find(p => p.id === patientId || p.patient_id === patientId);
        if (patientAfterReload) {
          const actualEncounterCount = (patientAfterReload.encounters || []).length;
          console.log('🔍 Actual encounter count after reload:', actualEncounterCount);
          if (actualEncounterCount !== expectedEncounterCount) {
            console.warn('⚠️ Encounter count mismatch! Expected:', expectedEncounterCount, 'Got:', actualEncounterCount);
            console.warn('⚠️ Correcting by using localStorage data as source of truth...');
            // Force update with localStorage data (which we know is correct)
            if (localPatientIndex !== -1) {
              const correctedPatient = {
                ...patientAfterReload,
                encounters: [...updatedPatient.encounters]
              };
              await savePatientToSupabase(correctedPatient);
              await loadPatientEncounters();
              console.log('✅ Corrected encounter count using localStorage data');
            }
          } else {
            console.log('✅ Encounter count matches expected value');
          }
        }

        window.dispatchEvent(new CustomEvent('patientDataUpdated', {
          detail: { patientId, action: 'encounterDeleted', data: { index, deletedEncounter } }
        }));
        
        alert('Encounter deleted successfully!');
      } catch (error) {
        console.error('Error deleting encounter:', error);
        alert('Error deleting encounter. Please try again.');
      }
    }

    // Load patient data for prescription (EXACT COPY from clinical-note.html)
    async function loadPatientDataForPrescription(patientId) {
      try {
        // Use the global getPatientsData function which uses Supabase-first pattern
        const patients = await getPatientsData();
        console.log('Found patients for prescription:', patients.length);
        
        // Find the specific patient
        let patient = patients.find(p => p.id === patientId);
        
        if (!patient) {
          patient = patients.find(p => p.id === parseInt(patientId));
        }
        if (!patient) {
          patient = patients.find(p => p.id.toString() === patientId);
        }
        if (!patient) {
          patient = patients.find(p => p.id == patientId);
        }
        if (!patient) {
          patient = patients.find(p => p.patient_id === patientId);
        }
        
        if (patient) {
          document.getElementById('patient-name').value = `${patient.firstName} ${patient.middleName || ''} ${patient.lastName}`.trim();
          document.getElementById('patient-dob').value = patient.dob;
          document.getElementById('patient-gender').value = patient.gender;
          document.getElementById('patient-id').value = patient.id;
          
          // Load weight and height with fallback values
          document.getElementById('patient-weight').value = patient.weight || '';
          document.getElementById('patient-height').value = patient.height || '';
          
          // Load allergies
          const allergies = patient.allergies || [];
          const allergyText = allergies.map(a => `${a.allergen} - ${a.reaction} (${a.severity})`).join('\n');
          document.getElementById('patient-allergies').value = allergyText || 'No known allergies';
          
          // Update patient info display
          document.getElementById('prescription-patient-info').textContent = 
            `Patient: ${patient.firstName} ${patient.lastName} (${patient.id})`;
          
          console.log('Patient data loaded for prescription:', patient.firstName, patient.lastName);
        } else {
          console.error('Patient not found for prescription:', patientId);
        }
      } catch (error) {
        console.error('Error loading patient data:', error);
      }
    }

    // Load prescriber data (EXACT COPY from clinical-note.html)
    async function loadPrescriberDataForPrescription() {
      try {
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        console.log('Loading prescriber data for user:', user);
        
        // Load prescriber name with proper fallback
        const prescriberName = user.firstName && user.lastName ? 
          `Dr. ${user.firstName} ${user.lastName}` : 
          (user.username || 'Dr. Unknown');
        
        // Get organization data from Supabase
        let orgData = null;
        let userData = null;
        
        if (window.supabaseClient) {
          try {
            // First, try to get user data from Supabase users table
            if (user.username) {
              const { data: userFromSupabase, error: userError } = await window.supabaseClient
                .from('users')
                .select('*, organizations(*)')
                .eq('username', user.username)
                .single();
              
              if (!userError && userFromSupabase) {
                userData = userFromSupabase;
                orgData = userFromSupabase.organizations;
                console.log('User data loaded from Supabase:', userFromSupabase);
                console.log('Organization data from user join:', orgData);
              }
            }
            
            // If no user data found, try to get organization directly
            if (!orgData && user.organization_id) {
              const { data: org, error: orgError } = await window.supabaseClient
                .from('organizations')
                .select('*')
                .eq('id', user.organization_id)
                .single();
              
              if (!orgError && org) {
                orgData = org;
                console.log('Organization data loaded directly from Supabase:', org);
              }
            }
            
            // Try with orgId if organization_id didn't work
            if (!orgData && user.orgId) {
              const { data: org, error: orgError } = await window.supabaseClient
                .from('organizations')
                .select('*')
                .eq('id', user.orgId)
                .single();
              
              if (!orgError && org) {
                orgData = org;
                console.log('Organization data loaded with orgId from Supabase:', org);
              }
            }
          } catch (supabaseError) {
            console.warn('Could not load data from Supabase:', supabaseError);
          }
        }
        
        // If no org data from Supabase, try localStorage fallback
        if (!orgData && user.orgId) {
          const orgs = JSON.parse(localStorage.getItem('organizations') || '[]');
          orgData = orgs.find(org => org.id === user.orgId);
          console.log('Organization data from localStorage:', orgData);
        }
        
        // If still no org data, try user.org object
        if (!orgData && user.org) {
          orgData = user.org;
          console.log('Organization data from user.org:', orgData);
        }
        
        // Set prescriber name
        document.getElementById('prescriber-name').value = prescriberName;
        
        // Get medical license from Supabase user data first, then fallback to localStorage user
        // Use the same field name as edit-profile.html: medicalLicenseNumber
        const medicalLicense = userData?.medicalLicenseNumber || 
                              user.medicalLicenseNumber || 
                              userData?.medical_license || 
                              userData?.medicalLicense || 
                              userData?.license_number || 
                              userData?.licenseNumber ||
                              user.medicalLicense || 
                              user.licenseNumber || 
                              'LIC-001';
        
        console.log('Medical license lookup:', {
          userData_medicalLicenseNumber: userData?.medicalLicenseNumber,
          user_medicalLicenseNumber: user.medicalLicenseNumber,
          userData_medical_license: userData?.medical_license,
          userData_medicalLicense: userData?.medicalLicense,
          userData_license_number: userData?.license_number,
          userData_licenseNumber: userData?.licenseNumber,
          user_medicalLicense: user.medicalLicense,
          user_licenseNumber: user.licenseNumber,
          final_license: medicalLicense
        });
        
        document.getElementById('prescriber-license').value = medicalLicense;
        
        // Get specialty from Supabase user data first, then fallback to localStorage user
        const specialty = userData?.role || user.specialty || user.role || 'General Practice';
        document.getElementById('prescriber-specialty').value = specialty;
        
        // Use the most complete data available
        const address = orgData?.address || userData?.address || user.address || '123 Medical Center, Lagos, Nigeria';
        const phone = orgData?.phone || userData?.phone_number || user.phone || user.phoneNumber || '+234-XXX-XXXX';
        const email = userData?.email || user.email || `${user.username || 'doctor'}@${orgData?.name?.toLowerCase().replace(/\s+/g, '') || 'clinic'}.com`;
        
        document.getElementById('prescriber-address').value = address;
        document.getElementById('prescriber-phone').value = phone;
        document.getElementById('prescriber-email').value = email;
        
        console.log('Final prescriber data loaded:', {
          name: prescriberName,
          medicalLicense: medicalLicense,
          specialty: specialty,
          address: address,
          phone: phone,
          email: email,
          orgData: orgData,
          userData: userData
        });
      } catch (error) {
        console.error('Error loading prescriber data:', error);
        // Set fallback values even on error
        document.getElementById('prescriber-name').value = 'Dr. Unknown';
        document.getElementById('prescriber-license').value = 'LIC-001';
        document.getElementById('prescriber-specialty').value = 'General Practice';
        document.getElementById('prescriber-address').value = '123 Medical Center, Lagos, Nigeria';
        document.getElementById('prescriber-phone').value = '+234-XXX-XXXX';
        document.getElementById('prescriber-email').value = 'doctor@clinic.com';
      }

    // Initialize signature canvas
    function initializeSignatureCanvas() {
      const canvas = document.getElementById('signature-canvas');
      if (canvas) {
        const ctx = canvas.getContext('2d');
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        
        let isDrawing = false;
        
        canvas.addEventListener('mousedown', (e) => {
          isDrawing = true;
          const rect = canvas.getBoundingClientRect();
          ctx.beginPath();
          ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        });
        
        canvas.addEventListener('mousemove', (e) => {
          if (isDrawing) {
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
          }
        });
        
        canvas.addEventListener('mouseup', () => {
          isDrawing = false;
        });
      }
    }

    // Download prescription as image with multi-page support
    function downloadPrescriptionAsImage() {
      try {
        // Show loading message
        const loadingDiv = document.createElement('div');
        loadingDiv.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; color: white; padding: 20px; border-radius: 8px; z-index: 10001;';
        loadingDiv.innerHTML = '🔄 Generating prescription images...';
        document.body.appendChild(loadingDiv);

        // Generate preview first if it doesn't exist
        if (typeof previewPrescription === 'function') {
          previewPrescription();
        }
        
        // Get the prescription preview element
        const previewElement = document.getElementById('prescription-preview');
        if (!previewElement) {
          alert('Please preview the prescription first before downloading');
          loadingDiv.remove();
          return;
        }

        // Hide the preview element during capture to prevent it from being visible
        const originalDisplay = previewElement.style.display;
        const originalPosition = previewElement.style.position;
        const originalLeft = previewElement.style.left;
        const originalTop = previewElement.style.top;
        const originalZIndex = previewElement.style.zIndex;
        
        // Move preview completely off-screen and hide it
        previewElement.style.position = 'absolute';
        previewElement.style.left = '-9999px';
        previewElement.style.top = '-9999px';
        previewElement.style.zIndex = '-9999';
        previewElement.style.display = 'block';
        previewElement.style.visibility = 'hidden';

        // Use html2canvas to capture the prescription
        if (typeof html2canvas !== 'undefined') {
          html2canvas(previewElement, {
            scale: 2, // Higher quality
            useCORS: true,
            allowTaint: true,
            backgroundColor: '#ffffff'
          }).then(canvas => {
            // Restore original styles
            previewElement.style.position = originalPosition;
            previewElement.style.left = originalLeft;
            previewElement.style.top = originalTop;
            previewElement.style.zIndex = originalZIndex;
            previewElement.style.display = originalDisplay;
            previewElement.style.visibility = 'visible';
            
            // Create download link
            const link = document.createElement('a');
            link.download = `prescription-${new Date().toISOString().split('T')[0]}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();

            loadingDiv.remove();

            // Check if prescription is long (more than one page)
            const previewHeight = previewElement.scrollHeight;
            const viewportHeight = window.innerHeight;
            
            if (previewHeight > viewportHeight * 0.8) {
              // Prescription is long, offer to download in sections
              if (confirm('This prescription is long. Would you like to download it in sections for better readability?')) {
                downloadPrescriptionInSections(previewElement);
              }
            }
          }).catch(error => {
            // Restore original styles even on error
            previewElement.style.position = originalPosition;
            previewElement.style.left = originalLeft;
            previewElement.style.top = originalTop;
            previewElement.style.zIndex = originalZIndex;
            previewElement.style.display = originalDisplay;
            previewElement.style.visibility = 'visible';
            
            console.error('Error generating image:', error);
            alert('Error generating prescription image. Please try again.');
            loadingDiv.remove();
          });
        } else {
          alert('Image generation library not available. Please try the print option instead.');
          previewElement.style.display = originalDisplay;
          loadingDiv.remove();
        }
      } catch (error) {
        console.error('Error in downloadPrescriptionAsImage:', error);
        alert('Error downloading prescription as image');
      }
    }

    // Download prescription in sections for long prescriptions
    function downloadPrescriptionInSections(previewElement) {
      const sections = [];
      const sectionHeight = window.innerHeight * 0.8; // 80% of viewport height
      const totalHeight = previewElement.scrollHeight;
      const numSections = Math.ceil(totalHeight / sectionHeight);

      let currentSection = 0;

      function captureNextSection() {
        if (currentSection >= numSections) {
          alert(`Downloaded ${numSections} prescription sections successfully!`);
          return;
        }

        // Create a temporary container for this section
        const tempContainer = document.createElement('div');
        tempContainer.style.cssText = `
          position: absolute;
          top: -9999px;
          left: -9999px;
          width: ${previewElement.offsetWidth}px;
          height: ${sectionHeight}px;
          overflow: hidden;
          background: white;
        `;

        // Clone the preview content
        const clonedContent = previewElement.cloneNode(true);
        clonedContent.style.position = 'relative';
        clonedContent.style.top = `-${currentSection * sectionHeight}px`;
        
        tempContainer.appendChild(clonedContent);
        document.body.appendChild(tempContainer);

        // Capture this section
        html2canvas(tempContainer, {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff'
        }).then(canvas => {
          // Download this section
          const link = document.createElement('a');
          link.download = `prescription-page-${currentSection + 1}-of-${numSections}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();

          // Clean up
          document.body.removeChild(tempContainer);
          
          // Move to next section
          currentSection++;
          setTimeout(captureNextSection, 500); // Small delay between downloads
        }).catch(error => {
          console.error('Error capturing section:', error);
          document.body.removeChild(tempContainer);
          currentSection++;
          setTimeout(captureNextSection, 500);
        });
      }

      captureNextSection();
    }

    // Create prescription from encounter (Doctor only) - SUPABASE-FIRST
    async function createPrescriptionFromEncounter(encounterId) {
      const urlParams = new URLSearchParams(window.location.search);
      const patientId = urlParams.get("patientId");
      
      if (!patientId) {
        alert("Patient ID not found. Cannot create prescription.");
        return;
      }

      // Check if user has Doctor role for prescription creation
      const user = JSON.parse(localStorage.getItem("user") || "{}");
      if (!user || user.role !== "Doctor") {
        alert("Only doctors can create prescriptions. Please contact a doctor to prescribe medications.");
        return;
      }

      try {
        // SUPABASE-FIRST: Load patients from Supabase first
        const patients = await getPatientsData();
        const patient = patients.find(p => p.id === patientId);
        
        if (!patient) {
          alert("Patient not found. Cannot create prescription.");
          return;
        }

        const encounter = patient.encounters?.find(e => e.id == encounterId);
        if (!encounter) {
          alert("Encounter not found. Cannot create prescription.");
          return;
        }

        // Open prescription page with encounter context
        const prescriptionUrl = 'prescription.html?patientId=' + patientId + '&encounterId=' + encounterId + '&encounterDate=' + encounter.date;
        const prescriptionWindow = window.open(
          prescriptionUrl, 
          'prescription', 
          'width=1400,height=800,scrollbars=yes,resizable=yes,toolbar=no,menubar=no,location=no,status=no'
        );
        
        if (!prescriptionWindow) {
          alert('Popup blocked! Please allow popups for this site and try again.');
          return;
        }
        
        // Focus the new window
        prescriptionWindow.focus();
      } catch (error) {
        console.error('Error loading patient data for prescription:', error);
        alert('Error loading patient data. Please try again.');
      }
    }

    // Display all prescriptions for the patient
    async function displayAllPrescriptions(prescriptions) {
      const tbody = document.getElementById("encounter-prescriptions-list");
      if (!tbody) return;

      // Get patient-reported medications
      const urlParams = new URLSearchParams(window.location.search);
      let patientId = urlParams.get("patientId");
      
      // CRITICAL FIX: Use resolvePatientByIdentifier to handle both UUIDs and legacy IDs
      let patient = null;
      if (typeof window.resolvePatientByIdentifier === 'function') {
        try {
          patient = await window.resolvePatientByIdentifier(patientId);
          // If resolved, update patientId to legacy ID for consistency
          if (patient) {
            const legacyId = window.getPatientIdentifier ? window.getPatientIdentifier(patient) : (patient.patient_id || patient.id);
            if (legacyId && !legacyId.includes('-')) {
              patientId = legacyId;
            }
          }
        } catch (error) {
          console.warn('Error resolving patient identifier in displayAllPrescriptions:', error);
        }
      }
      
      // Fallback: Load from Supabase-first priority if resolvePatientByIdentifier didn't work
      if (!patient) {
      const patients = await getPatientsData();
      if (!Array.isArray(patients)) {
        console.error('getPatientsData did not return an array:', patients);
        return;
      }
        // Try multiple ways to find the patient
        patient = patients.find(p => p.id === patientId || p.patient_id === patientId || p._supabaseUuid === patientId);

          prescription.medications.forEach(med => {

    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'prescriptionSaved') {
        console.log('✅ Prescription saved message received from opener window:', event.data);
        const urlParams = new URLSearchParams(window.location.search);
        const currentPatientId = urlParams.get("patientId");
        
        // Only refresh if it's for the current patient
        if (currentPatientId && (event.data.patientId === currentPatientId)) {
          console.log('🔄 Refreshing prescriptions on patient-encounters page...');
          // Refresh the encounters page (which includes prescriptions)
          loadPatientEncounters();
          
          // Also dispatch CustomEvent for other components to listen to
          const prescriptionSavedEvent = new CustomEvent('prescriptionSaved', {
            detail: event.data
          });
          window.dispatchEvent(prescriptionSavedEvent);
          console.log('Dispatched CustomEvent for prescriptionSaved');
        }
      }
    });

    // Listen for prescription deletion and update events
    window.addEventListener('patientDataUpdated', function(event) {
      console.log('Patient data updated event received:', event.detail);
      if (event.detail.action === 'prescriptionDeleted') {
        loadPatientEncounters();
        alert('Prescription deleted successfully!');
      }
    });

    window.addEventListener('prescriptionUpdated', function(event) {
      console.log('Prescription updated event received:', event.detail);
      loadPatientEncounters();
      alert('Prescription updated successfully!');
    });
    
    // Listen for storage events for cross-tab synchronization
    window.addEventListener('storage', function(e) {
      if (e.key === 'patientDataSync') {
        try {
          const syncEvent = JSON.parse(e.newValue);
          const urlParams = new URLSearchParams(window.location.search);
          const currentPatientId = urlParams.get("patientId");
          
          // Handle prescription saved events
          if (syncEvent && syncEvent.type === 'prescriptionSaved') {
            const { patientId } = syncEvent;
            if (currentPatientId === patientId) {
              console.log(`🔧 TRACE: Prescription saved for patient ${patientId} on patient-encounters, refreshing...`);
              loadPatientEncounters();
            }
          }
        } catch (error) {
          console.error('🔧 TRACE: Error parsing storage event:', error);
        }
      }
    });

    window.addEventListener('load', async function() {
      // Wait for Supabase sync to complete before loading patient encounters
      setTimeout(async () => {
        await loadPatientEncounters();
      }, 2000); // Increased timeout to allow Supabase sync to complete
    });

    // Also listen for the universal data loader completion
    window.addEventListener('patientDataUpdated', async function(event) {
      const { patientId, action } = event.detail || {};
      const urlParams = new URLSearchParams(window.location.search);
      const currentPatientId = urlParams.get("patientId");
      
      // Only reload if it's the same patient
      if (currentPatientId === patientId || !patientId) {
        console.log('🔄 Patient data updated, reloading encounters...');
        await loadPatientEncounters();
      }
    });

    // Listen for Supabase sync completion
    if (window.UniversalDataLoader) {
      window.UniversalDataLoader.onSyncComplete = async function() {
        console.log('✅ Supabase sync completed, loading patient encounters...');
        await loadPatientEncounters();
      };
    }
  </script>
