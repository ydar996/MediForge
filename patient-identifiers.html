<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Patient Identifiers | MediForge</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f5; margin: 0; padding: 24px; }
    .wrap { max-width: 960px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 4px 18px rgba(0,0,0,.08); }
    h1 { color: #008753; margin-top: 0; }
    .id-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: .92rem; }
    .id-table th, .id-table td { padding: 10px 12px; border-bottom: 1px solid #eee; text-align: left; }
    .id-table th { background: #008753; color: #fff; }
    .btn { display: inline-block; margin-top: 16px; padding: 10px 18px; background: #008753; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Provincial Patient Identifiers</h1>
    <p>OHIP health card numbers (PHN) registered for OLIS and provincial matching. Used when lab network integration is enabled.</p>
    <div id="table-wrap">Loading...</div>
    <a href="lab-results-queue" class="btn">Lab Results Queue</a>
    <a href="dashboard" class="btn">← Dashboard</a>
  </div>
  <script src="/js/vendor/supabase.min.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/patient-identifiers.js"></script>
  <script>
    (async function () {
      const rows = await MediForgePatientIdentifiers.loadOrgIdentifiers();
      MediForgePatientIdentifiers.renderTable(document.getElementById('table-wrap'), rows);
    })();
  </script>
</body>
</html>
