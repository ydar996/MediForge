<!-- Purpose: Staff view for a single patient intake submission -->
<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Intake Submission Details | MediForge</title>
  <link rel="stylesheet" href="css/patient-intake-approvals.css?v=20251109">
  <link rel="stylesheet" href="css/mobile.css?v=20251109" media="(max-width: 768px)">
  <script src="js/vendor/supabase.min.js"></script>
  <script src="js/ehr-org-patient-id.js?v=20260429180000"></script>
  <script src="js/supabase-patients.js?v=20260429180000"></script>
  <script src="js/main.js?v=20251109" defer></script>
  <script src="js/supabase-client.js?v=20251109" defer></script>
</head>
<body>
  <main class="approvals-container">
    <article class="approvals-card">
      <header class="approvals-header">
        <div class="approvals-nav">
          <a href="patient-intake-approvals" class="btn btn-ghost approvals-nav-link">← Back to Intake Approvals</a>
        </div>
        <h1>Submission Details</h1>
        <p id="detail-subtitle" class="approvals-subtitle"></p>
      </header>

      <section class="detail-body" id="detail-body"></section>

      <footer class="approvals-footer" style="justify-content: flex-start; gap: 12px;">
        <button type="button" class="btn btn-success" id="approve-submission">Approve & Create Patient</button>
        <button type="button" class="btn btn-danger" id="reject-submission">Reject Submission</button>
        <a href="patient-intake-approvals" class="btn btn-ghost approvals-footer-link">← Back</a>
      </footer>
    </article>
  </main>

  <div id="approvals-toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/patient-intake-approval-details.js?v=20251109" defer></script>
  <script src="js/logout-button.js"></script>
  <script src="js/session-timeout.js"></script>
</body>
</html>
