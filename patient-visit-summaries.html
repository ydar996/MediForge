<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visit Summaries - Patient Portal</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    :root { --green: #008751; --green-dark: #006B3F; --beige: #F5F5DC; }
    body { font-family: system-ui, sans-serif; background: var(--beige); margin: 0; }
    .header { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #fff; padding: 20px; }
    .nav-bar { background: #fff; padding: 12px 20px; display: flex; flex-wrap: wrap; gap: 10px; }
    .nav-bar a { color: var(--green); text-decoration: none; padding: 8px 14px; border-radius: 6px; font-weight: 600; }
    .nav-bar a.active { background: var(--green); color: #fff; }
    .container { max-width: 900px; margin: 20px auto; padding: 0 16px; }
    .card {
      background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06); border-left: 4px solid var(--green);
      display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; justify-content: space-between;
    }
    .card-main { flex: 1; min-width: 220px; }
    .card h3 { margin: 0 0 8px; color: var(--green-dark); font-size: 1.15rem; }
    .visit-time-row {
      display: flex; flex-wrap: wrap; gap: 8px 16px; margin-bottom: 8px;
      font-size: 0.9rem; color: #444;
    }
    .time-pill {
      background: #eef8f1; color: var(--green-dark); padding: 4px 10px;
      border-radius: 999px; font-weight: 600;
    }
    .card p { margin: 0; color: #666; font-size: 0.95rem; line-height: 1.5; }
    .card-actions { flex-shrink: 0; align-self: center; }
    .detail-btn {
      display: inline-block; padding: 10px 18px; border-radius: 8px; font-weight: 600;
      text-decoration: none; background: var(--green); color: #fff; border: 2px solid var(--green);
    }
    .detail-btn:hover { background: var(--green-dark); border-color: var(--green-dark); }
    .muted { color: #777; font-style: italic; }
    .list-hint { color: #555; font-size: 0.9rem; margin: 0 0 16px; }
  </style>
</head>
<body>
  <div class="header"><h1>📄 Visit Summaries</h1><p>Summaries from your clinic visits</p></div>
  <div class="nav-bar">
    <a href="patient-dashboard">Dashboard</a>
    <a href="patient-profile">Profile</a>
    <a href="patient-appointments">Appointments</a>
    <a href="patient-medications">Medications</a>
    <a href="patient-results">Results</a>
    <a href="patient-visit-summaries" class="active">Visit Summaries</a>
    <a href="patient-messages">Messages</a>
    <a href="patient-summary">Summary</a>
    <a href="#" onclick="logout();return false;" style="margin-left:auto;color:#c33;">Logout</a>
  </div>
  <div class="container">
    <div id="list"><p>Loading…</p></div>
  </div>

  <script src="js/vendor/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/patient-auth.js"></script>
  <script src="js/patient-data-loader.js?v=20260621240000-portal-summary-sync"></script>
  <script src="js/visit-summary-builder.js?v=20260621240000-portal-summary-sync"></script>
  <script>
    window.ensurePatientAccess();

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function formatDate(d) {
      if (!d) return '—';
      const dt = new Date(d);
      if (Number.isNaN(dt.getTime())) return String(d).slice(0, 10);
      return dt.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function buildTimeMarkers(summary) {
      const snap = summary.visit_snapshot || {};
      const markers = [];
      const scheduled = summary.visit_time || snap.visitTime;
      const checkedIn = summary.checked_in_at || snap.checkedInAt;
      const ended = summary.checked_out_at || snap.checkedOutAt;

      if (scheduled) {
        markers.push(`<span class="time-pill">Scheduled ${esc(window.portalFormatVisitTime ? window.portalFormatVisitTime(scheduled) : scheduled)}</span>`);
      }
      if (checkedIn) {
        const label = window.portalFormatVisitDateTime ? window.portalFormatVisitDateTime(checkedIn) : checkedIn;
        markers.push(`<span class="time-pill">Checked in ${esc(label)}</span>`);
      }
      if (ended) {
        const label = window.portalFormatVisitDateTime ? window.portalFormatVisitDateTime(ended) : ended;
        markers.push(`<span class="time-pill">Ended ${esc(label)}</span>`);
      }
      if (!markers.length) {
        markers.push('<span class="time-pill">Time not recorded</span>');
      }
      return markers.join('');
    }

    function detailUrl(summary) {
      const visitDate = String(summary.visit_date || '').slice(0, 10);
      const params = new URLSearchParams({ visitDate });
      if (summary.id != null) params.set('id', String(summary.id));
      return `patient-visit-summary-detail?${params.toString()}`;
    }

    async function load() {
      const list = document.getElementById('list');
      const summaries = await window.getPatientVisitSummaries();
      if (!summaries.length) {
        list.innerHTML = '<p class="muted">No visit summaries are ready yet. Your summary appears here after your provider documents your visit. If you expected one today, ask your clinic to open your visit chart so it can sync.</p>';
        return;
      }
      list.innerHTML = `
        <p class="list-hint">Each card shows the visit date and time so you can tell visits apart. Tap <strong>View detail</strong> to open the full summary.</p>
        ${summaries.map((s) => {
          const snap = s.visit_snapshot || {};
          const cc = s.chief_complaint || snap.chiefComplaint || 'Office visit';
          const provider = s.discharging_physician || snap.provider || 'Your care team';
          const type = s.appointment_type ? `${esc(s.appointment_type)} · ` : '';
          return `<article class="card">
            <div class="card-main">
              <h3>${esc(formatDate(s.visit_date))}</h3>
              <div class="visit-time-row">${buildTimeMarkers(s)}</div>
              <p>${type}${esc(cc)} · ${esc(provider)}</p>
            </div>
            <div class="card-actions">
              <a class="detail-btn" href="${esc(detailUrl(s))}">View detail</a>
            </div>
          </article>`;
        }).join('')}
      `;
    }

    function logout() {
      if (confirm('Log out?')) {
        localStorage.removeItem('user');
        window.location.href = '/patient-login';
      }
    }

    window.addEventListener('load', load);
  </script>
  <script src="js/session-timeout.js"></script>
</body>
</html>
