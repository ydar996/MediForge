<body>
  <div class="receipt-header">
    <h1>Payment Receipts Review</h1>
    <p>Review and approve payment receipts from customers</p>
  </div>
  
  <div style="margin-bottom: 20px;">
    <a href="platform-dashboard" style="background: #666; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 20px; text-decoration: none; display: inline-block;">

    </a>

  <!-- Subscription Manager -->
  <script src="js/subscription-manager.js?v=1"></script>
  
  <script>
    // Global variable to store current receipts for viewFullReceipt access
    let currentReceipts = [];
    
    // Sync a receipt from localStorage to Supabase
    async function syncReceiptToSupabase(localReceipt) {
      if (!localReceipt || !localReceipt.paymentId) {
        console.warn('[SYNC-RECEIPT] Invalid receipt data, skipping sync');
        return false;
      }
      
      if (typeof window.supabaseClient === 'undefined' || !window.supabaseClient) {
        console.warn('[SYNC-RECEIPT] Supabase client not available');
        return false;
      }
      
      try {
        // Supabase-first: Try getAllOrganizations() first, fallback to localStorage
        let organizations = {};
        try {
          if (typeof getAllOrganizations === 'function') {
            organizations = await getAllOrganizations();
          } else {
            organizations = JSON.parse(localStorage.getItem('organizations') || '{}');
          }
        } catch (error) {
          organizations = JSON.parse(localStorage.getItem('organizations') || '{}');
        }
        let organizationId = null;
        let organizationName = null;
        
        console.log('[SYNC-RECEIPT] Looking up organization for payment:', localReceipt.paymentId);
        console.log('[SYNC-RECEIPT] Available organizations:', Object.keys(organizations));
        
        // Find organization by payment ID
        for (const [name, org] of Object.entries(organizations)) {
          if (org.subscription && org.subscription.lastPayment && 
              org.subscription.lastPayment.id === localReceipt.paymentId) {
            organizationName = name;
            organizationId = org.id;
            console.log('[Payment Receipts] [SYNC-RECEIPT] Found organization:', { name, id: organizationId });
            break;
          }
        }
        
        // If not found, try to get from receipt itself
        if (!organizationId) {
          organizationId = localReceipt.organizationId;
          organizationName = localReceipt.organizationName;
          console.log('[SYNC-RECEIPT] Using organization from receipt:', { name: organizationName, id: organizationId });
        }
        
        // If still not found, try to query Supabase billing_history for organization_id
        if (!organizationId && localReceipt.paymentId) {
          try {
            const { data: billingRecord } = await window.supabaseClient
              .from('billing_history')
              .select('organization_id, organizations(name)')
              .eq('id', localReceipt.paymentId)
              .maybeSingle();
            
            if (billingRecord) {
              organizationId = billingRecord.organization_id;
              organizationName = billingRecord.organizations?.name || 'Unknown Organization';
              console.log('[Payment Receipts] [SYNC-RECEIPT] Found organization from billing_history:', { name: organizationName, id: organizationId });
            }
          } catch (err) {
            console.warn('[SYNC-RECEIPT] Could not query billing_history:', err);
          }
        }
        
        if (!organizationId) {
          console.warn('[SYNC-RECEIPT] Could not determine organization_id. Receipt may not sync correctly.');
        }
        
        const receiptRecord = {
          payment_id: localReceipt.paymentId,
          organization_id: organizationId,
          organization_name: organizationName || 'Unknown Organization',
          file_name: localReceipt.fileName,
          file_type: localReceipt.fileType,
          file_size: localReceipt.fileSize,
          base64_data: localReceipt.base64Data,
          file_data: localReceipt.base64Data,
          upload_date: localReceipt.uploadDate || new Date().toISOString(),
          status: localReceipt.status || 'pending_approval'
        };
        
        console.log('[SYNC-RECEIPT] Syncing receipt to Supabase:', {
          payment_id: receiptRecord.payment_id,
          organization_name: receiptRecord.organization_name
        });
        
        const { data, error } = await window.supabaseClient
          .from('payment_receipts')
          .insert([receiptRecord])
          .select()
          .single();
        
        if (error) {
          // Check if it's a duplicate (already exists)
          if (error.code === '23505' || error.message?.includes('duplicate') || error.message?.includes('unique')) {
            console.log('[SYNC-RECEIPT] Receipt already exists in Supabase, skipping');
            return true; // Consider it successful since it already exists
          }
          console.error('[Payment Receipts] [SYNC-RECEIPT] Error syncing receipt:', error);
          return false;
        } else {
          console.log('[Payment Receipts] [SYNC-RECEIPT] Receipt synced successfully:', data.id);
          return true;
        }
      } catch (err) {
        console.error('[Payment Receipts] [SYNC-RECEIPT] Exception syncing receipt:', err);
        return false;
      }
    }
    
    // Load and display payment receipts
    async function loadReceipts() {
      console.log('[PAYMENT-RECEIPTS] Loading payment receipts...');
      
      // Check platform admin status
      const platformAdmin = JSON.parse(localStorage.getItem('platformAdmin') || 'null');
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      const isPlatformAdmin = platformAdmin !== null || 
                             user.role === 'Platform Admin' || 
                             user.role === 'PlatformOwner' ||
                             user.email === 'yinka@eworkchop.com';
      
      // Get auth state asynchronously
      let authUid = 'Not authenticated';
      let authEmail = 'Not authenticated';
      if (typeof window.supabaseClient !== 'undefined' && window.supabaseClient) {
        try {
          const session = await window.supabaseClient.auth.getSession();
          if (session.data.session?.user) {
            authUid = session.data.session.user.id;
            authEmail = session.data.session.user.email || 'No email';
          }
        } catch (err) {
          console.warn('[PAYMENT-RECEIPTS] Could not get auth session:', err);
        }
      }
      
      console.log('[PAYMENT-RECEIPTS] User check:', {
        isPlatformAdmin: isPlatformAdmin,
        platformAdmin: platformAdmin ? platformAdmin.username : null,
        userRole: user.role,
        userEmail: user.email,
        hasSupabaseClient: typeof window.supabaseClient !== 'undefined',
        authUid: authUid,
        authEmail: authEmail
      });
      
      let receipts = [];
      
      // Try to load from Supabase first
      if (typeof window.supabaseClient !== 'undefined' && window.supabaseClient) {
        try {
          console.log('[PAYMENT-RECEIPTS] Querying Supabase for all payment receipts...');
          
          // Check auth state (async)
          try {
            const session = await window.supabaseClient.auth.getSession();
            const user = session.data.session?.user || null;
            console.log('[PAYMENT-RECEIPTS] Supabase auth state:', {
              hasSession: !!session.data.session,
              userId: user?.id || 'Not authenticated',
              userEmail: user?.email || 'Not authenticated'
            });
          } catch (authError) {
            console.warn('[PAYMENT-RECEIPTS] Could not check auth state:', authError);
          }
          
          // Check for payment receipts table - NO organization filter so platform admins see all
          const { data: supabaseReceipts, error } = await window.supabaseClient
            .from('payment_receipts')
            .select('*')
            .order('upload_date', { ascending: false });
          
          if (error) {
            console.error('[Payment Receipts] [PAYMENT-RECEIPTS] Error querying Supabase:', error);
            console.error('[Payment Receipts] [PAYMENT-RECEIPTS] Error code:', error.code);
            console.error('[Payment Receipts] [PAYMENT-RECEIPTS] Error message:', error.message);
            console.error('[Payment Receipts] [PAYMENT-RECEIPTS] Error details:', JSON.stringify(error, null, 2));
            console.error('[Payment Receipts] [PAYMENT-RECEIPTS] Auth state:', {
              hasSession: !!(await window.supabaseClient.auth.getSession()).data.session,
              userId: (await window.supabaseClient.auth.getSession()).data.session?.user?.id
            });
            
            // 404 or PGRST116 means table doesn't exist yet
            if (error.code === 'PGRST116' || error.message?.includes('404') || error.message?.includes('relation') || error.message?.includes('does not exist')) {
              console.warn('[PAYMENT-RECEIPTS] payment_receipts table does not exist in Supabase yet.');
              console.warn('[PAYMENT-RECEIPTS] Please run the migration: supabase/migrations/20250120000000_create_payment_receipts_table.sql');
              console.warn('[PAYMENT-RECEIPTS] Falling back to localStorage for receipt data.');
            } else if (error.code === '42501' || error.message?.includes('permission') || error.message?.includes('policy')) {
              console.error('[PAYMENT-RECEIPTS] RLS Policy Error - Platform admin may not be authenticated via Supabase');
              console.error('[PAYMENT-RECEIPTS] Please ensure platform admin authenticates via Supabase or update RLS policies');
            }
          } else {
            console.log(`[PAYMENT-RECEIPTS] Supabase query successful. Found ${supabaseReceipts?.length || 0} receipts`);
            
            if (supabaseReceipts && supabaseReceipts.length > 0) {
              console.log(`[Payment Receipts] [PAYMENT-RECEIPTS] Found ${supabaseReceipts.length} receipts in Supabase`);
              console.log('[PAYMENT-RECEIPTS] Receipt details:', supabaseReceipts.map(r => ({
                payment_id: r.payment_id,
                organization_name: r.organization_name,
                file_name: r.file_name,
                status: r.status,
                upload_date: r.upload_date
              })));
              
              receipts = supabaseReceipts.map(receipt => ({
                paymentId: receipt.payment_id || receipt.paymentId,
                fileName: receipt.file_name || receipt.fileName,
                fileType: receipt.file_type || receipt.fileType,
                fileSize: receipt.file_size || receipt.fileSize,
                base64Data: receipt.base64_data || receipt.base64Data || receipt.file_data || receipt.fileData,
                uploadDate: receipt.upload_date || receipt.uploadDate,
                status: receipt.status || 'pending_approval',
                organizationId: receipt.organization_id || receipt.organizationId,
                organizationName: receipt.organization_name,
                approvedDate: receipt.approved_date || receipt.approvedDate,
                rejectedDate: receipt.rejected_date || receipt.rejectedDate,
                approvedBy: receipt.approved_by || receipt.approvedBy
              }));
              
              // Also update localStorage for backward compatibility
              localStorage.setItem('payment_receipts', JSON.stringify(receipts));
              console.log('[Payment Receipts] [PAYMENT-RECEIPTS] Updated localStorage with Supabase receipts');
              
              // Store in global variable for viewFullReceipt access
              currentReceipts = receipts;
            } else {
              console.log('[PAYMENT-RECEIPTS] No receipts found in Supabase');
            }
          }
          
          // Always also check localStorage and merge any receipts that aren't in Supabase
          console.log('[PAYMENT-RECEIPTS] Checking localStorage for receipts...');
          const localReceipts = JSON.parse(localStorage.getItem('payment_receipts') || '[]');
          console.log(`[PAYMENT-RECEIPTS] Found ${localReceipts.length} receipts in localStorage`);
          
          if (localReceipts.length > 0) {
            console.log('[PAYMENT-RECEIPTS] localStorage receipts:', localReceipts.map(r => ({
              paymentId: r.paymentId,
              fileName: r.fileName,
              status: r.status,
              uploadDate: r.uploadDate
            })));
            // Merge local receipts that aren't in Supabase (by paymentId)
            const existingPaymentIds = new Set(receipts.map(r => r.paymentId));
            const newReceipts = localReceipts.filter(localRec => 
              !existingPaymentIds.has(localRec.paymentId)
            );
            
            if (newReceipts.length > 0) {
              console.log(`Found ${newReceipts.length} additional receipts in localStorage not yet in Supabase`);
              console.log('[PAYMENT-RECEIPTS] Attempting to sync localStorage receipts to Supabase...');
              
              // Try to sync these receipts to Supabase
              for (const localReceipt of newReceipts) {
                await syncReceiptToSupabase(localReceipt);
              }
              
              // Re-query Supabase to get the synced receipts
              const { data: syncedReceipts, error: syncError } = await window.supabaseClient
                .from('payment_receipts')
                .select('*')
                .order('upload_date', { ascending: false });
              
              if (!syncError && syncedReceipts && syncedReceipts.length > 0) {
                console.log(`[Payment Receipts] [PAYMENT-RECEIPTS] Successfully synced. Now have ${syncedReceipts.length} receipts in Supabase`);
                receipts = syncedReceipts.map(receipt => ({
                  paymentId: receipt.payment_id || receipt.paymentId,
                  fileName: receipt.file_name || receipt.fileName,
                  fileType: receipt.file_type || receipt.fileType,
                  fileSize: receipt.file_size || receipt.fileSize,
                  base64Data: receipt.base64_data || receipt.base64Data || receipt.file_data || receipt.fileData,
                  uploadDate: receipt.upload_date || receipt.uploadDate,
                  status: receipt.status || 'pending_approval',
                  organizationId: receipt.organization_id || receipt.organizationId,
                  organizationName: receipt.organization_name,
                  approvedDate: receipt.approved_date || receipt.approvedDate,
                  rejectedDate: receipt.rejected_date || receipt.rejectedDate,
                  approvedBy: receipt.approved_by || receipt.approvedBy
                }));
              } else {
                // If sync failed, still use localStorage receipts
                receipts = [...receipts, ...newReceipts];
              }
            }
            
            if (receipts.length === 0 && localReceipts.length > 0) {
              console.log(`No receipts in Supabase, using ${localReceipts.length} from localStorage`);
              receipts = localReceipts;
            }
          }
        } catch (error) {
          console.warn('Error loading receipts from Supabase:', error);
          receipts = JSON.parse(localStorage.getItem('payment_receipts') || '[]');
          if (receipts.length > 0) {
            console.log(`Fallback: Loaded ${receipts.length} receipts from localStorage`);
          }
        }
      } else {
        receipts = JSON.parse(localStorage.getItem('payment_receipts') || '[]');
        if (receipts.length > 0) {
          console.log(`Supabase not available, loaded ${receipts.length} receipts from localStorage`);
        }
      }
      
      const receiptsList = document.getElementById('receiptsList');
      
      // Store receipts globally for viewFullReceipt access
      currentReceipts = receipts;
      
      if (receipts.length === 0) {
        receiptsList.innerHTML = `
          <div class="no-receipts">
            <h3>No payment receipts to review</h3>
            <p>All receipts have been processed or no receipts have been uploaded yet.</p>
          </div>
        `;
        return;
      }
      
      receiptsList.innerHTML = '';
      
      receipts.forEach((receipt, index) => {
        const statusClass = receipt.status === 'approved' ? 'approved' : 
                           receipt.status === 'rejected' ? 'rejected' : 
                           receipt.status === 'pending_upload' ? 'pending' : 'pending';
        
        const statusBadge = receipt.status === 'approved' ? 'status-approved' : 
                           receipt.status === 'rejected' ? 'status-rejected' : 
                           receipt.status === 'pending_upload' ? 'status-pending' : 'status-pending';
        
        const statusText = receipt.status === 'approved' ? 'APPROVED' : 
                          receipt.status === 'rejected' ? 'REJECTED' : 
                          receipt.status === 'pending_upload' ? 'AWAITING UPLOAD' : 'PENDING';
        
        const receiptElement = document.createElement('div');
        receiptElement.className = `receipt-item ${statusClass}`;
        receiptElement.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0; color: #333;">Receipt #${receipt.paymentId?.slice(-8) || receipt.paymentId || 'N/A'}</h3>
            <span class="status-badge ${statusBadge}">${statusText}</span>
          </div>
          
          <div class="receipt-info">
            <div class="info-section">
              <h4>File Information</h4>
              <p><strong>File Name:</strong> ${receipt.fileName}</p>
              <p><strong>File Type:</strong> ${receipt.fileType}</p>
              <p><strong>File Size:</strong> ${(receipt.fileSize / 1024 / 1024).toFixed(2)} MB</p>
              <p><strong>Upload Date:</strong> ${new Date(receipt.uploadDate).toLocaleDateString()}</p>
            </div>
            
            <div class="info-section">
              <h4>Payment Details</h4>
              <p><strong>Payment ID:</strong> ${receipt.paymentId}</p>
              <p><strong>Organization:</strong> <span id="org-name-${index}">${receipt.organizationName && receipt.organizationName.trim() !== '' ? receipt.organizationName : 'Loading...'}</span></p>
              <p><strong>Plan:</strong> <span id="plan-name-${index}">${receipt.planName && receipt.planName.trim() !== '' ? receipt.planName : 'Loading...'}</span></p>
              <p><strong>Amount:</strong> <span id="payment-amount-${index}">${receipt.amount && receipt.currency ? (() => { const symbol = receipt.currency === 'NGN' ? '₦' : receipt.currency === 'USD' ? '$' : receipt.currency; return `${symbol}${receipt.amount.toLocaleString()}`; })() : 'Loading...'}</span></p>
            </div>
          </div>
          
          <div style="text-align: center; margin: 20px 0;">
            ${receipt.fileType === 'application/pdf' || receipt.fileType?.includes('pdf') ? `
              <div style="background: #f8f9fa; padding: 40px; border-radius: 8px; border: 2px dashed #ddd;">
                <div style="font-size: 48px; margin-bottom: 15px;"><i class="fa-solid fa-file-pdf" style="color:#d32f2f"></i></div>
                <p style="color: #666; margin-bottom: 15px; font-weight: bold;">${receipt.fileName}</p>
                <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                  <button onclick="viewFullReceipt('${index}')" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                    View PDF
                  </button>
                  <button onclick="downloadReceipt('${index}')" style="background: #28a745; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                    Download PDF
                  </button>
                </div>
              </div>
            ` : `
              <img src="data:${receipt.fileType};base64,${receipt.base64Data}" 
                   class="receipt-preview" 
                   onclick="viewFullReceipt('${index}')"
                   alt="Receipt Preview"
                   style="cursor: pointer;">
              <p style="color: #666; font-size: 12px; margin-top: 5px;">Click to view full size</p>
            `}
          </div>
          
          ${receipt.status === 'pending_upload' ? `
            <div class="receipt-actions">
              <p style="color: #856404; font-weight: 600;">
                <i class="fa-solid fa-clock" aria-hidden="true"></i> This payment is awaiting receipt upload from the organization.
              </p>
              <p style="color: #666; font-size: 12px; margin-top: 10px;">
                Once the receipt is uploaded, you will be able to approve or reject it here.
              </p>
            </div>
          ` : receipt.status === 'pending_approval' ? `
            <div class="receipt-actions">
              <button class="receipt-btn approve" onclick="approveReceipt('${index}')">
                <i class="fa-solid fa-check" aria-hidden="true"></i> Approve Payment
              </button>
              <button class="receipt-btn reject" onclick="rejectReceipt('${index}')">
                <i class="fa-solid fa-xmark" aria-hidden="true"></i> Reject Receipt
              </button>
            </div>
          ` : `
            <div class="receipt-actions">
              <p style="color: #666; font-style: italic;">
                ${receipt.status === 'approved' ? 'This receipt has been approved and payment marked as completed.' : 
                  'This receipt has been rejected. Please contact the customer for a new receipt.'}
              </p>
            </div>
          `}
        `;
        
        receiptsList.appendChild(receiptElement);
        
        // Load async data for this receipt
        // Use receipt's stored data first, then lookup if needed
        (async (idx, receiptData) => {
          const orgNameEl = document.getElementById(`org-name-${idx}`);
          const planNameEl = document.getElementById(`plan-name-${idx}`);
          const amountEl = document.getElementById(`payment-amount-${idx}`);
          
          // Use organization_name from receipt record FIRST (this is the organization that uploaded it)
          if (orgNameEl) {
            if (receiptData.organizationName && receiptData.organizationName.trim() !== '' && receiptData.organizationName !== 'Unknown Organization') {
              console.log(`[Payment Receipts] [RECEIPT-${idx}] Using stored organization name:`, receiptData.organizationName);
              orgNameEl.textContent = receiptData.organizationName;
            } else {
              console.log(`[RECEIPT-${idx}] No organization name in receipt, looking up...`);
              orgNameEl.textContent = await getOrganizationName(receiptData.paymentId);
            }
          }
          
          // Use planName from receipt if available, otherwise lookup
          if (planNameEl) {
            if (receiptData.planName && receiptData.planName.trim() !== '' && receiptData.planName !== 'Unknown Plan') {
              planNameEl.textContent = receiptData.planName;
            } else {
              planNameEl.textContent = await getPlanName(receiptData.paymentId);
            }
          }
          
          // Use amount from receipt if available, otherwise lookup
          if (amountEl) {
            if (receiptData.amount && receiptData.currency) {
              const currency = receiptData.currency || 'CAD';
              const symbol = currency === 'NGN' ? '₦' : currency === 'USD' ? '$' : currency;
              amountEl.textContent = `${symbol}${receiptData.amount.toLocaleString()}`;
            } else {
              amountEl.textContent = await getPaymentAmount(receiptData.paymentId);
            }
          }
        })(index, receipt);
      });
      
      // Also check for subscription payments with bank deposit that need receipt review
      // even if no receipt file has been uploaded yet
      if (typeof getAllOrganizations === 'function') {
        try {
          const organizations = await getAllOrganizations();
          
          // Also check localStorage for payment data that might not be in Supabase
          const localOrgs = JSON.parse(localStorage.getItem('organizations') || '{}');
          
          const orgNames = Object.keys(organizations);
          
          for (const orgName of orgNames) {
            const org = organizations[orgName];
            const localOrg = localOrgs[orgName];
            
            // Merge subscription data from localStorage if it has lastPayment
            if (localOrg && localOrg.subscription && localOrg.subscription.lastPayment) {
              if (!org.subscription) {
                org.subscription = {};
              }
              org.subscription = {
                ...org.subscription,
                ...localOrg.subscription
              };
            }
            
            if (org.subscription && org.subscription.lastPayment) {
              const payment = org.subscription.lastPayment;
              
              // Check if this is a bank deposit payment that's pending review
              const isBankDeposit = payment.method && (
                payment.method.toLowerCase().includes('bank') ||
                payment.method.toLowerCase().includes('transfer') ||
                payment.method === 'manual_bank' ||
                payment.method === 'bank_transfer'
              );
              
              const isPending = payment.status === 'pending' || 
                               payment.status === 'pending_approval' ||
                               (!payment.receiptApproved && isBankDeposit);
              
              // Need a valid payment ID to track it
              const paymentId = payment.id || payment.paymentId || payment.payment_id;
              
              if (isPending && isBankDeposit && paymentId) {
                // Check if we already have a receipt entry for this payment
                const existingReceipt = receipts.find(r => 
                  r.paymentId === paymentId || 
                  r.paymentId === payment.id ||
                  (typeof r.paymentId === 'string' && r.paymentId.includes(paymentId))
                );
                
                if (!existingReceipt) {
                  // Create a pending receipt entry for bank deposits awaiting receipt upload
                  const pendingReceipt = {
                    paymentId: paymentId,
                    fileName: 'Receipt upload pending',
                    fileType: 'application/pending',
                    fileSize: 0,
                    uploadDate: payment.date || new Date().toISOString(),
                    base64Data: null,
                    status: 'pending_upload',
                    organizationName: orgName,
                    organizationId: org.id,
                    amount: payment.amount,
                    currency: payment.currency || 'CAD',
                    planName: org.subscription.planName || org.subscription.currentPlan || 'Unknown Plan'
                  };
                  
                  receipts.push(pendingReceipt);
                  console.log(`Added pending receipt entry for ${orgName} payment ${payment.id}`);
                }
              }
            }
          }
        } catch (error) {
          console.warn('Error checking for pending payments:', error);
        }
      }
      
      if (receipts.length === 0) {
        receiptsList.innerHTML = `
          <div class="no-receipts">
            <h3>No payment receipts to review</h3>
            <p>All receipts have been processed or no receipts have been uploaded yet.</p>
          </div>
        `;
      }
    }

    // View full receipt
    function viewFullReceipt(receiptIndex) {
      // Use current receipts array first, fallback to localStorage
      const receipts = currentReceipts.length > 0 ? currentReceipts : JSON.parse(localStorage.getItem('payment_receipts') || '[]');
      const receipt = receipts[receiptIndex];
      
      if (!receipt) {
        console.error('[Payment Receipts] [VIEW-RECEIPT] Receipt not found at index:', receiptIndex);
        alert('Receipt not found. Please refresh the page and try again.');
        return;
      }
      
      if (!receipt.base64Data) {
        console.error('[Payment Receipts] [VIEW-RECEIPT] Receipt has no base64 data');
        alert('Receipt data is missing. Please contact support.');
        return;
      }
      
      console.log('[VIEW-RECEIPT] Opening receipt:', {
        fileName: receipt.fileName,
        fileType: receipt.fileType,
        hasBase64Data: !!receipt.base64Data,
        base64Length: receipt.base64Data?.length
      });
      
      // Handle PDFs differently - use blob URL for better browser compatibility
      const isPDF = receipt.fileType === 'application/pdf' || receipt.fileType?.includes('pdf');
      
      if (isPDF) {
        try {
          // Convert base64 to binary
          const binaryString = atob(receipt.base64Data);
          const bytes = new Uint8Array(binaryString.length);
          for (let i = 0; i < binaryString.length; i++) {
            bytes[i] = binaryString.charCodeAt(i);
          }
          
          // Create blob and blob URL
          const blob = new Blob([bytes], { type: receipt.fileType || 'application/pdf' });
          const blobUrl = URL.createObjectURL(blob);
          
          console.log('[Payment Receipts] [VIEW-RECEIPT] Created blob URL for PDF:', blobUrl);
          
          // Open blob URL directly in new window - browser will handle PDF natively
          // This avoids CSP violations from iframe embedding
          const newWindow = window.open(blobUrl, '_blank');
          if (!newWindow) {
            alert('Please allow pop-ups to view the receipt.');
            URL.revokeObjectURL(blobUrl);
            return;
          }
          
          // Clean up blob URL when window closes (after a delay to ensure PDF loads)
          setTimeout(() => {
            // Try to detect when the window closes
            const checkClosed = setInterval(() => {
              if (newWindow.closed) {
                URL.revokeObjectURL(blobUrl);
                clearInterval(checkClosed);
                console.log('[Payment Receipts] [VIEW-RECEIPT] Cleaned up blob URL');
              }
            }, 1000);
            
            // Also clean up after 5 minutes as a safety measure
            setTimeout(() => {
              URL.revokeObjectURL(blobUrl);
              clearInterval(checkClosed);
            }, 5 * 60 * 1000);
          }, 2000);
          
        } catch (error) {
          console.error('[Payment Receipts] [VIEW-RECEIPT] Error creating PDF viewer:', error);
          alert('Error opening PDF. Please try downloading it instead.');
        }
      } else {
        // For images, display as image
        const newWindow = window.open('', '_blank');
        if (!newWindow) {
          alert('Please allow pop-ups to view the receipt.');
          return;
        }
        
        newWindow.document.write(`
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
            <meta http-equiv="Pragma" content="no-cache">
            <meta http-equiv="Expires" content="0">
            <meta name="mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Receipt - ${(receipt.fileName || 'Payment Receipt').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</title>
            <style>
              body { margin: 0; padding: 20px; background: #f5f5f5; text-align: center; }
              img { max-width: 100%; max-height: 90vh; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
              .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
            </style>
          </head>
          <body>
            <img src="data:${receipt.fileType || 'image/png'};base64,${receipt.base64Data || ''}" alt="Receipt">
          </body>
          </html>
        `);
        newWindow.document.close();
      }

    // Approve receipt - syncs to Supabase and updates organization
    async function approveReceipt(receiptIndex) {
      if (!confirm('Are you sure you want to approve this payment receipt? This will mark the payment as completed and activate the organization\'s subscription.')) {
        return;
      }
      
      const receipts = JSON.parse(localStorage.getItem('payment_receipts') || '[]');
      const receipt = receipts[receiptIndex];
      
      if (!receipt) {
        alert('Receipt not found');
        return;
      }
      
      const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
      const approvedBy = currentUser.username || currentUser.email || 'Platform Admin';
      const approvedDate = new Date().toISOString();
      
      // Update receipt status in localStorage first
      receipts[receiptIndex].status = 'approved';
      receipts[receiptIndex].approvedDate = approvedDate;
      receipts[receiptIndex].approvedBy = approvedBy;
      localStorage.setItem('payment_receipts', JSON.stringify(receipts));
      
      // HYBRID ARCHITECTURE: SUPABASE-FIRST
      // Step 1: Update payment_receipts table in Supabase
      let supabaseUpdated = false;
      if (typeof window.supabaseClient !== 'undefined' && window.supabaseClient) {
        try {
          const { error: receiptError } = await window.supabaseClient
            .from('payment_receipts')
            .update({
              status: 'approved',
              approved_date: approvedDate,
              approved_by: approvedBy
            })
            .eq('payment_id', receipt.paymentId);
          
          if (receiptError) {
            console.error('[Payment Receipts] Error updating receipt in Supabase:', receiptError);
          } else {
            console.log('[Payment Receipts] Receipt status updated in Supabase');
            supabaseUpdated = true;
          }
        } catch (error) {
          console.error('[Payment Receipts] Exception updating receipt in Supabase:', error);
        }
      }
      
      // Step 2: Update organization subscription status in Supabase
      const organizations = JSON.parse(localStorage.getItem('organizations') || '{}');
      let organizationId = null;
      let organizationName = null;
      
      // Find the organization with this payment
      for (const [name, org] of Object.entries(organizations)) {
        if (org.subscription && org.subscription.lastPayment && 
            org.subscription.lastPayment.id === receipt.paymentId) {
          organizationName = name;
          organizationId = org.id || receipt.organizationId;
          
          // Update organization payment status in localStorage
          org.subscription.lastPayment.status = 'completed';
          org.subscription.lastPayment.receiptApproved = true;
          org.subscription.lastPayment.approvedDate = approvedDate;
          org.subscription.lastPayment.approvedBy = approvedBy;
          
          // Calculate subscription expiry based on billing cycle
          const billingCycle = org.subscription.lastPayment.billingCycle || org.subscription.billingCycle || 'monthly';
          const expiryDate = new Date();
          expiryDate.setMonth(expiryDate.getMonth() + (billingCycle === 'annual' ? 12 : 1));
          
          const nextBillingDate = new Date(expiryDate);
          
          org.subscription.status = 'active';
          org.subscription.expiryDate = expiryDate.toISOString();
          org.subscription.nextBillingDate = nextBillingDate.toISOString();
          
          // Remove suspension if organization was suspended
          delete org.subscription.suspendedDate;
          delete org.subscription.suspensionReason;
          org.status = 'active';
          
          // Reactivate organization using subscription manager if available
          if (typeof window.reactivateOrganization === 'function') {
            await window.reactivateOrganization(organizationName);
          }
          
          break;
        }
      }
      
      // Update organization in Supabase
      if (organizationId && typeof window.supabaseClient !== 'undefined' && window.supabaseClient) {
        try {
          const expiryDate = new Date();
          expiryDate.setDate(expiryDate.getDate() + 30); // Default 30 days
          
          const { error: orgError } = await window.supabaseClient
            .from('organizations')
            .update({
              subscription_status: 'active',
              subscription_expires_at: expiryDate.toISOString(),
              updated_at: new Date().toISOString()
            })
            .eq('id', organizationId);
          
          if (orgError) {
            console.error('[Payment Receipts] Error updating organization subscription in Supabase:', orgError);
          } else {
            console.log('[Payment Receipts] Organization subscription activated in Supabase');
            supabaseUpdated = true;
            
            // Cache to localStorage immediately after successful Supabase write
            // Supabase write: supabaseClient.update() completed above
            localStorage.setItem('organizations', JSON.stringify(organizations)); // Cached after supabaseClient.update()
          }
        } catch (error) {
          console.error('[Payment Receipts] Exception updating organization in Supabase:', error);
          // Fallback: Save to localStorage only if Supabase failed
          localStorage.setItem('organizations', JSON.stringify(organizations));
        }
      } else {
        // Supabase not available - fallback to localStorage only
        localStorage.setItem('organizations', JSON.stringify(organizations));
      }
      
      // Audit log: Payment approved
      if (typeof logAuditEvent !== 'undefined') {
        logAuditEvent('payment_approved', {
          paymentId: receipt.paymentId,
          organizationId: organizationId,
          organizationName: organizationName,
          approvedBy: approvedBy,
          approvedDate: approvedDate
        });
      }
      
      // Show success message
      const message = supabaseUpdated 
        ? `Payment approved successfully! ${organizationName ? `Organization "${organizationName}"` : 'The organization'}'s subscription is now active and synced across all devices.`
        : `Payment approved locally! ${organizationName ? `Organization "${organizationName}"` : 'The organization'}'s subscription is active. Will sync to server when online.`;
      
      if (typeof window.showSuccessNotification === 'function') {
        window.showSuccessNotification(message);
      } else {
        alert(message);
      }
      
      loadReceipts(); // Reload the list
      console.log('[Payment Receipts] Receipt approved:', receipt);
    }

      const message = supabaseUpdated
        ? `Receipt rejected. The organization will need to upload a new receipt. Reason: ${reason.trim()}`
        : `Receipt rejected locally. The organization will need to upload a new receipt. Reason: ${reason.trim()}`;
      
      if (typeof window.showErrorNotification === 'function') {
        window.showErrorNotification(message);
      } else {
        alert(message);
      }
      
      loadReceipts(); // Reload the list
      console.log('[Payment Receipts] Receipt rejected:', receipt, 'Reason:', reason);
    }
    
    // Load receipts when page loads
    window.addEventListener('load', function() {
      loadReceipts();
    });
  </script>
