<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Platform Admin Login - MediForge</title>
  <link rel="stylesheet" href="css/styles.css?v=240">
  
  <!-- Supabase CDN Library -->
  <script src="js/vendor/supabase.min.js"></script>
  
  <!-- Supabase Client Initialization -->
  <script src="js/supabase-client.js?v=202510220113120113121312"></script>
  
  <!-- Universal Data Loader -->
  <script src="js/universal-data-loader.js?v=202510220113120113121312"></script>
  
  <!-- General helpers -->
  <script src="js/main.js?v=202510220113120113121312"></script>
  
  <!-- Platform Admin functionality -->
  <script src="js/platform-admin.js?v=5"></script>
  
  <!-- Rate limiter (platform login rate limiting) -->
  <script src="js/rate-limiter.js?v=20260214"></script>
  
  <!-- Platform login (Supabase Auth + legacy fallback) -->
  <script src="js/platform-login.js?v=20260214"></script>
  
  <!-- Universal Sync Status Indicator -->
  <script src="js/universal-sync-status.js?v=202510220113120113121312"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .platform-login-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      max-width: 450px;
      width: 90%;
    }
    
    .platform-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .platform-logo h1 {
      color: #667eea;
      font-size: 28px;
      margin: 10px 0;
    }
    
    .platform-logo p {
      color: #666;
      font-size: 14px;
      margin: 5px 0;
    }
    
    .warning-banner {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 4px;
    }
    
    .warning-banner p {
      margin: 0;
      color: #856404;
      font-size: 13px;
    }
    
    form label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }
    
    form input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
    }
    
    form input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
    }
    
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
  <script src="js/ui-title-case.js?v=20260612170000" defer></script>
</head>
<body>
  <div class="platform-login-container">
    <div class="platform-logo">
      <div style="font-size: 60px;">⚙️</div>
      <h1>Platform Admin</h1>
      <p>MediForge Multi-Tenant Management</p>
    </div>
    
    <div class="warning-banner">
      <p>⚠️ <strong>Platform Owner Access Only</strong><br>
      This portal is for MediForge platform administrators to monitor and manage all registered clinics.</p>
    </div>
    
    <form id="platform-login-form">
      <label for="username">Platform Admin Username:</label>
      <input type="text" id="username" required autocomplete="username" placeholder="Enter platform admin username">
      
      <label for="password">Platform Admin Password:</label>
      <input type="password" id="password" required autocomplete="current-password" placeholder="Enter platform admin password">
      
      <button type="submit">🔐 Login to Platform</button>
    </form>
    
    <div class="back-link">
      <a href="login">← Back to Clinic Login</a>
    </div>
  </div>
  
  <script src="js/security.js?v=1"></script>
  <script>
    console.log('🔧 TRACE: Fixed platform-login.html - Added complete Supabase integration');
    console.log('🔧 TRACE: Added connection status notifier for real-time sync');
    console.log('🔧 TRACE: Added required platform-admin and security scripts');
    console.log('🔧 TRACE: Fixed duplicate script tags and syntax errors');
    console.log('🔧 TRACE: Deployment timestamp: ' + new Date().toISOString());
    console.log('🔧 TRACE: CSS version updated to v240 for cache busting');
    console.log('✅ Platform login script loading...');
    
    // Wait for DOM to be ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPlatformLogin);
    } else {
      initPlatformLogin();
    }
    
    function initPlatformLogin() {
      console.log('🔧 Initializing platform login...');
      
      const form = document.getElementById("platform-login-form");
      if (!form) {
        console.error('❌ Platform login form not found!');
        return;
      }
      
      console.log('✅ Platform login form found, attaching listener...');
      
      form.addEventListener("submit", async function(e) {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const submitBtn = form.querySelector('button[type="submit"]');

        if (!username || !password) {
          alert('Please enter both username and password');
          return;
        }

        if (submitBtn) submitBtn.disabled = true;

        try {
          const result = typeof window.platformLogin === 'function'
            ? await window.platformLogin(username, password)
            : { success: false, error: 'Platform login module not loaded' };

          if (result && result.success) {
            alert('Welcome to Platform Admin Portal');
            const urlParams = new URLSearchParams(window.location.search);
            const returnUrl = urlParams.get('returnUrl');
            // Only allow safe relative paths (no protocol, no //)
            const safeReturn = returnUrl && !returnUrl.includes('://') && !returnUrl.includes('//');
            window.location.href = safeReturn ? (returnUrl.startsWith('/') ? returnUrl : '/' + returnUrl) : 'platform-dashboard';
          } else {
            alert(result?.error || 'Invalid platform admin credentials');
          }
        } catch (error) {
          console.error('❌ Platform login error:', error);
          alert('Login failed: ' + (error.message || 'Unknown error occurred'));
        } finally {
          if (submitBtn) submitBtn.disabled = false;
        }
      });
      
      console.log('✅ Platform login initialized successfully');
    }
  </script>  


  <script src="js/logout-button.js"></script>
  <script src="js/session-timeout.js"></script>  <!-- Auto-logout after 30 minutes of inactivity -->
</body>
</html>
