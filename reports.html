<head>

  <link rel="stylesheet" href="css/styles.css?v=231">
  
  <!-- Supabase CDN Library -->
  <script src="js/vendor/supabase.min.js"></script>
  
  <!-- Supabase Client Initialization -->
  <script src="js/supabase-client.js?v=202510220113130113131313"></script>

  <!-- General helpers -->
  <script src="js/main.js?v=202510220113130113131313"></script>
  <script src="js/patient-id-normalizer.js"></script>
  <script src="js/patients.js?v=20260429200000-mrn-sweep"></script>
  
  <!-- Reports functionality -->
  <script src="js/reports.js?v=2"></script>
  
  <!-- Universal Sync Status Indicator -->

  <script src="js/ui-title-case.js?v=20260612170000" defer></script>
</head>
<body>
  <h1 id="page-title">Reports</h1>
  
  <!-- Back to Dashboard Button -->
  <div style="margin-bottom: 20px;">
    <a href="dashboard" style="background-color: #667eea; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">
      &larr; Back to Dashboard
    </a>
  </div>
  
  <p id="stats"></p>  <!-- Shows simple stats like total patients -->
  <button id="export-btn">Export Patients to CSV</button>
  <a href="dashboard">Back to Dashboard</a>
  <script>
    console.log('TRACE: Fixed reports.html - Added complete Supabase integration');
    console.log('TRACE: Added connection status notifier for real-time sync');
    console.log('TRACE: Added required data loader, main, and reports scripts');
    console.log('TRACE: Deployment timestamp: ' + new Date().toISOString());
    console.log('TRACE: CSS version updated to v231 for cache busting');
    
    // Dynamic page title with org
    const user = JSON.parse(localStorage.getItem("user"));
    if (user) {
      document.getElementById("page-title").innerHTML = `Reports for ${user.org}`;
    }
  </script>
  <div id="logged-in-info" style="position: fixed; bottom: 10px; right: 10px; font-size: 12px; color: #666;"></div>
  <script>
    // Display logged-in user info with org
    const userFooter = JSON.parse(localStorage.getItem("user"));
    if (userFooter) {
      document.getElementById("logged-in-info").innerHTML = `${userFooter.username} (${userFooter.role}) from ${userFooter.org} is logged in`;
    }
  </script>  <!-- General helpers -->  


  <script src="js/logout-button.js"></script>
  <script src="js/session-timeout.js"></script>  <!-- Auto-logout after 30 minutes of inactivity -->
</body>
