  <script>
    // Handle active state for view buttons
    function showViewWithActive(view) {
      // Remove active class from all view buttons
      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      
      // Add active class to clicked button
      const activeBtn = document.querySelector(`button[onclick="showView('${view}')"]`);
      if (activeBtn) {
        activeBtn.classList.add('active');
      }
      
      // Call the original showView function
      showView(view);
    }
    window.showViewWithActive = showViewWithActive;
    
    // Override the onclick handlers to use the new function
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.view-btn').forEach(btn => {
        const onclick = btn.getAttribute('onclick');
        if (onclick && onclick.includes('showView')) {
          const view = onclick.match(/showView\('(\w+)'\)/)[1];
          btn.onclick = () => showViewWithActive(view);
        }
      });
      
      // Set initial active state (default to monthly)
      showViewWithActive('monthly');
    });
  </script>

  
  <!-- Service Worker for Automatic Cache Busting -->

    if ('serviceWorker' in navigator) {
