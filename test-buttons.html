<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Delete Buttons</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .test-button { background: #dc3545; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; margin: 2px; }
        .test-button:hover { background: #c82333; }
    </style>
</head>
<body>
    <h1>Test Delete Buttons</h1>
    
    <table id="test-table">
        <thead>
            <tr>
                <th>Allergen</th>
                <th>Reaction</th>
                <th>Severity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="test-tbody">
        </tbody>
    </table>

    <script>
        // Test data
        const testAllergies = [
            { allergen: "Fish", reaction: "Anaphylaxis", severity: "Severe" },
            { allergen: "Milk", reaction: "Hives", severity: "Moderate" },
            { allergen: "Penicillin", reaction: "Rash", severity: "Severe" }
        ];

        function testDeleteEntry(index) {
            alert(`Delete button clicked for index ${index}!`);
        }

        function displayTestAllergies(allergies) {
            const tbody = document.getElementById("test-tbody");
            tbody.innerHTML = "";
            
            allergies.forEach((entry, index) => {
                const row = document.createElement("tr");
                
                const allergenCell = document.createElement("td");
                allergenCell.textContent = entry.allergen;
                
                const reactionCell = document.createElement("td");
                reactionCell.textContent = entry.reaction;
                
                const severityCell = document.createElement("td");
                severityCell.textContent = entry.severity;
                
                const actionsCell = document.createElement("td");
                
                const deleteButton = document.createElement("button");
                deleteButton.type = "button";
                deleteButton.textContent = "Delete";
                deleteButton.className = "test-button";
                deleteButton.onclick = () => testDeleteEntry(index);
                
                actionsCell.appendChild(deleteButton);
                
                row.appendChild(allergenCell);
                row.appendChild(reactionCell);
                row.appendChild(severityCell);
                row.appendChild(actionsCell);
                
                tbody.appendChild(row);
            });
        }

        // Load test data
        displayTestAllergies(testAllergies);
    </script>
</body>
</html>
