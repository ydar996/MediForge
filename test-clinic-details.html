<!DOCTYPE html>
<html>
<head>
  <script src="/js/supabase-env.js"></script>
    <title>Test Clinic Details</title>
</head>
<body>
    <h1>Testing Clinic Details Page</h1>
    <p>This is a test to verify the clinic-details.html page renders properly.</p>
    
    <iframe src="clinic-details.html?clinic=Eko%20Clinics" width="100%" height="600px" style="border: 1px solid #ccc;"></iframe>
    
    <script>
        // Check if the iframe loads without raw JavaScript
        document.addEventListener('DOMContentLoaded', function() {
            const iframe = document.querySelector('iframe');
            iframe.onload = function() {
                try {
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    const bodyText = iframeDoc.body.textContent;
                    
                    // Check for raw JavaScript patterns
                    const hasRawJS = bodyText.includes('function copyOrgCode()') && 
                                   bodyText.includes('const orgCode = document.getElementById');
                    
                    if (hasRawJS) {
                        document.body.innerHTML += '<div style="color: red; font-weight: bold;">❌ RAW JAVASCRIPT DETECTED!</div>';
                    } else {
                        document.body.innerHTML += '<div style="color: green; font-weight: bold;">✅ NO RAW JAVASCRIPT - PAGE IS CLEAN!</div>';
                    }
                } catch (e) {
                    document.body.innerHTML += '<div style="color: orange; font-weight: bold;">⚠️ Cannot access iframe content (CORS)</div>';
                }
            };
        });
    </script>

  <!-- Supabase Client -->
  <script src="js/vendor/supabase.min.js"></script>
  <script src="js/supabase-client.js?v=20251019050000"></script>
  
  <!-- Universal Scripts -->
  <script src="js/universal-data-loader.js?v=20251019050000"></script>  <!-- Universal data loader with Supabase priority -->
  <script src="js/universal-sync-status.js?v=20251019050000"></script>  <!-- Universal sync status indicator -->
</body>
</html>
