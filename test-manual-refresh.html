<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Test Manual Refresh Option</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .test-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .status {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #28a745;
        }
        
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        
        .button:hover {
            transform: translateY(-2px);
        }
        
        .button.danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }
        
        .log {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔄 Test Manual Refresh Option</h1>
        
        <div class="status">
            <h3>✅ Direct Test</h3>
            <p>This page directly tests the manual refresh option without relying on the auto-refresh system.</p>
        </div>
        
        <div>
            <button class="button" onclick="showManualRefreshOption()">Show Manual Refresh Option</button>
            <button class="button danger" onclick="simulateFailedState()">Simulate Failed State</button>
            <button class="button" onclick="clearAll()">Clear All</button>
        </div>
        
        <div class="log" id="log">
            <div>🔄 Manual refresh test loaded...</div>
        </div>
    </div>
    
    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        // Show manual refresh option
        function showManualRefreshOption() {
            log('🔄 Showing manual refresh option...');
            
            if (document.getElementById('manual-refresh-option')) {
                log('⚠️ Manual refresh option already exists');
                return;
            }
            
            const notification = document.createElement('div');
            notification.id = 'manual-refresh-option';
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
                color: white;
                padding: 20px;
                border-radius: 12px;
                box-shadow: 0 8px 25px rgba(0,0,0,0.3);
                z-index: 10000;
                max-width: 350px;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                animation: slideInFromRight 0.5s ease-out;
            `;
            
            notification.innerHTML = `
                <div style="display: flex; align-items: center; margin-bottom: 10px;">
                    <span style="font-size: 20px; margin-right: 10px;">⚠️</span>
                    <strong>Update Required</strong>
                </div>
                <div style="margin-bottom: 15px; line-height: 1.5;">
                    Auto-refresh failed. Please manually refresh to get the latest version.
                </div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="forceManualRefresh()" style="
                        background: white;
                        color: #ff6b6b;
                        border: none;
                        padding: 10px 20px;
                        border-radius: 6px;
                        font-weight: 600;
                        cursor: pointer;
                        font-size: 14px;
                    ">Refresh Now</button>
                    <button onclick="dismissManualRefresh()" style="
                        background: rgba(255,255,255,0.2);
                        color: white;
                        border: none;
                        padding: 10px 20px;
                        border-radius: 6px;
                        cursor: pointer;
                        font-size: 14px;
                    ">Dismiss</button>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            // Add CSS animation
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes slideInFromRight {
                    from { opacity: 0; transform: translateX(100%); }
                    to { opacity: 1; transform: translateX(0); }
                }
            `;
            document.head.appendChild(style);
            
            log('✅ Manual refresh option displayed');
        }
        
        // Force manual refresh
        function forceManualRefresh() {
            log('🔄 User requested manual refresh');
            
            // Clear all cache aggressively
            if ('caches' in window) {
                caches.keys().then(function(cacheNames) {
                    cacheNames.forEach(function(cacheName) {
                        caches.delete(cacheName);
                        log(`✅ Cleared cache: ${cacheName}`);
                    });
                });
            }
            
            // Clear all localStorage
            localStorage.clear();
            sessionStorage.clear();
            log('✅ Cleared localStorage and sessionStorage');
            
            // Force refresh with cache busting
            const url = new URL(window.location);
            url.searchParams.delete('refreshAttempts'); // Reset attempts
            url.searchParams.set('v', '20251022120000');
            url.searchParams.set('cb', Date.now());
            url.searchParams.set('manual', 'true');
            url.searchParams.set('force', 'true');
            
            log('🔄 Manual refresh redirecting to:', url.toString());
            window.location.href = url.toString();
        }
        
        // Dismiss manual refresh option
        function dismissManualRefresh() {
            const notification = document.getElementById('manual-refresh-option');
            if (notification) {
                notification.style.animation = 'slideInFromRight 0.5s ease-out reverse';
                setTimeout(() => {
                    notification.remove();
                    log('✅ Manual refresh option dismissed');
                }, 500);
            }
        }
        
        // Simulate failed state
        function simulateFailedState() {
            log('🧪 Simulating failed refresh state...');
            
            // Set old version in localStorage
            localStorage.setItem('ehrAppVersion', '20251019043800');
            log('✅ Set old version in localStorage');
            
            // Set refresh attempts to 3
            const url = new URL(window.location);
            url.searchParams.set('refreshAttempts', '3');
            url.searchParams.set('v', '20251019043800');
            url.searchParams.set('cb', Date.now());
            
            log('🔄 Redirecting to simulate failed state...');
            window.location.href = url.toString();
        }
        
        // Clear all
        function clearAll() {
            log('🗑️ Clearing all data...');
            
            // Clear all cache
            if ('caches' in window) {
                caches.keys().then(function(cacheNames) {
                    cacheNames.forEach(function(cacheName) {
                        caches.delete(cacheName);
                        log(`✅ Cleared cache: ${cacheName}`);
                    });
                });
            }
            
            // Clear localStorage
            localStorage.clear();
            sessionStorage.clear();
            log('✅ Cleared localStorage and sessionStorage');
            
            // Reset URL
            const url = new URL(window.location);
            url.searchParams.delete('refreshAttempts');
            url.searchParams.delete('v');
            url.searchParams.delete('cb');
            url.searchParams.delete('manual');
            url.searchParams.delete('force');
            url.searchParams.set('reset', 'true');
            
            log('🔄 Redirecting to reset...');
            window.location.href = url.toString();
        }
        
        // Make functions global
        window.forceManualRefresh = forceManualRefresh;
        window.dismissManualRefresh = dismissManualRefresh;
        
        // Initialize
        log('🚀 Manual refresh test initialized');
        
        // Check if we're coming from a failed state
        const refreshAttempts = new URLSearchParams(window.location.search).get('refreshAttempts');
        if (refreshAttempts && parseInt(refreshAttempts) >= 3) {
            log('🛑 Failed refresh state detected - showing manual option');
            setTimeout(() => {
                showManualRefreshOption();
            }, 1000);
        }
        
        // Check if we're coming from a reset
        const isReset = new URLSearchParams(window.location.search).get('reset');
        if (isReset) {
            log('✅ System reset completed');
        }
    </script>
</body>
</html>
