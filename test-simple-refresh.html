<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Test Simple Auto-Refresh</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .test-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .status {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #28a745;
        }
        
        .info {
            background: #e3f2fd;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #2196F3;
        }
        
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        
        .button:hover {
            transform: translateY(-2px);
        }
        
        .log {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔄 Simple Auto-Refresh Test</h1>
        
        <div class="status">
            <h3>✅ System Status</h3>
            <p>Testing the simple auto-refresh system that won't cause infinite loops.</p>
        </div>
        
        <div class="info">
            <h3>📋 Test Information</h3>
            <p><strong>Current Version:</strong> <span id="current-version">20251022120000</span></p>
            <p><strong>Page Load Time:</strong> <span id="load-time"></span></p>
            <p><strong>Refresh Attempts:</strong> <span id="refresh-attempts">0</span></p>
            <p><strong>In Loop:</strong> <span id="in-loop">false</span></p>
        </div>
        
        <div>
            <button class="button" onclick="simulateOldVersion()">Simulate Old Version</button>
            <button class="button" onclick="clearCache()">Clear Cache</button>
            <button class="button" onclick="checkStatus()">Check Status</button>
        </div>
        
        <div class="log" id="log">
            <div>🔄 Simple auto-refresh test loaded...</div>
        </div>
    </div>
    
    <!-- Load the simple auto-refresh system -->
    <script src="js/simple-auto-refresh.js?v=20251022120000"></script>
    
    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function updateInfo() {
            document.getElementById('current-version').textContent = '20251022120000';
            document.getElementById('load-time').textContent = new Date().toLocaleString();
            
            const refreshAttempts = new URLSearchParams(window.location.search).get('refreshAttempts') || '0';
            document.getElementById('refresh-attempts').textContent = refreshAttempts;
            
            const isInLoop = parseInt(refreshAttempts) >= 3;
            document.getElementById('in-loop').textContent = isInLoop.toString();
        }
        
        function simulateOldVersion() {
            log('🧪 Simulating old version scenario...');
            localStorage.setItem('mediforgeAppVersion', '20251019043800');
            log('✅ Old version set in localStorage');
            
            // Add old script to trigger refresh
            const oldScript = document.createElement('script');
            oldScript.src = 'js/old-script.js?v=20251019043800';
            document.head.appendChild(oldScript);
            log('✅ Old script added to page');
        }
        
        function clearCache() {
            log('🗑️ Clearing all cache...');
            
            if ('caches' in window) {
                caches.keys().then(function(cacheNames) {
                    cacheNames.forEach(function(cacheName) {
                        caches.delete(cacheName);
                        log(`✅ Cleared cache: ${cacheName}`);
                    });
                });
            }
            
            localStorage.clear();
            sessionStorage.clear();
            log('✅ Cleared localStorage and sessionStorage');
        }
        
        function checkStatus() {
            log('🔍 Checking system status...');
            
            const storedVersion = localStorage.getItem('mediforgeAppVersion');
            log(`📦 Stored version: ${storedVersion || 'none'}`);
            
            const scripts = document.querySelectorAll('script[src*="v="]');
            log(`📜 Scripts with version: ${scripts.length}`);
            
            const refreshAttempts = new URLSearchParams(window.location.search).get('refreshAttempts');
            log(`🔄 Refresh attempts: ${refreshAttempts || '0'}`);
            
            const isInLoop = parseInt(refreshAttempts || '0') >= 3;
            log(`🔄 In loop: ${isInLoop}`);
            
            log('✅ Status check complete');
        }
        
        // Initialize page
        updateInfo();
        log('🚀 Test page initialized');
        
        // Check for refresh attempts
        const refreshAttempts = new URLSearchParams(window.location.search).get('refreshAttempts');
        if (refreshAttempts) {
            log(`🔄 Refresh attempt #${refreshAttempts} detected`);
            
            if (parseInt(refreshAttempts) >= 3) {
                log('🛑 System is in loop protection mode - no more refreshes');
            }
        }
        
        // Monitor for auto-refresh
        let refreshDetected = false;
        const originalLocation = window.location.href;
        
        setInterval(() => {
            if (window.location.href !== originalLocation && !refreshDetected) {
                refreshDetected = true;
                log('🔄 AUTO-REFRESH DETECTED! System is working correctly.');
            }
        }, 1000);
    </script>
</body>
</html>
