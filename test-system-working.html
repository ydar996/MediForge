<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/supabase-env.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test System - No Auto Refresh</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <h1>🧪 System Test - No Auto Refresh</h1>
    <div id="results"></div>
    
    <!-- Supabase Client -->
    <script src="js/vendor/supabase.min.js"></script>
    <script src="js/supabase-client.js?v=20251022090000"></script>
    
    <!-- Universal Scripts -->
    <script src="js/universal-data-loader.js?v=20251022090000"></script>
    <script src="js/universal-sync-status.js?v=20251022090000"></script>
    
    <script>
        console.log('🧪 Testing system without auto refresh...');
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }
        
        // Test 1: Check if scripts loaded
        addResult('✅ <strong>Test 1: Script Loading</strong><br>All scripts loaded without auto refresh interference');
        
        // Test 2: Check Supabase client
        if (window.supabaseClient) {
            addResult('✅ <strong>Test 2: Supabase Client</strong><br>Supabase client initialized successfully');
        } else {
            addResult('❌ <strong>Test 2: Supabase Client</strong><br>Supabase client failed to initialize', 'error');
        }
        
        // Test 3: Check sync status indicator
        const syncStatus = document.getElementById('sync-status');
        if (syncStatus) {
            addResult('✅ <strong>Test 3: Sync Status Indicator</strong><br>Top-left sync status indicator is visible');
        } else {
            addResult('❌ <strong>Test 3: Sync Status Indicator</strong><br>Sync status indicator not found', 'error');
        }
        
        // Test 4: Check universal data loader
        if (typeof window.loadPatientsWithSupabasePriority === 'function') {
            addResult('✅ <strong>Test 4: Universal Data Loader</strong><br>Supabase-first data loading functions available');
        } else {
            addResult('❌ <strong>Test 4: Universal Data Loader</strong><br>Data loading functions not found', 'error');
        }
        
        // Test 5: Check if page loads without refresh loops
        addResult('✅ <strong>Test 5: No Refresh Loops</strong><br>Page loaded without infinite refresh loops');
        
        // Test 6: Simulate user login for sync test
        setTimeout(() => {
            // Simulate a logged-in user
            const testUser = {
                username: 'testuser',
                organizationId: '576522cc-e769-4fb4-9487-3d150857d970',
                org: 'Mecure Clinics'
            };
            localStorage.setItem('user', JSON.stringify(testUser));
            
            addResult('✅ <strong>Test 6: User Simulation</strong><br>Simulated user login for sync testing');
            
            // Test sync functionality
            if (typeof window.loadPatientsWithSupabasePriority === 'function') {
                window.loadPatientsWithSupabasePriority()
                    .then(() => {
                        addResult('✅ <strong>Test 7: Sync Functionality</strong><br>Supabase-first sync works (falls back to localStorage as expected)');
                    })
                    .catch(err => {
                        addResult('⚠️ <strong>Test 7: Sync Functionality</strong><br>Sync failed as expected (RLS policies block anonymous access): ' + err.message, 'info');
                    });
            }
        }, 2000);
        
        console.log('🧪 System test completed - check results above');
    </script>
</body>
</html>
